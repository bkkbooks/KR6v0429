body:
  text: 明吳之鯨撰徑山寺大覺國一禪師法欽吳郡崑山人姓朱氏世服儒業母管氏夢蓮生於戶樞取一花繫衣帶而孕既誕形貌奇偉神色瑩徹好以佛事為兒戲年二十二州以充賦道由丹徒憩於鶴林素禪師見而異之問曰子何之師曰將求仕於上京素曰雖有五等之爵豈如三界之尊耶師曰可學乎素曰觀子神觀幾於生知若肯出家必悟如來知見師即裂逢掖刻苦親依素深器之謂門人法鏡曰此當大弘吾法蔚為人師師日夜奮勵鍊行安禪乃請素示其法要素曰無人得我法師曰以何傳素曰我法實無可傳師頓釋疑滯久之辭素請示所止素曰乘流而行遇徑即止師就神龍所創遂居之未及數載名震天下馬祖令人馳書書中作一圓相師開緘於圓相中作一照卻封回又令智藏來問十二時中以何為境師曰待汝回去時有信藏曰如今便回師曰傳語卻須問取曹溪有僧問如何是道師曰山上有鯉魚井底有蓬塵又僧問如何是祖師西來意師曰汝問不當曰如何得當師曰待吾滅後即向汝説大厯中代宗遣內侍黃鳳持詔致師詣闕既至帝躬迎登殿設坐以資法要同弟子之禮師一日在內庭見帝起立帝曰師何以起師曰檀越何得向四威儀中見貧道帝悅謂忠國師曰欲賜欽師一名忠欣然奉詔乃賜號國一焉頃之辭歸帝曰此衆生有當度者彼衆生豈有殊乎師曰實無有法以度衆生居內僅一年每賜繒綵設御饌皆不受惟布衣蔬食器用陶匏如平時相國楊綰見而歎曰此方外高士也崔趙公嘗問弟子出家得否師曰出家是大丈夫事豈將相所能為趙歎賞其言一時名公如李泌徐浩第五琦陳少遊等凡三十二人皆稱門人問道以求決擇已而力辭南還舊山餞禮榮耀敕本州於徑山重建精舍度僧七人以奉巾櫛命州長吏逐月躬至問候無上禪師名鑒宗長興錢氏子祖徽禮部侍郎師少而穎異風骨不凡謁鹽官悟空禪師盡得要領以為堪任大法咸通三年至天目東登徑山自國一去後僧徒分散殆盡荒涼如傳舍師意欲追還舊觀遂駐錫焉未幾百廢具舉道望日遠弟子洪諲以經論自負師告之曰佛祖正法直截亡詮汝算海沙於理何益但能莫存知見泯絶於緣離一切心即汝真性諲聞而適悅即呈偈云這箇非他物元來不昧機達而全體現應處不思議師曰汝問取察師兄察曰師弟高見非吾境界諲即辭遍往諸方至大溈方悟旨師平時指徒語言切直類皆如此法濟禪師諱洪諲吳興烏程人姓吳氏初習律乘未十日誦畢棄之遊心經論機辨風生耆宿下之歸覲無上無上問曰汝於時中將何以報答四恩師茫然莫知所對廢食三日無上方便慰安之師於言下有省述偈以進無上頷之咸通七年上徑山無上委以住持事師辭甚力無上曰吳中佛法藉於子耳何辭之有開法之初衆不滿百未中歲間堂餘萬指僧問掩息如灰時如何師曰猶是時人工幹僧曰幹後如何師曰耕人田不種僧曰畢竟如何師曰禾熟不臨場僧問龍門不假風雷勢便透者如何師曰猶是一品二品僧曰此既是階級向上事如何師曰不知汝有龍門僧問如霜如雪時如何師曰猶是污染曰不污染時如何師曰不同紀僧問如何是長師曰千聖不能量曰如何是短師曰蟭螟眼裏著不滿其僧不肯便去舉似石霜石霜云只為太近實頭僧問如何是長石霜云不屈曲曰如何是短石霜云雙陸盤中不喝采佛日長老訪師師問承聞長老獨化一方何以薦遊峰頂佛日曰朗月當空挂冰霜不自寒師曰莫便是長老家風佛日答曰峭峙萬重闕於中含寶月師曰此猶是文言作麼生是長老家風佛日曰今日賴遇佛日佛日卻問云隱密至真時人知有道不得大省無辜時人知有道得於此二途猶是時人升降處未審長老親道自道如何道師曰我家道處無可道佛日曰如來路上無私曲便請玄音和一場師曰任汝二輪更迭照碧潭雲外不相關佛日曰為報白頭無限衆此回年少莫歸鄉師曰老少同輪無向背我家去路勿參差佛日曰一言定天下四句為誰留師曰汝言有三四我道其中一也無師因有偈曰東西不相顧南北為誰留汝言有三四我即一也無許州金明上座聞師説法頗契石霜乃曰徑山老和尚敢説石霜禪我往問之彼若果合我則為渠作園頭如其不然我則掀倒禪牀先問石霜一毫穿衆穴時如何石霜云直須萬年後云萬年後如何石霜云登科任汝登科拔萃任汝拔萃後問師云一毫穿衆穴時如何師云直須老去云老去後如何師云光靴任汝光靴結裹任汝結裹明乃作禮為之治圃三年師始至是山適遭黃巢之亂巢之偏帥領卒千餘人見師師宴坐不起帥以劍揮禪牀者再師神色不動帥異之獻寶再拜而去吳越武肅王微時師一日謂其徒曰明日有異人至當厚禮之詰朝王至師乃門迎延於丈室特異於他堂衆皆訝之師乃密謂武肅曰他日獨霸吳越當須持護佛法無忘此言武肅恭謝而去及立軍功收杭州執弟子禮以事於師待遇勤厚莫可為比中和二年表乞賜師紫方袍景福二年武肅封吳越王後表乞賜號法濟大師中國皆制可乾寧二年九月三十日示寂後武肅將薨謂文穆曰吾昔自徑山法濟示吾霸業自此發迹建國立功故吾常厚顧此山焉他日汝等無廢吾志其後文穆忠獻忠懿皆不忘武肅之遺旨恩顧山門非他可並焉大禪明禪師秀州人妙喜會中龍象叢林所謂明大禪也身長八尺腹大十圍所至人必聚觀先是陽和王夢一異僧欲化蘇州一莊翌旦師忽杖屨徒步而至王見師奇偉與夢中無異首言蘇州一莊為徑山供佛齋僧無窮之福王未有可否遂達孝宗會和王入朝上為言聞卿捨蘇州莊與徑山朕當為蠲免賦稅和王謝恩歸即以莊𨽻徑山此莊歲出二萬斛犂牛舟車解庫應用百事具足師於緇素有大因緣江浙兩湖皆號之為布袋和尚再出云佛日大慧杲禪師宣州奚氏諱宗杲字曇晦少師魏國公張浚延居茲山孝宗為普安郡王時聞師名遣內都監至徑山謁師師作偈以獻王甚嘉之及在建邸復遣內知客請師山中為衆説法親書妙喜菴大字及製真讚寄師又二年即位賜號大慧禪師復取向所賜宸翰以御寶識之恩寵加厚道法之盛號臨濟中興密菴傑禪師福州鄭氏謁應菴於衢之明果一日菴問如何是正法眼師遽答曰破砂盆菴頷之別峰印禪師嘉州李氏得法於華藏民禪師首在鄉連主數剎後再出峽住保寧金山雪竇及至茲山彌浹孝宗召對選德殿稱旨此日賜肩輿於東華門內上注圎覺經遣使馳賜命作序師具表奏謝仍進頌曰古佛與今佛同一廣長舌於無途轍中為物啓途轍撥開千嶂雲放出一輪月普令大地人言下悉照徹覺亦無可圎幻亦無可滅只此無亦無紅爐一點雪稽首佛與佛字字無異説既經乙夜之覽皇情大悅佛照普慈宗覺光禪師臨江新喻人得法于妙喜乾道丁亥台守李侍郎浩延住鴻福徙光孝孝宗雅聞師名淳熙三年詔開堂靈隱召入觀堂留五宿數問佛法大意師敷奏直截上大悅賜號佛照禪師癡絶道沖禪師生而豐上短下資性絶人少長習進士業棄之受釋氏學於梓州妙音院禮修證為落髮師遊成都習經論於聖慈以名相厭人復棄去聞松源唱道于饒之薦福徑造其門以歲飢不受曹源以雲居首座出世妙果師聽其入門語有省源遂俾侍香老奉痛棒不少貸平生知見至是絶無影響源徙幽峰師復侍行久之呈偈辭遊浙有曰尚餘窮相一雙手要向諸方癢處爬江湖盛傳至杭時松源主靈隱門戶嚴峻八閲月不得入室或以失士告源曰我已八字打開挂搭他自是他當面蹉過了師聞其語洞徹反留法華逾月即登徑山人神響應歡聲如雷上堂僧問心佛及衆生是三無差別如何是過去心師云放待冷來看僧云如何是現在心師云你問我答僧云如何是未來心師云後次上堂向你道僧云如何是過去佛師曰去年梅僧云如何是現在佛師云今歲柳僧云如何是未來佛師云顏色馨香依舊僧云如何是過去差別智師以拂子擊禪牀左邊僧云如何是現在差別智師以拂子擊禪牀右邊僧云如何是未來差別智師以拂子中間點一點僧云心佛衆生無向背十方剎海一毫收便禮拜師乃云過去心不可得現在心不可得未來心不可得三世既不可得喚什麼作差別智若人見得徹去三世諸佛無一時不在諸人項𩕳上轉大法輪更來這裏挨肩並足討什麼碗以拄杖一時趕散結夏上堂圎覺伽藍塵塵有路坐斷去來頓空今古那裏十三這邊十五後先不差毫髮許可笑黃面瞿曇至今不知落處上堂云盡乾坤大地無絲毫許大是汝諸人橫擔拄杖繞四天下行腳道我無處不到無事不知且道西天那欄陀寺戒賢論師今日説什麼法便下座上堂云有一人一念頓證墮在佛數有一人纍劫闡提不願成佛具道那個合受人天供養良久云蝶穿芳徑雙眉濕蜂掠殘花兩股肥臨示寂手書龕記并遺書十數且曰無準忌在三月十八日吾以十五日即行不能瓣香修供侍僧亟以遺偈請師謂曰末後一句無可商量只要箇人直下承當即命筆書辭衆上堂語至夜分起坐移頃而逝茶毗舍利五色者無數雲峰高禪師福之長溪人諱妙高見偃溪於育王入室掌藏鑰一日溪舉譬如牛過窗櫺頭角四蹄都過了因甚尾巴過不得師豁然有省答曰鯨吞海水盡露出珊瑚枝溪可之及趨京上問禪以何為宗師奏淨智妙圎體本空寂非見聞覺知思慮分別所能到宣問再三師歷舉西天東土諸祖因緣大抵禪是正法眼藏涅槃妙心超最上乘孰有過於禪詞旨明顯餘二千言上大悅陛辭南歸徑山復災師謂衆曰吾宿負此山債耳遂竭力再營建匯殿坡為池他屋以次落成佛日普照元叟端禪師臨海何氏諱行端從俗叔父茂上人得度於餘杭化城院參藏叟於徑山得旨大德庚子出世湖之資福名聞京國特旨賜慧文正辨禪師行中書省平章張閭公舉師住中天竺復遷居靈隱有旨設水陸齋於金山命師説法事竣入覲奏對稱旨加賜佛日普照之號南歸即退閭於良渚之西菴至治壬戌三宗四衆相率白於行宣政院請師補處茲山仍闔詞奏請降璽書護持師至是凡三被金襴之賜人以為榮而師漠如也虎岩住茲山時師為第一座每聞虎岩法座上舉云度宗為北兵攻急命道士設大醮奏章天庭問國家重事高公伏章久不得報既竣事問故高公云為定徑山四十八代住持天門不開故得報遲也虎岩舉此夸衆謂住持豈苟然至於四十八代住持尚預定之天庭師聞頗心非之及師住此山適當其次至正辛巳終窆全身於寂照塔院月林鏡禪師杭州人住徑山時進士張公寧讚之曰竊以舞鳳飛龍五結青蓮於天目靈雞馴兔一鑑光徹於祖師地既曰靈天其有待恭惟新命徑山堂上大和尚鏡公月林禪師瑞芝三秀古柏十圍得正度於無傳嗣妙法於東嶼頃者五百間清風淨掃人望方歸邇來三十年優鉢猛闓王氣猶在起龍瞑於下界興象教於中衰丞相開選佛場和尚悟出世法乘流而行遇徑而止命當年國一亦起於崑山容首度坡仙重遊於方丈凡吾方外之友盡讚僧中此郎師少穎異稚齡出家弱冠剃染專淨業間叩名碩俾參本來人有省偈曰本來人本來人無腦無頭作麼尋驀然揪著箇鼻孔試勘元來是白丁碩見睨視曰可是師與國一由是名振一時正德己卯歸寂年八十六塔凌霄東崖浙翁如琰禪師台州周氏子幼峻嶷穎悟邁倫上堂舉乾峰因僧問十方薄伽梵一路涅槃門未審路頭在什麼處峰以拄杖畫云在這裏後僧請益雲門門拈起扇子云扇子𨁝跳上三十三天築著帝釋鼻孔東海鯉魚打一棒雨似盆傾會麼師云唱愈高和愈高還他二老若是十方薄伽梵一路涅槃門總未踏著在上堂拈拄杖云蔣山喚這箇作柱杖子諸人亦喚這箇作拄杖子還有緇素也無闌干雖共倚山色不同觀蒙菴元聰禪師福州人晦菴會中得心要衆推為高第弟子上堂舉玄沙見僧禮拜沙云因我得禮你師頌曰因我得禮你莫放屁撒屎帶纍天下人錯認自家底上堂舉趙州和尚在東廝上見文遠侍者過驀召文遠遠應諾趙州曰東廝上不可與汝説佛法師頌曰明明道不説此理憑誰識春風一陳來滿地花狼籍送行者求僧偈云山前麥熟雨初晴桑柘青連柳色新毫髮不存風骨露頭頭總是比丘身塗毒智策禪師天台陳氏子幼依護國僧楚光落髮十九造國清謁寂室光灑然有省次謁大師麼師曰即今亦不少曰因甚在汝腳跟下師曰當面蹉過圎曰上人不耘而秀不扶而直一日辭去圎送之門拊師背曰寶所在近此城非實師頷之往豫章謁典牛道由雲居風雪塞路坐閲四十二日午初板聲鏗然豁爾大悟及造門典牛獨指師曰甚處見神見鬼來師曰雲居聞極聲來牛曰是甚麼師曰打破虛空全無靶柄牛曰向上事未在師曰東家暗坐西家廝罵牛曰嶄然超出佛祖他日起家一麟足矣住後上堂舉教中道若以色見我以音聲求我是人行邪道不能見如來雖然恁麼正是捕得老鼠打破油甕懷禪師道你眼在甚麼處雖則識破釋迦老子爭奈拈䭔舐指若是塗毒即不然色見聲求也不妨百華影裏繡鴛鴦自從識得金針後一任風吹滿袖香師將示寂升座別衆囑門人以文祭之師危坐傾聽至尚饗為之一笑越兩日沐浴更衣集衆説偈曰四大既分飛煙雲任意歸秋天霜夜月萬里轉光輝俄頃泊然而逝塔全身於東岡之麓照堂了一禪師明州人上堂云參玄之士觸境遇緣不能直下透脫者蓋為業識深重情妄膠固六門未息一處不通絶點純清含生難到直須入林不動草入水不動波始可順生死流入人間世諸人要會麼以拄杖畫曰秪向這裏薦取上天竺寺唐錢塘上天竺寺道翊法師當陽侯杜公之子出家終南山翠微寺梁天監三年入天竺佛國山止息西峰之隈誅茅結菴精修鍊魔夜則敲擊木魚經行五峰之巔衝冒雺霧霜霰不避豺虎絶無徒侶多厯年所遂致湱然超悟乃屏息止觀休糧入定者久之一夕忽見山麓火光燭天師禱於天即擲錫空中詰旦果得異木浮水面錫卓其上異香襲人剖之得大士像宛然天成不假刻削供侍菴中多獲靈感建始實由於此或以師與兄道宣弟道定俱入杭後宣為南山六通宣律師定為法相開山之祖時號僧中三鳳云釋法詵姓孫氏母初夢吞明珠遂黜魚惡葷誕彌厥月生有異表十五辭親從師依年受具行學一集蔚為教宗卷伊呂立功之致陋黃綺肆志之適遺形理性與山木為羣故地恩貞大師囑之以華嚴經菩薩戒起信論心以靜詵智與經冥一夕夢乘大艑直截滄溟橫山當前峻與天極不覺孤帆鳶戾懷襄上濟峰竦竦而忽高雲溶溶而在下既寤形若委衣流汗輕醒自此句義不思而得一部全文常現心鏡事事無礙之旨如貫花焉天寶六年於蘇州常樂寺繪盧舍那像化示羣品大厯二年於常州龍興寺講才登法座忽有異光如曳紅縷漸明漸大縈旋杳空久修行者會中先覩前後講大經十遍撰儀記十二卷大厯十三年十一月七日沙門慧覺夢巨塔陷地二級無何詵示疾而終春秋六十一慧命四十二受法弟子太初付以香爐談柄潯陽正覺會稽神秀亦猶儒氏之有遊夏焉詵初講天竺寺盛闡華嚴時越僧澄觀就席決疑深得幽趣及終吳興皎然為碑邗城肅公為頌合揚其美子儀心印水月大師溫州樂清人姓陳氏初遊方謁鼓山因問曰子儀三千里外遠投法席今日非時上來乞師非時答話鼓山曰不可鈍置仁者師曰省力處如何鼓山曰汝何費力師自此承言領旨便往浙中錢忠懿王聆其道譽命開法於羅漢光福二道場海衆臻湊師上堂示衆云久立大衆更待什麼不辭展拓却恐誤於禪德轉迷歸路時寒珍重僧問如何是從上來事師曰住僧曰如何薦師曰可惜龍頭成蛇尾師回故里雍熙三年示滅門人闍維收舍利建塔天竺證悟法師嘗患本宗學者囿於名相膠於筆録至以天台之傳為文字之學南宗鄙之乃謁護國此菴元禪師夜話次師舉東坡宿東林偈且曰也不易到此田地菴曰尚未見路徑何言到耶曰秪如他道溪聲便是廣長舌山色豈非清淨身若不到此田地如何有這箇消息菴曰是門外漢耳曰和尚不吝可為説破菴曰却秪從這裏猛著精彩覷捕看若覷捕得他破則亦知本命元辰落著處師通夕不寐及曉鐘鳴去其祕蓄遂豁然大悟呈偈以求記莂杭州上天竺我菴本無法師黃岩人從淨慈方山落髮依寂照於中天竺掌綱維有舅氏教庠老成挽之更宗於是見湛堂於演福研精教部寂照惜其去作偈寄之云從教入禪今古有從禪入教古今無一心三觀門雖別水滿千江月自孤後出世既為湛堂嗣仍爇一香報寂照不以迹異而二其心寂照示寂時師住四明延慶遺書祝其力弘大蘇宗趣餘無他言師於祭筵拈香云妙喜五傳最光焰寂照一代甘露門等間觸著肝腦裂冰霜忽作陽春溫我思打失鼻孔日是何氣息今猶存天風北來歲云暮掣電討甚空中痕我菴臨終無疾坐蛻從諫慈辨講師處之松陽人也具大知見聲播講席於止觀深有所契每與禪衲遊嘗以道力扣大通通一日作書寄之師發緘睹黑白二圓相乃悟答偈曰黑相白相擔枷過狀了不了兮無風起浪若問究竟事如何洞庭山在太湖上杭州普門寺希辨禪師常熟人幼出家禮本邑延福院啓祥禪師落髮具戒詣楞伽山聽律尋謁天台受心印乾德初吳越忠懿王命住越州清泰院署慧智禪師開寶中復召入居普門寺師上堂曰山僧素乏知見復寡聞持頃雖侍坐於山中和尚亦不蒙一句開示以至今與諸仁者聚會更無一法可相助發何况能為諸仁者區別緇素商量古今還怪得山僧麼若有怪者且道此人具眼不具眼有賓主義無賓主義晚學初機必須審細時有僧問如何是普門示現神通事師曰恁麼即闍黎怪老僧也曰不怪時如何師曰汝且下堂裏思惟去太平興國三年吳越王入覲師隨寶塔至見於滋福殿賜紫號慧明大師端拱中上言願還故里詔從之賜御製詩及忠懿王施金於常熟本山院創磚浮圖七級高二百尺至道三年八月二十五日示寂壽七十七臘六十三塔於院之西北隅中天竺寺堂中仁禪師洛陽人少依東京奉先院出家宣和初賜牒於慶基殿落髮進具後往來三藏譯經所諦窮經論特於宗門未之信時圓悟居天寧凌晨謁之悟方為衆入室師見敬服奮然造前悟曰依經解義三世佛冤離經一字即同魔説速道速道師擬對悟劈口擊之因墜一齒即大悟留天寧由是師資契合請問無間後開法大覺遷中天竺次徙靈峰上堂云九十春光已過半養花天氣正融和海棠枝上鶯聲好道與時流見得麼然雖如是且透聲色一句作麼生道金勒馬嘶芳草地玉樓人醉杏花天上堂舉狗子無佛性話乃曰二八佳人刺繡遲紫荊花下囀黃鸝可憐無限傷春意盡在停針不語時淳熙甲午四月八日孝宗詔入賜座説法帝舉不與萬法為侶因緣俾拈提師拈罷頌曰稱鎚搦出油間言長語休腰纏十萬貫騎鶴上揚州癸亥中升堂告衆而逝癡禪玄妙禪師婺州王氏僧問如何是截斷衆流句師曰佛祖問口無分曰如何是函蓋乾坤句師曰匝地普天曰如何是隨波逐浪句師曰有時入荒草有時上孤峰上堂云黃昏雞報曉半夜日頭明驚起雪獅子瞪開紅眼睛上堂云去年梅今歲柳顏色馨香喝一喝良久曰若不得這一喝幾乎道著依舊且道道著後如何眼睛突出一關逵禪師番陽人姓方氏參晦機於淨慈機問甚處人師曰番陽人機曰番陽湖水深多少師曰瞪目不見底機曰恁麼則浸爛衲僧鼻孔也師曰終不借和尚鼻孔出氣機曰畢竟借誰鼻孔出氣師曰恭惟和尚萬福機肯之命充侍者逾二年往依中峰於天目山久之徑山原叟命掌記中天竺笑隱又俾分座既而出世金陵崇因帝師授以佛日普照之號遷鳳山資福升主報國至中天竺示衆曰心不是佛智不是道一念涉思惟全身入荒草所以道目前無法意在目前不是目前法非耳目之所到古今天地古今日月古今山河古今人倫頭頭顯露物物全彰不從千聖借不向萬機求內外絶承當古今無處所恁麼解會猶是錯認驢鞍橋作阿爺下頷雖然既是泗洲大聖因甚在揚州出現良久云參空岩有禪師室中勘驗學者垂語云黃金鑄就鐵真人東海湧頌曰錦衣公子醉田家熟睡柴牀日未斜熱渴呼漿無所得便將玉帶換甌茶雪屋珂禪師上堂云枯桑知天風海水知天寒且道衲僧知箇什麼知道飯是米做直饒恁麼閻羅老子索飯錢有日在師以宋鼎既遷即謝寺事金山賢默菴雅知師且尊其道行時元兵下江南默菴被總兵巴延脅而置之幕中從至武林默菴言於巴延請師升住靈隱親持請疏叩師門師抽關露半面問曰汝為誰默菴曰和尚故人某甲也師落關云我不識你蓋師雖處世外而以忠節自持故不屑靈隱之命後斷江思有詩云雪屋今亡四十年高風凜凜尚依然巴延丞相拜牀下不肯為渠來冷泉一溪自如禪師福建人元兵下江南師年少被遊兵虜至臨安遺之而去富民胡氏收養之令伴其子弟讀書鄉孰師偶立凝神靜聽默識無所失胡氏喜因子之既長命隸里中無相寺為僧參雲峰於徑山得旨戒檢精嚴法服應器不離體初住浙江萬壽寺後有大家黃氏重師道行常供以伊蒲塞饌一日請歸其家進供逾勤乃開私帑所藏金玉示師欲動其心師歸謂左右曰彼黃氏以帑中寶示我欲誘我死去為其子耳殊不知我視金玉瓦礫古人墮此轍者頗衆非但為其子為其牛馬者有之我自此其疏黃氏矣天厯初中天竺笑隱奉詔開山大龍翔寺因舉代住者三人御筆點師名宣政院具疏敦請久之化去茶毗靈異頗多季潭泐禪師於洪武元年戊申四月十五日入寺上堂云金剛王劍橫揮千妖屏迹爍迦羅眼洞照萬物潛形到此卷舒在己殺活臨時直得千歲巖中天𨁝跳錢塘水東流逆流諸人還知有也無遂竪拂子云庭前石笋抽條也會見高枝宿鳳凰復舉南泉初入院大衆送歸方丈僧問端居丈室將何指示於人泉云昨夜三更失却牛天明起來失却火師云大小南泉不唯瞞人亦且自瞞新天竺用處也要大家知有忽有問端居丈室將何指示於人劈脊便棓且道與古人是同是別卓拄杖下座下天竺寺宋慈雲法師名遵式字知白台州寧海葉氏母夢咽明珠而生出家於東掖山傳天台教於寶雲通師未幾繼其席祥符八年刺史薛公請居靈山天竺寺寺久廢師按其舊而新之王文穆出守重師之道奏復天竺名尋請賜慈雲號章獻太后遣使賫白金命修懺師著金光明護國儀文上之因奏請天台教文入藏又依經撰集諸懺法盛行於世常行三昧以九十日為期師力行之感應非一凡為法祈禱必然指唯存三焉及建光明懺堂每架一椽一甃必誦大悲呪七遍屢經兵火巋然獨存願力致也師詩文典雅有金園靈苑天竺別集天聖九年歸東嶺草堂明年十月十八日夜有大星隕於山師示寂纍諡法寶禪慧淳祐八年加諡聖應十一年諡正覺隋觀法師字聖達錢塘范氏生有奇相左掌仙文右掌人字口流津液充潤榮府從幼至終未嘗患渴舌文交加狀如羅綺八歲通詩禮和𢈔尚書林檎之作沙門洪偃才邁儒英鈎深釋傑面相謂曰顴高多知耳白有名我有四絶爾具八能謂義導書詩辨貌聲棊是也學士傳縡嗟曰三千稱首七十當初是上人者當為酬對時人語曰錢塘有貞觀當天下一半尋謁天台智者請受禪觀智者以師齊年止為法兄弟開皇十五年於靈隱山頭陀石室宴坐衆建南天竺寺請師居焉是為開山始祖常講法華以為心要感臯亭神請講捨祠宇為佛殿每盥洗餘滴地不為濡人尤異之師有雅操文帝三徵秦王兩延皆以疾辭大業中因山行自標葬地未幾示寂夢與智者同輩翼佛還山覺而歎曰吾六十二應終以講法華力延一紀今七十四生期畢矣中夜入寂塔在東岡久廢不治天禧中慈雲重修集慶寺集慶法師諱士璋字原璞生於海寧王氏伏犀貫頂目光炯炯射之自幼去羶葷即御輒嘔逆唯日取天竺集讀之鄰寺僧競曰此釋氏種也後投城東太平興國傳法寺服五戒服其師某與翰林待制柳公貫遊公嘗憩止寺中親授法師儒家羣經為正句讀敷繹旨要法師聞之有如破竹數節之後皆迎刃而解年十九始除鬚髮尋稟持犯於某師時佛護宣覺顯慈匡道大師自四明延慶遷主武林上天竺寺大師諱本無字我菴佛海法師湛堂澄公之嫡子令譽隆洽一時名浮圖爭擁輪下法師將擔簦趨之忽夢遊寶所大乘菩薩教之互跪作禮口唱懺辭覺而思之乃普賢淨行品偈文也法師以為祥徵佛護一見果刮目相視凡天台大小部書以次環授之志慮專一飢則親狎釜鬵以事烹飪一飽而止寒暑晝夜若不知切身佛護如三吳俾法師遷丈室之西以便飲食逮還見白煙一抹起其寢所則自爨猶故也佛護陰鑒其勤以遠大期之佛護之門人曰天心瑩素高亢不服人亦歆豔法師之行約其燈火磨切詰難極於毫絲餘子皆望風而畏稱為雙璧元至正十三年江南行宣政院命主州之棲真寺棲真與南天竺演福鄰古稱教海而大用才公絶宗編公二大長者皆在焉法師猶以學之未足時往叩其所未至凡部味教觀之奧偏圓本迹之微疇昔有疑而未徹者二老無不條分縷析以喻之法師彈指歎曰佛法教藏渺如煙海固非獨善偏長所能究也洪武之初以集慶虛席請師提唱接引如旌德時有過無弗及焉未幾竟入涅槃師所著書多未脫詩文有別録若干卷滅幻禪師諱善繼住集慶寺夢神授白蓮而生蓋永明壽師後身也長治春秋嘆曰此身終壞即穹爵因春秋而致得幾何春秋耶乃棄去傳法湛堂澄修法華懺每多感應豪俊執經輪下與唱和焉及還華徑了池深本寒處修十六觀證壽無量舍利纍纍即其師澄與清古源澤雲夢齊名而皆得圓菴果之傳住演福普福寺普福法師天岸諱弘濟字同舟一字天岸餘姚姚氏投同里寶積寺舜田滿公出家滿公師之從父也師駿發紀倫或授法華經輒能記憶年十六受度為大僧日持四分律跬步之間不敢違越繩尺已而嘆曰成固不可緩情教乘以資行解其又可後乎於是往鄞依半山全公讀天台之書久之悉通其玄義嘗修法華金光明淨土期懺聚精會神存誡不二髣佛於觀定中覩尊者畀以犀角如意自是談辨日增河懸泉湧而了無留礙未幾師於泰定元年開法於萬壽圓覺寺浙河左右傑偉之士奔走其室惟恐後之議者謂倡佛海之道以播芳猷實自師始明年鹽官海岸崩民朝夕惴惴恐為魚鱉江浙行省右丞相托歡甚憂之祈禜觀音大士於上天竺仍請師親履其地建水陸冥陽大會七晝夜師冥心觀想取海沙祝之親帥其徒遍擲其處凡足迹所及岸為不崩人咸異之天歷元年升主顯慈集慶二寺皆杭之名剎師處之泊然至正七年壽八十矣錢塘諸名山以耆舊凋謝唯師一人巋然如魯之靈光又以大普福寺起之師堅臥不應門人法航進曰和尚自為計固善矣其如斯道何師強赴之居亡何竟拂衣旋故丘開清鏡閣而深蟄焉因覽諸家所注首楞嚴經繁簡失當方將折衷其説為疏解俄疾作召四衆至以唯心淨土惓惓為勉其中或未解師意師厲聲曰死生難死生難遽索觚翰書偈而寂十六年三月十日也後七日法孫至大清晏以陶器奉蛻質葬於里之蛾眉山松花塢師之所自卜也鳳林寺唐鳥窠道林禪師富陽氏母夢日光入口有娠誕時異香滿室遂名香光幼出家詣長安西明學華嚴代宗詔國一禪師至闕師謁之得法南歸抵西湖秦望山有大松樹盤屈如蓋乃止其上時人因以鳥窠名之復有鵲巢其側自然馴狎元和中刺史白居易入山訪之問曰師之住處何其危險耶師曰太守危險尤甚曰余忝郡守何險之有師曰心火相交識性不停得非險乎公悅以偈問曰持入空門問苦空敢將禪事叩禪翁為當夢是浮生事為復浮生是夢中師答曰來時無迹去無蹤去與來時事亦同何須更問浮生事秪此浮生是夢中衣衲穿敝寒暑不更經歷年歲未嘗下山長慶四年入寂塔於北山之喜鵲寺焉杭州招賢寺會通禪師本郡人姓吳氏本名元卿形相端嚴幼而聰敏唐德宗時為六宮使王族咸美之春時見昭陽宮華卉敷榮玩而久之倐聞空中有聲曰虛幻之相開謝不停能壞善根仁者安可嗜之師省念稚齒崇善極生厭患帝一日遊宮問曰卿何不樂對曰臣幼不食葷羶志願從釋曰朕視卿若昆仲但富貴欲出於人表者不違卿唯出家不可既浹旬帝覩其容悴詔王賓相之奏曰此人當紹隆三寶帝謂師曰如卿願任選日遠近奏來師荷德致謝尋得鄉信言母患乞歸寧省帝厚其所賜敕有司津道師至家未幾會韜光法師勉之謁鳥窠為檀越與結庵創寺寺成啓曰弟子七歲蔬食十一受五戒今年二十有二為出家故休官願和尚授與僧相曰今時為僧鮮有精苦者行多浮濫師曰本淨非琢磨元明不隨照曰汝若了淨智妙圓體自空寂即真出家何假外相汝當為在家菩薩戒施俱修如謝靈運之儔也師曰然理雖如此於事何益倘垂攝受則誓遵師教如是三請皆不諾時韜光堅白鳥窠曰官使未嘗娶亦不畜侍女禪師若不拯接誰其度之鳥窠即與披剃具戒師常卯齋晝夜精進誦大乘經而習般舟三昧尋固辭遊方鳥窠以布毛示之悟旨時謂布毛侍者暨鳥窠歸寂垂二十載武宗廢其寺師與衆僧禮辭靈塔而邁莫知其終智果寺錢塘道潛禪師以詩見知於蘇文忠公公號師為參寥子凡詩詞迭唱更和形於翰墨必曰參寥及交呂丞相公著與簡牘則稱曰妙總老師浙江石刻存者甚多後公離錢塘以長短句別之曰有情風萬里卷潮來無情送潮歸問錢塘江上西興浦口幾度斜暉不用思量今古俯仰昔人非誰似東坡老白首忘機記取西湖西畔正暮山好處空翠煙霏算詩人相得如我與君稀約他年東還海道願謝公雅志莫相違西州路不應回首為我沾衣仲溫瑩禪師贊曰噫今世之小生於有道宗師必名呼而示其忽慢亦安知文忠於一詩僧尚爾敬重况道德崇重者乎瑪瑙寺宋孤山法師名智圓字無外錢塘徐氏八歲出家傳天台三觀於奉先源清師嘗歎荊溪沒後微言墜地於是留意撰述作十疏通經師蚤勤儒學兼涉老莊自號中庸子居孤山瑪瑙院有高世之節時王文穆罷相來牧郡僧悉迎於關外慈雲遣使邀師偕往師以疾辭笑謂使者曰為我致意慈雲錢塘且駐却一僧聞者歎服師少抱羸疾多杜門獨居惟與處士林逋為鄰友相好以詩文自娛雜著五十一卷題曰間居編乾興元年二月十七日自作祭文挽辭越二日示寂門人奉遺訓斫院之後山斂以陶器合而瘞之後十五年積雨山頺啓陶覩師真身不壞爪髮俱長其唇微開齒若珂雪諡號法慧治平二年改名寶勝院紹興二十一年創延祥觀有司新師所居以廣之移額山北併塔遷焉孤山祥符寺法師可久錢塘錢氏天聖初覃恩得度學教觀於淨覺無出世志喜為古律詩蘇軾監郡日與師為詩友居西湖祥符軾來守錢塘當元夕九曲觀燈去從者獨行入師室了無燈火但聞薝蔔餘香歎仰留詩有不把琉璃門照佛始知無盡本非燈之句晚年杜門送客不逾閾辟穀安坐觀鍊薰修如此十餘年窗外唯紅蕉數本翠竹百箇淡如也一日謂人曰吾死蕉竹亦死擇瑛公亦死未幾皆驗人嗟異之湖心寺紹岩居錢塘湖心寺專誦法華期滿萬部得生淨土一旦有蓮華生於陸地岩誓焚身供養西方三聖吳越王俶力勸止之一旦見蓮華光照其身越三日欣然坐化西湖三塔妙慧文義禪師上堂云會麼已被熱謾了也今早起來無窖可説下牀著鞋後架洗面堂內展鉢喫粥粥後打睡睡起喫茶見客相喚齋時喫飯日日相似有甚麼過然雖如是更有一般令我笑金剛倒地一堆泥拍禪牀下座毒峰禪師諱本善祖鳳陽人隨任生於廣東之雷陽父吳姓母鍾氏稚小以佛事為兒戲十七歲出家初投源明和尚請益明示以無字公案正統八年入閩參無際師聞鐘聲有省次見蒙隱次見楚山次見月溪溪印可之從前打七掩關曉夜無怠厯盡百倍苦功乃得大徹復蒙古庭重授衣拂天順庚辰趙氏建西湖三塔寺請師開山繼興天目昭明繼興吳山實蓮繼興南山甘露成化庚子掩關石屋寺壬寅慈雲嶺有山曰登雲寺曰天真僧宗綱請師興建事竣即掩關杜人事涵養陶汰有四十餘年秪掩關之句示寂後門人悟深戒新等輯師言論行實名昭明甘露天真三處語要録云護國寺隆興黃龍無門慧開禪師杭州良渚人俗姓梁母宋氏禮天龍肱和尚為受業師參月林於蘇之萬壽林令看無字話經於六年迥無入處乃奮志剋責誓云若去睡眠爛却我身每至困時廊下行道以頭向露柱磕一日在法座邊立忽聞齋鼓聲有省成偈曰青天白日一聲雷大地羣生眼豁開萬象森羅齊稽首須彌𨁝跳舞三臺次日入室欲通所得林遽曰何處見神見鬼了也師便喝林亦喝師又喝自此機語吻合嘉定十一年出世安吉報國繼遷隆興天寧黃龍翠岩蘇之開元靈岩鎮江焦山金陵保寧淳祐六年奉旨開山護國仁皇寺上堂云若人識得心大地無寸土古人恁麼道黃龍即不然若人識得心大地盡是土上堂云是非長短耳邊風切莫於中覔異同要得八風吹不動放教心地等虛空慈受老人只解順水張帆不能迎風把柁黃龍又且不然是非都去了是非裏薦取何故聻幾度黑風大浪未曾聞道釣舟傾上堂云三分光陰二早過懷州牛喫禾靈臺一點不楷磨益州馬腹脹貪生逐日區區去天下覔醫人喚不回頭爭奈何炙豬左膊上於斯薦得參學事畢其或未然拈拄杖云請木上座與諸人説被卓拄杖一下上堂云趙州和尚云南來者與他下載北來者與他上載大似世情看冷暖人面逐高低慈受和尚云南來者與他一面笑北來者與他一面笑大似歡喜廝散笑裏有刀若是焦山又且不然南來者以平常待之北來者以平常待之也不嗔也不笑也無下也無高何故清平世界不用干戈作朝陽偈曰寒時急用底物趂暖著些針線忽然臘月到來免致腳忙手亂對月偈曰始見些兒光影要了末後一段若是無門拳頭不打這般鈍漢師晚年倦於槌拂菴居西湖之上參學者猶衆理宗召入選德殿説法祈雨隨即感應敕賜金襴法衣佛眼之號以示褒寵杭州護國臭菴宗禪師上堂舉豐干謂寒山拾得云你與我去遊五臺便是我同流寒山云你去遊五臺作麼干云禮拜文殊山云你不是我同流師云豐干開口不在舌頭上寒山云同坑無異土檢點將來兩個駝子廝撞著世上應無直底人上堂舉嶽林振禪師示衆云布袋口開還有買的麼僧云有林云不作賤不作貴作麼生買僧無語林曰老僧失利師云嶽林設箇問端也甚奇特及至被人道箇有字直得東遮西掩囊藏不迭護國云今日布袋口開還有買底麼良久云欄干雖共倚山色不同觀昭慶寺宋真悟律師名允堪錢塘人年九歲有客指小桂試之答曰始生巖谷畔早有月中香辨博精通撰律宗十二部經解經傳并法門贊序等文慶厯七年賜號真悟大師崇寧間加諡智圓嘉禾陳舜俞撰行業記元瘞西湖湧泉山後遷塔菩提宋道匡禪師上堂次大衆擁法座而立師曰這裏無物諸人苦恁麼相促相拶作麼擬心早沒交涉更上門上戶千里萬里今既上來各著精彩昭慶一時拋與諸人好麼乃曰還接得也無衆無對師曰勞而無功便升座復曰汝諸人得甚麼鈍看他古人一兩箇得恁麼快才見便負將去也較些子若有此箇人非但四事供養便以琉璃為地白銀為壁亦未為貴帝釋引前梵王隨後攪長河為酥酪變大地為黃金亦未為足直得如是猶更有一級在還委得麼珍重省僜禪師開堂升座僧將同學人全身不會請師指示師曰還解笑得麼乃曰叢林先達者不敢相觸忤若是初心後學未信直須信取未省直須省取不用掠虛諸人本分去處未有一時不顯露未有一物解蓋覆得如人若要知不用移絲髮地不用少許工夫但向博地凡夫位中承當取豈不省心力既能省得便與諸佛齊眉依而行之緣此事是箇白淨去處今日須得白淨身心合他始得自然合古合今脫生離死古人云識心達本解無為法方號沙門如今諸官大衆各須體取好莫全推過師僧分上佛法平等上至諸佛下至一切共同此事既然如此誰有誰無王事之外亦須努力適來説如許多般蓋不得已而已莫道從上宗門合恁麼語話秖如從上宗門合作麼生還想悉麼若有人想悉山僧今日雪得去也久立大衆珍重示坐禪方便頌曰四威儀內坐為先澄濾身心漸坦然瞥爾有緣隨濁界當須莫續是天年修持秪學從功路至理寧論在那邊一切時中常管帶因緣相湊豁通玄宋省常錢塘人七歲出家淳化中住昭慶慕廬山之風結淨行社於西湖士夫預會者百二十人而王文正公旦為之首比丘亦千人焉翰林蘇易簡作淨行品序至謂余當布髮以承其足剜身以請其法猶尚不辭况陋文淺學而有惜哉天禧四年正月十二日端坐念佛有頃厲聲唱云佛來迎也泊然而化子元禪師號萬事休平江崑山茅氏子母柴氏夜夢佛一尊入門遂生因名佛來父母早亡投本州延祥寺志通出家習誦法華經十九歲落髮習止觀禪法一日正定中聞雅聲悟道乃有頌曰二十餘年紙上尋尋來尋去轉沉吟忽然聽得慈雅叫始信從前錯用心於是利他心切發廣度願乃慕廬山遠公蓮社遺風勸人皈依三寶受持五戒乃撮集大藏要言編成白蓮晨朝懺儀代為法界衆生禮佛懺悔祈生安養後往澱山湖創立白蓮懺堂同修淨業述圓融四上三觀選佛圖開示蓮宗眼目四十六歲障臨江州逆順境中未嘗動念隨方勸化即成頌文目曰西行集乾道二年壽聖高宗詔至德壽殿演説淨土法門特賜勸修淨業白蓮導師慈照宗主就居錢塘西湖昭慶寺祝聖謝恩佛事畢嘗為九有四生發大誓言願大地人普覺妙道每以四字為定名之宗示導教人專念彌陀同生淨土從是宗風大振師集彌陀節要法華百心證道歌風月集行於世明年三月二十三日於鐸城倪普建宅告諸徒曰吾今化緣已畢當於此時行矣言訖合掌辭衆奄然示寂二十七日茶毗舍利無數玉泉寺齊玉泉法師名曇超姓張氏清河人身長八尺蔬食布衣獨宿山林虎兕不傷建元末棲錢塘靈苑山夏常講經有一老人來聽詰其姓氏曰我非人乃龍也居富春鹿山之下鄉民鑿山侵龍居龍忿不雨今纍月矣屈師一往誨化羣龍師允其請且曰吾此地亦無水汝能致之乎老人即撫掌泉自湧出今玉泉是也師乃往彼結壇為龍受戒浮舟講經雨大霑洽嘉定三年賜號靈悟大師懿禪師久依圓悟自謂不疑紹興初出住興化祥雲法席頗盛大慧入閩知其所見未諦致書令來師遲遲慧小參且痛斥仍榜告四衆師不得已破夏謁之慧鞫其所證既而曰汝恁麼見解敢嗣圓悟老人耶師退院親之一日入室慧問我要個不會禪底做國師師曰我做得國師去也慧喝出居無何語之曰香巖悟處不在擊竹邊俱胝得處不在指頭上師乃頓明虎跑寺唐杭州大慈山釋寰中姓盧氏河東蒲坂人稟靈特異挺質殊倫聲若鐘響色猶脂凝學通終古辭實豐贍年二十五隨計中甲科然未塞其懷無何遭母憂廬墓服闋徑往北京童子寺出家二稔未周諸經皆覽明年往嵩嶽登戒肄習律部於茲博通忽慕上乘決往百丈山深得玄旨後隱南嶽常樂寺結茅山椒諫議大夫崔公深重其操因別立方丈虞淵景晞一飯永日然苦乏水羸瓶遠求俄爾深宵有虎嘷嘯廬側詰旦視之果檻泉坼地而湧足其汲用後之杭有山號大慈居未久檀信爰臻旋成巨院四方僧侶參禮如雲壬午歲終時漸溽暑驗其身一無變異而頂門燠潤如冬窆於塔所享年八十三法臘五十四至乾符丁酉歲敕諡大師號性空塔名定慧縉雲太守段成式為真讚焉慧因寺慧因懷祥禪師上堂云南山高北山低日出東方夜落西白牛上樹覔不得烏雞入水大家知且道覔得後又如何良久曰堪作甚麼慧因義寧禪師僧問佛未出世時如何師曰摩耶夫人曰出世後如何師曰悉達太子淨源住慧因院見長水諸師專精雜花因合二疏及製此經之懺而解羣經文亦精勤高麗義大師焉法相寺長耳和尚名行修住法相寺幼勤課誦雪峯存公曳其耳至於肩入城士女每牽其耳結於頤下修惟默笑或勸修福能遮百醜永明壽語錢王此定光佛應身也修聞之曰彌陀饒舌遂坐化今漆身猶存追諡宗慧六通寺五代杭州六通慈德僧彥求姓葉氏縉雲人也梁均王貞明年間納戒造景霄律席迥見毗尼祕邃方將傳講我悟沓婆羅漢反求堅固法乃遊閩嶺得長慶祖傳心訣回浙受丹丘人請居六通院其道望惟馨漢南國王錢氏欽其高行復命住功臣院終於龍華寺四遠人聚日有千僧食大作佛事也宋杭州龍興宗靖禪師台州人也初參雪峯密承宗印乃自誓充飯頭服勞逾十載常於衆堂中袒一膊釘簾雪峯覩而記曰汝向後住持有千僧其中無一人衲子也師悔過辭歸故鄉住六通院錢王命居龍興寺有衆千餘惟三學講訟之徒果如雪峯所志周廣順初年八十一錢王請於寺之大殿演無上乘黑白駢擁僧問如何是六通奇特之倡師曰天下舉去問如何是六通家風師曰一條布衲一斤有餘僧問如何是學人進前一路師曰誰敢謾汝曰豈無方便師曰早是屈抑也問如何是和尚家風師曰早朝粥齋時飯曰更請和尚道師曰老僧困曰畢竟作麼生師大笑而已錢王特加禮重屢延入府以始住院署六通大師顯德元年甲寅季冬月示滅壽八十四塔於大慈山龍井寺宋杭州龍井通禪師處樓上座問如何是龍井龍師曰意氣天然別神工畫不成曰為什麼畫不成師曰出羣不戴角不與類中同曰還解行雨也無師曰普潤無邊際處處皆結粒曰還有宗門中事也無師曰有曰如何是宗門中事師曰從來無形段應物不曾虧問如何是吹毛劍師曰拽出死尸著宋辨才淨法師名元淨字無象於潛徐氏生而左肩肉起如袈裟縧八十一日乃滅父嘆曰是宿世沙門也自幼出家受業於慈雲日夜精勤慈雲沒後復事明智年二十五賜紫衣及辨才號太守沈公遘謂上天竺觀音道場以音聲懺悔為佛事非禪那居請師以教易之師至吳越競來鑿山增室幾至萬礎學者數倍十七年有利而奪之者逾年敗復以舁師趙清獻公贊之云師去天竺空山鬼哭天竺師歸道場光輝越二年謝去老於南山龍井之上平生精修淨業行成力具著應非一嘗與僧熙仲同食仲視師眉間有光如螢攬之得舍利後常有於臥起處得舍利者元祐八年示寂壽八十一果符初生肩痕之徵塔成東坡志其行事穎濱為銘五雲院杭州五雲山華嚴道場志逢大師餘杭人也生惡葷血膚體香潔幼歲出家於本邑東山朗瞻院早年受具通貫三學了達性相嘗夢升須彌山覩三佛列坐初釋迦次彌勒皆禮其足惟不識第三佛但仰視而已時釋迦示之曰此是補處彌勒師子月佛師方作禮覺後因閲大藏經乃符所夢天福中遊方抵天台出雲居道場參國師賓主緣契頓發玄祕一日因入普賢殿中宴坐倐有一神人跪膝於前師問曰汝其誰乎曰護戒神也曰吾患有宿愆未殄汝知之乎曰師有何罪唯一小過耳師曰何也曰凡折鉢水亦施主物師每常傾棄非所宜也言訖而隱師自此洗鉢水盡飲之積久因致脾胃疾十載方愈吳越國王嚮其道風召賜紫署普覺大師初命住臨安功臣院玄侶輻湊師上堂曰諸上座捨一知識而參一知識盡學善財禮遊之式樣也且問上座只如善財禮辭文殊擬登妙峰山謁德雲比丘及到彼所何以德雲却於別峰相見夫教意祖意同一方便終無別理彼若明得此亦昭然諸上座即令簇著老僧是相見是不相見此處是妙峰是別峰脫或從此省去可謂不孤負老僧亦嘗見德雲比丘未嘗剎那相捨離還信得及麼僧問叢林舉唱曲為今時如何是功臣的的意師曰見麼曰恁麼即大衆咸欣也師曰將謂師子兒問佛佛授手祖祖傳心未審和尚傳箇什麼師曰汝承當得麼曰學人承當不得還別有人承當得否師曰大衆笑汝問如何是如來藏師曰恰問著問如何是諸佛機師曰道是得麼師一日上堂良久曰大衆看看便下座歸方丈開寶初忠懿王創普門精舍三請住持再揚宗要即普門第一世師上堂曰古德為法行腳實不憚勤勞如雪峰和尚三回到投子九度上洞山盤桓往返尚求箇入路不得看汝近世參學人才跨門來便待老僧接引指掌説禪且汝欲造玄極之道豈當等間况此事悟亦有時操求焉得汝等要知悟時麼如今各且下去堂中靜坐直待仰家峰點頭老僧即為汝説時有僧出曰仰家峰點頭也請師説師曰大衆且道此僧會老僧語不會老僧語其僧禮拜師曰今日偶然失鑒問如何是普門家風師曰幾人觀不足曰如何是普門境師曰汝到處且問家風了休開寶四年師固辭國主稱年老願依林泉頤養時大將凌超以五雲山新創華嚴道場奉師為終老之所雍熙二年乙酉十一月忽示疾二十五日命侍僧辦香水盥沐跏趺而坐良久告寂壽七十七臘五十八塔曰寶峰常照開化寺月輪山開化傳法大師行明本州人也姓于氏少投明州雪竇山智覺禪師披剃及智覺遷住永明大道場有徒二千王臣欽仰法化彌盛師自天台受記回永明翼贊本師海衆傾仰開寶八年智覺歸寂師遂住能仁寺忠懿王又建大和寺延請住持二處皆聚徒説法僧問如何是開化門中流出方便師曰日日潮音兩度聞問如何是無盡燈師曰謝闍黎照燭太宗皇帝賜紫衣師號咸平四年四月六日示滅宋僧統贊寧法師姓高氏其先世渤海人天祐中師生於吳興郡之德清金鵝別墅出家杭之祥符習南山律宗著述毗尼時人謂之律虎文學日茂聲望日隆武肅諸王公族咸慕重之署為兩浙僧統賜號明義宗文興國三年太宗聞其名詔對滋福殿延問彌日改賜通慧詔修大宋高僧傳三十卷又詔撰三教聖賢事一百卷初補左街講經首座知西京教門事咸平初加右街僧録師又著內典集一百五十卷外學集四十九卷內翰王禹稱作文集序極其贊美又有書稱其文辭末云所謂時雨降矣日月出矣灌溉爝火復何為哉至道二年示寂葬龍井塢崇寧四年加諡圓明天龍寺五代杭州天龍寺重機明真大師台州黃巖人自玄沙得法回入浙中錢武肅王請説法住持上堂示衆曰若獨舉宗風獨唱本分事便同於頑石若言絶凡聖消息無大地山河盡十方世界都是一隻眼此乃事不獲已恁麼道所以常説盲聾瘖啞是仙陀滿眼時人不奈何只向目前須體妙身心萬象與森羅僧問如何是璿璣不動師曰青山數重僧曰如何是寂爾無根師曰白雲一帶問如何是歸根得旨師曰兔角生也僧曰如何是隨照失宗師曰龜毛落也問蓮華未出水時如何師曰誰人不知有僧曰出水後如何師曰馨香目擊問朗月輝空時如何師曰正是分光景何消指玉樓天龍俱胝和尚初住庵時有尼名實際來戴笠子執錫繞師三匝曰得道即下笠子如是三問師皆無對尼便去師曰日勢稍晚何不且住尼曰道得即住師又無對尼去後師歎曰我雖處丈夫之形而無丈夫之氣不如棄菴往諸方參尋知識去其夜山神告曰不須離此將有肉身菩薩來為和尚説法也逾旬果天龍和尚到菴師乃迎禮具陳前事龍竪一指示之師當下大悟自此凡有學者參問師唯舉一指無別提唱有一供香童子每見人問事亦竪指祗對人謂師曰和尚童子亦會佛法凡有問皆如和尚竪指師一日潛抽刀子問童曰聞你會佛法是否童曰是師曰如何是佛童竪起指頭師以刀斷其指童叫喚走出師召童子童回首師曰如何是佛童舉手不見指頭豁然大悟師將辭世謂衆曰吾得天龍一指頭禪一生用不盡言訖示滅後唐杭州天龍寺釋道怤俗姓陳永嘉人丱總性殊常惡𦎬血親黨強啖以枯魚即嘔噦求出家於開元寺具戒已遊閩入楚言參問善知識要決了生死根源見臨川曹山寂公大有徵詰頓息疑於雪峰閩中謂之小怤布衲時大原同名以年臘之高故暨回浙住越州鏡清院時皮光業者日休之子辭學宏贍探賾禪門𡮢深擊難焉退而謂人曰怤公之道崇論閎議莫臻其極錢武肅王欽慕命居天龍寺私署順德大師次文穆王創龍册寺請怤居之吳越禪學自此而興以天福丁酉歲八月示滅春秋七十茶毗於大慈山塢收拾舍利起塔於龍姥山前故僧主彚征撰塔銘今舍利院弟子主之香火相綴焉杭州天龍和尚上堂云大衆莫待上來便上來下去便下去各有華藏性海具足功德無礙光明各各參取珍重僧問如何是祖師意師竪起拂子僧問如何得出三界去師云汝即今在什麼處宋杭州天龍秀禪師上堂謂衆曰諸上座多少無事十二時中在何世界安身立命且子細點檢看何不覔箇歇處因什麼却與別人點檢若恁麼去早落第二頭也時有僧問承師有言恁麼去早落第二頭學人總不恁麼上來師如何辨白師曰汝却作家曰恁麼即今日得遇於師也師曰汝且莫詐明頭問承古有言二人俱錯未審古人意旨如何師曰汝何人自檢責曰恁麼即人天有賴也師曰汝不妨靈利本國署清慧大師龍華寺宋龍華真覺大師靈照高麗人萍遊閩越升雪峰之堂冥符玄旨居惟一衲服勤衆務閩中謂之照布衲一夕指半月問溥上座那一片什麼處去也溥曰莫妄想師曰失却一片也衆雖歎美而恬淡自持初止婺州齊雲山上堂良久忽舒手視其衆曰乞取些子乞取些子又曰一人傳虛萬人傳實僧問草童能歌舞未審今時還有無師下座作舞曰沙彌會麼僧曰不會師曰山僧踏曲子也不會問靈山會上法法相傳未審齊雲將何付囑師曰不可為汝一人荒却齊雲也曰莫便是親付囑也無師曰莫令大衆笑問還丹一粒點鐵成金至理一言點凡成聖請師一點師曰還知齊雲點金成鐵麼曰點金成鐵未之前聞至理一言敢希垂示師曰句下不薦後悔難追師次居越州鏡清院海衆悅隨一日謂衆曰盡令去也僧曰請師盡令師曰吽吽問如何是學人本分事師曰鏡清不惜口問請師雕琢師曰八成曰為什麼不十成師曰還知鏡清生修理麼師問僧什麼處來曰五峰來師曰來作什麼曰禮拜和尚師曰何不自禮曰禮了也師曰鏡湖水淺問如何是第一句師曰莫錯下名言曰師豈無方便師曰烏頭養雀兒問向上一路千聖不傳未審什麼人傳得師曰千聖也疑我曰莫便是傳也無師曰晉帝斬嵇康問釋迦掩室於摩羯淨名杜口於毗耶此意如何師曰東廊下兩兩三三師謂衆曰諸方以毗盧法身為極則鏡清遮裏即不然須知毗盧有師法身有主問如何是毗盧師法身主師曰二公爭敢論問古人道見色便見心此即是色那阿箇是心師曰恁麼問莫欺山僧麼問未剖以前請師斷師曰落在什麼處曰恁麼即失口也師曰寒山送溈山後湖守錢公上杭之西關創報慈院延請開法禪會翕然依附尋而錢王建龍華寺迎金華傅大士靈骨道具置焉命師住持晉天福十二年丁未閏七月二十六日終於本寺壽七十八塔於大慈山契盈廣辨周智大師本福州黃蘗山受業於長慶領旨住後僧問如何是龍華境師曰翠竹搖風寒松鎖月僧曰如何是境中人師曰切莫唐突問如何是三世諸佛道場師曰莫別瞻禮僧曰恁麼則亘古亘今師曰是什麼年中問如何是黃蘗山主師曰謝仁者相訪問如何是黃蘗境師曰龍吟瀑布水雲起翠微峰慧居禪師開堂示衆曰從上宗乘到這裏如何舉唱秪如釋迦如來説一代時教如瓶注水古德尚云猶如夢事寱語一般且道據甚麼道理便甚麼道還會麼大施門開何曾壅塞生凡育聖不漏纖塵言凡則全凡舉聖則全聖凡聖不相待個個獨稱尊所以道山河大地長時説法長時放光地水火風一一如是時有僧出禮拜師曰好個問頭如法問著僧擬進前師曰又沒交涉也上堂云龍華這裏也秪是拈柴擇菜上來下去晨朝一粥齋時一飯睡後喫茶但恁麼參取珍重勝果寺無著禪師名文喜嘉興朱氏年七歲依本邑常樂寺國清出家剃染習律聽教屬武宗汰教反服韜晦宣宗初再度於鹽官齊峰寺往五臺禮文殊遇一老翁牽牛而行邀師入寺翁縱牛引師升堂翁踞牀指繡墩命坐翁曰近自何來師曰南方翁曰南方佛法如何住持師曰末法比丘少奉戒律翁曰多少衆師曰或三百或五百師却問此間佛法如何住持翁曰龍蛇混雜凡聖同居師曰多少衆翁曰前三三後三三翁呼童子均提致茶又進酥酪翁拈起玻璃盞問曰南方還有這箇杯師曰無翁曰尋常將甚麼喫茶師無對辭別翁令童子相送師問童子前三三後三三是多少童召大德師應諾童曰是多少師曰此為何處童曰此金剛窟般若寺也師恍然悟彼翁者文殊也即稽首童子願乞一言為別童説偈曰面上無嗔供養具口裏無嗔吐妙香心裏無嗔是珍寶無垢無染是真常言訖均提與寺俱隱懿宗咸通三年師至洪州龍興觀音參仰山寂禪師頓悟心法後回浙西住龍泉寺杭州錢王奏賜紫衣署無著禪師至是光化三年十月三日告衆曰三界心盡即是涅盤言訖跏趺而逝壽八十歲塔於鷲峯靈隱之西塢哀帝天祐二年叛兵發師塔肉身不壞髮爪俱長錢王鏐聞之遣裨將邵志重加封瘞宋寧宗嘉定十三年遷葬大慈山智覺壽禪師塔左僧淨梵嘉禾人姓笪氏母夢光明滿室見神人似佛因而懷娠生甫十歲依勝果寺出家祝髮從湛謙二法師學教得其傳初住無量壽院凡講法華經十餘過大觀中結二十七僧修法華懺每期方便正修二十八日連作三會精恪上通感普賢受羯摩法呼淨梵比丘名聲如撞鐘時長洲縣宰王公度親目其事題石為記又常夢黃衣人請入冥見王者令檢簿云淨梵比丘纍經劫數講法華經即遣使送歸一日禪觀中合衆皆見金甲神人胡跪師前又在他處懺期蒙韋馱天尊點檢大衆中有戒不嚴淨者先以預定後果懺法不全時姑蘇守應公有婢為祟所惱請師授戒其妖即滅葛氏請施戒薦夫見夫繞師三匝而去待制賈公見師道行即補為管內法主師住持十餘年亡後焚軀有舍利五色報國寺大元杭州鳳山大報國廣智全悟笑隱欣禪師延祐七年四月二十三日入寺開堂拈香云此香爇向寶罏端為祝延今上皇帝聖躬萬歲萬歲次拈香云此香奉為江浙等處行中書省官行宣政院官洎諸衙門文武官僚資培祿算又拈香云此香昔年大雄峰頂一句下承當今日鳳凰山中五衆前拈出奉為前住徑山後住大仰佛智禪師晦機大和尚用酬法乳之恩就座問答罷乃云孤峰頂上目視雲霄無乃埋沒己靈十字街頭和泥合水且貴流通正眼拈拄杖云釋迦已滅彌勒未生正當今日千聖命脈列祖鉗鎚總在新報國手裏拈起也七穿八穴頭頭現無邊妙身放下也鑑地輝天處處彰寶王剎海説甚溪山各異雲月是同至化無為功不宰蕩然一片古皇風復舉志公令人傳語思大云何不下山教化衆生去一向目視雲漢作什麼思大云三世諸佛被我一口吞盡何處更有衆生可度師云思大被志公一拶直得倒退三千進退兩序上堂云心空及第選佛何必選官荷負叢林為衆一似為己報國為法擇人量才授職如樂奏九成左右進退無不合度只如一喝分賓主照用一時行諸人作麼生甄別喝一喝九萬里鵬才奮迅三千年鶴便翱翔上堂舉黃龍南禪師室中垂語云我手何似佛手我腳何似驢腳人人有箇生緣那箇是上座生緣師云黃龍三關如商君立法法雖立而廢先王之道故當時出其門者甚多得其傳者益寡使其恪守慈明家法子孫未致斷絶師一日問僧甚處來僧云遊山來師云笠子下拶破洛浦遍參底作麼生僧云未入門時已呈似和尚了也師云即今為什麼不拈出僧擬議師便打大明楚石禪師諱梵琦字楚石明州象山人朱姓母張氏元元貞二年丙申六月丁巳生在襁褓有僧謂其父曰此子必當振佛法照曜濁世九歲從海鹽天寧訥公受業十六為僧二十侍族祖晉翁洵公因閲楞嚴至緣見因明暗成無見不明自發則諸暗相永不能昏於此有省元於向上一著尚有滯礙元叟端和尚主徑山往參謁問如何是言發非聲色前不物叟遽云言發非聲色前不物速道速道師擬進語叟震威一喝師乃錯愕而退已而應書寫大藏之選至京師崇天門一夕聞綵樓上鼓聲豁然大悟東歸再參元叟叟笑迎曰且喜大事了畢未幾出世海鹽之福臻至元乙亥遷杭之報國洪武元年九月十一日徵師説法於蔣山上大悅又明年七月復被召二十六日偈曰真性圓明本無生滅木馬夜鳴西方日出端坐而逝闍維齒舌數珠不壞有語録二十卷及西齋淨土詩行世萬壽寺宋杭州靈鳳山萬壽法詮禪師僧問如何是佛師曰抱樁打拍浮曰如何是法師曰黃泥彈子曰如何是僧師曰剃除髮鬚曰三寶外還別有為人處也無師舉起一指僧曰不會師曰指在唯觀月風來不動幡上堂云德山棒臨濟喝盡是無風波匝匝燈籠𨁝跳過青天露柱醜驚頭惱裂然雖如是大似食鹽加得渴喝一喝靈芝寺宋大智元照律師字湛然餘杭唐氏少依祥符東藏慧鑑師學毗尼及見神悟謙公講天台教觀遂摳衣出門博究羣宗以律為本又從廣慈受菩薩戒戒光發見頓漸律儀罔不兼備南山一宗蔚然大振常披布伽黎杖錫持鉢乞食於市楊無為贊之曰持鉢出持鉢歸佛心常在四威儀初入𨞬時人不識虛空常有鬼神知四主郡席晚居靈芝凡三十年衆常數百嘗言化當世莫若講説垂將來莫若著書撰次持濟緣行宗應法住法報恩諸記十六觀小彌義疏及剛定律尼本共百餘卷芝園集二十卷自號安忍子政和六年秋命諷普賢行願品趺坐而化漁人聞天樂聲建塔靈芝西北諡大智佛印名了元居靈芝寺二歲通語論五歲日誦詩三千首稍長通五經因喜楞嚴語入釋得旨納公與蘇軾倡酬時策勵之聽客語合心一笑軒渠而化千佛寺漢錢塘千佛釋希覺字順之姓商氏世居晉陵覺生於溧陽家系儒墨屬唐季喪亂纍被剽掠自爾貧寠嘗傭書於給事中羅隱家偶問名居隱曰毗陵商家兒何至於此歎息再三多與顧直勸歸鄉修學至年二十五嘆曰時不我與或服冕乘軒皆一期爾忽求出家於溫州開元寺文德元年也龍紀中受戒續揣摩律部稟教於西明寺慧則律師時在天台山也則乃法寶大師之高足廣明中關中喪亂避地江表覺始窺其牆終見室家瓌富以則出集要記解南山鈔不稱所懷何耶古德妄相穿鑿各競師門流蕩忘返覺遂著記廣之曰增暉録蓋取曹植云螢燭末光增暉日月謙言增暉集要之日月也二十卷成部浙之東西盛行斯録暨乎則公長往乃講訓於永嘉武肅王錢氏季弟鏵牧是郡深禮重焉尋為愚僧所誣訴釋而不問徙於杭大錢寺文穆王造千佛伽藍召為寺主借紫私者曰文光大師焉四方學者騁騖而臻覺外學偏多長於易道著會釋記二十卷解易至上下繫及末文甚偹常為人較演此經付授於都僧正贊寧及乎老病乞解見任僧職既遂所懷惟嘯傲山房以吟詠為樂年八十一然猶抄書籍異本曾無告倦永終之前捨衣物作現前僧得施復普飯一城僧自此困憊每睡見有一人純衣紫服肌膚軟弱如綿纊焉意自相伴才欲召弟子將至此人舒徐下牀後還如故親向贊寧説此某知是天人耳囑託言畢而絶享年八十五生常所著擬江東説書五卷雜詩賦十五卷汪林鼎金陵懷古百韻詩雜體四十章覺之執持未嘗弛放勤於講訓切於進修學則彌老而不休官則奉身而知退可謂高志其事名節俱全長者之風藹然如在所居號釋氏西齋慕吳兢之蘊積編簡焉慈光寺宋釋晤恩字修己常熟人姓路母張氏嘗夢梵僧入其家而妊焉及稚孺見沙門相必起迎遲年十三聞誦彌陀經遂求出家親黨饒愛再三阻之乃投破山興福寺受訓後唐長興中受滿分戒登往崑山慧聚寺學南山律晉天福初從檇李皓端師聽習經論懸解之性天然時輩輒難抗敵後微聞天台三觀六即之説冥符意解漢開運中造錢塘慈光寺志因師講貫彌年通達法華光明經止觀論咸洞玄微尋施覆述出弟子相次角立雍熙三年八月朔日恩於中夜覩白光自井而出明滅不恆謂門人曰吾報齡極於此矣乃絶粒禁言一心念佛次夢擁衲沙門執金爐焚香三繞其室自言祖師灌頂來此相迎汝當去矣夢覺呼弟子至猶聞異香至二十五日為弟子説止觀旨歸及觀心義辰時端坐面西而化享年七十五僧臘五十五其夜院僧有興文偃等皆聞空中絲竹嘹亮而無鞉鼓且多鈴鐸漸久漸遠依稀西去逮九月九日依西域法焚獲舍利青白圓粒無算恩平時謹重一食不離衣鉢不畜財寶臥必右脅坐必跏趺弟子輩設堂居亦同今之禪室立制嚴竣日別親視明相方許淨人施粥曾有晚飲薯蕷湯者即時擯出黌堂每一布薩則灑不止蓋思其大集滿洲之言耳遍誨人以彌陀淨業救生死事受教得生感祥可見者往往有之凡與人言不問賢不肖悉示以一乘圓意或怪不逗機者乃曰與作毒鼓之緣耳不喜雜交遊不好言世俗事雖大人豪族未嘗輒問名居況迃趨其門乎先是天台宗教會冒毀廢文義殘缺談妙之辭沒名不顯恩尋繹十妙之始終研核五重之旨趣講大玄義文句止觀二十餘周解行兼明目足雙運使法華大旨全美流於代者恩之力也又嫌昔人科節與荊溪記不相符順因著玄義文句止觀金光明金錍論科總三十五帖見行於世吁河漢中有魚泝流而上者何潛泳有所取故恩公不寬乘戒而出弟子十有七人求解而行行耳立中成禪師錢塘女北鄉孫氏子也母夢比丘風神炯然荷錫求宿已而孕生香霧滿室彌日不散幼不茹葷年十三求出家父母許之投慈光寺若山安公為師受具首謁淨慈祖芳聯公請益垂語臘月火燒山句即呈頌曰白雲迷却舊行蹤臘月燒山火正紅再得慈風來扇發冷冰冰處暖烘烘師深器之命入室侍香解職歸造北郭普明禪寺退席重整本山宏開法席海衆常臻正統辛酉六月三十日上堂説偈曰今年八十一老病隨緣且遣日今年記著後年事後年記著今朝日至癸亥八十三焚沐坐化月日無爽停龕九日不變如生茶毗之際送者溢路無不涕泣獲五色舍利無算建塔於普明本師窣堵波之側豫章祝振志揚勒石記銘篆額為慈光堂上迄今碑塔現存此窣堵波宋時八景之一也恐後湮滅載此以祀永遠云仁王寺杭州仁王復禪師僧問承古有言向上一路千聖不傳如何是何上不傳底事師曰向上問將來曰恁麼即上來不當去也師曰既知如此踏步上來作什麼總校官庶吉士臣朱鈐校對官中書臣吳甸華謄録監生臣吳炳文詳校官太僕寺少卿臣李欽編修臣程嘉謨覆勘
