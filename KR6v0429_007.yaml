body:
  text: 明吳之鯨撰天朝寵錫天覆載之中浩蕩均洽帝力何有王仁無私而綸綍所及日月光華神鬼擁護士受一命且由泥蟠倐升層霄矧車書大同之日梵教章明禮樂刑政兼收並用而非藉簡命之隆何以宣𫾻休美又況歷劫兵燹滄桑幾變空王臺殿巋然獨存豪舉無所施謀駢脅莫由展力則天朝之重奕世不磨者也詳考武林梵剎大多肇於石晉盛於吳越王父子至南宋極矣元季漸蝕入皇朝次第重建其錫賚之大者如創寶剎賜莊田賜帑金賜鏒金如來像銅迦毗羅神銅深沙神金銅羅漢像紫衣玉玦金斕袈裟水晶數珠金澡瓶費或千百計而文字翰墨之寵則藏序偈說號諡銘讚賜額賜碑以及飛白羅扇一字一畫比於赤刀天球召對禮遇之寵則命坐賜茶諏訪溫諭以及御祭賜龕為存為歿不減莊嚴七寶志中所載大略因寺以存復舉則駢枝詳列則襞積竊亦有鮮見焉吳越擅魚鹽之饒建國都於斥鹵物力充牣金碧耀射多名功德院以侈一時之盛至今著稱鼻祖斯以隆矣南宋移鼎自汴龍鳳協祥然自太宗真宗仁宗神宗咸有敕額歌頌則契嵩宗本諸公實能感之高孝以下皆緣見聞作佛事若理宗為一寵嬪製七十二殿九井十三池何異阿房宮即惟我聖祖普賜天下叢林各有額録僧司正副督其事容光必照正明等覺始無偏無側矣成祖召有行耆宿纂修大典預甚盛者俱蒙異數以及列宗頒賚金藏葺寺鑄像所至頂禮發諸善心皆列本寺以彰隆遇不復析紀敬録皇上寵錫敕賜瑞蓮觀音大士像一軸上有廣運之寶及御製讚一首惟我聖母慈以格天感斯嘉兆闕産瑞蓮加大士像圖寫流傳延國福民霄壤同堅萬厯二十八年護經藏敕敕諭杭州府淨慈寺住持及僧衆人等朕發誠心印造佛大藏經典頒施在京及天下名山寺院供奉經首護敕已諭其由爾住持及僧衆人等務要虔潔供安朝夕禮誦保安眇躬康泰宮壼肅清懺己往愆尤祈無疆壽福民安國泰天下太平俾四海八方同歸仁慈善教朕成恭己無為之治道焉各宜仰體知悉欽哉故諭萬厯十六年皇上賜上天竺寺千佛幡二掛大士像一軸
