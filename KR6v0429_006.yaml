九百丈廣五百五十里水因山曲折東西巨源若目故云天目東出臨安為大溪溢東流而為苕溪西趨於潛為紫溪合桐廬之水以滙於浙江委巷叢談云杭州山脉發自天目有東有西東目之脉萃于餘杭結局于徑山西目之脉萃于錢塘結局于西湖故天目者杭之主山也王氣鬱葱帝王奠宅而錢氏偏霸宋室南遷兆不誣矣陶潛問來使詩爾從山中來早晚發天目我屋南下今生幾叢菊薔薇葉已抽秋蘭氣猶馥歸去來山中山中酒應熟張羽登天目山詩東西峰對峙麋鹿日成羣四月猶飛雪半山長是雲洞香仙藥遍天黑聖燈分千古錢塘勝登臨愜素聞王在晉秋日登天目詩莽氣飛揚不見山翠磐高聳水流潺煉將青白雲和碧點就紅黃葉作斑江海襟期開地局昊天眉宇出塵寰玄穹咫尺開閶闔吾亦翹瞻望玉顏章嘉楨謁昭明庵詩禪林天下稱蕭寺惟有茲庵真姓蕭地以分經成淨土池開洗眼在清霄層嵐叠巘圍寒翠竹韻松風共寂寥見說讀書臺幾處離離荒草野烟飄西天目山獅子正宗禪寺今稱獅子林去於潛北三十里而雙清莊居其麓莊右出太子庵掬泉洗目漱之而甘沿澗登響水巖初得奇壁前望巨石如覆舟至則如削成而方繡蘿蓋之名觀音巖左通活埋道循右穿眠牛亭古木盤鬱踰半山橋有寶樹三株與東目垂虹堪頡頏上真際亭則高麗王問法中峰所自署者登獅子岩藏蛻在口吻間秉燭始見復閣飛樓若凌虛而滅其趾曰舫室曰死關高峰所自命右抱象鼻水淙淙下者曰千丈崖越閣道行萬松間得玉柱峯中立夷曠高不及十丈而磊砢輪囷蒼古異常上覆兩松如擁華蓋東為中峰斷崖二塔一杉五枝一杉雙𠏉俱大五六圍而五枝者在斷崖塔凌高阜尚埋其根而雙𠏉修入雲居然娑羅雙樹其下平行地即為正宗禪寺榜曰獅子林旁為幻住庵中雲庵稍上為貝林禪師華嚴庵繞屏風石踰金仙頂觀怪石斷者截者反者豎者若片片解而𢇮積於築室之場計其高與東目肩齊下瞰惟西南蓮華峰幽勝返幻住㳂石壁為西方庵過天關為立玉亭危道如線趾半垂在外委蛇以行真若羊腸從立玉望西方半沒雲嵐中由西方庵峭壁中裂如隧道曰龍門從龍門下若霣虛山中之奇無以加此分徑北行美陰曲折漸露幻居之崖層構翼接觀益奇憩活埋庵陟香罏峯頂下㳂觀音石凡所經高峰銅鉢繭衲如熏優鉢羅花開及中峯自題畫像皆世所未有烟雲萬變必身至始能領略云白樂天新婦石詩堂堂不語望夫君四畔無居石作鄰蟬鬢不梳千載髻蛾眉長掃萬年春雪為鉛粉憑風傅霞作胭脂仗日勻莫道岩前無寶鏡月明依舊照夫人僧靈一天池詩昨夜雲生天井東春山一雨幾回風林花迸逐溪流去欲上龍山道不通蘇軾雷神宅詩已外浮名更外身區區雷雨若為神山頭只作嬰兒語無限人間失箸人高峯禪師題鶴山詩一山高突兀百里去城闉老翠掛清曉華滋積富春江空潮勢遠雲破月痕新對此忘情者林間有幾人中峰禪師真際亭詩高亭結構標真際體共雲林一樣閒山勢倚天忘突兀水聲投澗自潺湲伽陀迥出言詞外海印高懸宇宙間佇看憑欄人獨醒又添公案入禪關幻住庵歌幻住庵中藏幻質諸幻因緣皆幻入幻衣幻食資幻命幻覺幻禪消幻識六窗含裹幻法界幻有幻空依幻立幻住主人行復坐靜看幻華生幻果放還𭣣控勒幻繩幻騎牛時或住人萬幻塵俱揑聚時或眠一覺寧夢居四禪有時動幻海波幻山聳有時靜幻化光中消幻影可中時有幻菩薩來叩幻人詢幻法我幻汝幻幻無端幻生幻死幻涅槃淨名室內龜毛拂龍女掌中泥彈丸更有一則幻公案幻證幻修須了辨莫言了辨幻云無只此無無名亦幻學人未達真幻輸動輒身心自相反幻心瞥爾生幻魔幻翳忽然遮幻眼陽焰空華乾闢城天堂地獄菩提名有問此幻從何起雲月溪山自相委要見庵中幻主人認著依前還不是吳用先贈貝林上人詩絶頂空山寂惟將貝葉梵書窮本末密呪演朝昏世法了無染禪心終不言孤雲時獨往流水護柴門王在晉乘夜登法雲塔詩翠屏團裹勢嶙峋薄暮登臨不待晨樹抄飛泉分雨露峰頭明炬動星辰中峯塔下鐘初動立玉亭前酒一巡歸路已迷荒草合雲房深迥漏聲頻喬雲將天目志成呈徐明府并序夫鉛刀不與霄影爭銛駑馬不與黃騟方駕矧章縫之下士當冠劍之巨公徐使君威鳳祥麟白眉先哲牛溲馬勃青眼後生分璧潛州已最書屏之業探奇禹穴雅意名山之藏因天目之雄峰成公餘之新志涔蹄末學謬分編檢之榮琬琰宏詞不數已渝之響抒短什奉和雄篇平生不識天目山平生不識使君顏山即君即兩爭勝使我夢寐青巖間越中千嶂縈江碧茲山獨高八千尺日暖花飛古院紅雨晴泉掃陰崖白無峰不幻作蛟螭雲月烟霞紛繪奇客度松壇皆馭鯉僧歸瑤殿總馴獅憐豫三載西湖客三載何會理山屐終年鎖閣擁寒紗一杯湖水如環璧使君新記來飛鴻開緘翠巘如巃嵸依稀海蜃吐朝閣倣佛江猿吟夜風此時矯首情無已坐卷雲蘿落几試令兼誦使君詩龍宮網割珊瑚紫世間好事爭紜紜携杖思穿麋鹿羣囊中但寶一編在只此見山兼見君之恆兩天目論曰兩天目祖黃山而表三吳如縣鑑在上故稱天目或舉江南全體黃山為首天目為目五湖為臟腑金焦為足語雖太奇亦頗足據舊志言兩山絶頂俱有池一泓如天之兩目此學究訓解何所從來即昭明洗眼池亦出俗諺其池不盈二尺東在回光庵西在太子庵各祠昭明具王者冕服張崔兩相翼之皆能錫福於民者標以雙清莊近似若據此為天目何鄙如之又西頂有石如青蓮開敷東西二頂纍石纍纍亦狀青蓮楞嚴經謂青蓮花目亦在佛面則寧以此受名猶嫌著相安有他說可易此者也其兩頂蓋石如板可謂奇蹟至傅會仙人造梁無乃河漢而淺于鵲橋乎如果上真遨遊兩峯間呼吸可通帝座無煩五丁為伐持地為平此可勿論矣天台傳教庵在瓶窑妙峰真覺法師閲天台教觀處師苦心台教三十餘年所注經甚多塔于天台高明寺側新城縣普照院在縣東十五里晉天福七年建名普光院宋治平二年改今額歸併于此曰多福院在縣治東半里曰總持院在縣北十里曰淨嚴院在縣西三十五里曰明寂院在縣西七十里曰萬壽庵在縣南七里李浙普照院詩青山繞屋嵐光重流水衝階碧蘚滋獨坐午誰晤語鷓鴣聲裏竹陰移東白院距縣一里許在雞鳴山昔為唐給事中昭諫羅隱公宅溪流繞前山巒環後邑人共建為東白禪院江西益王賜額院前溪水一帶向為放生池久廢萬厯間邑令王巨槐命僧海金立石刻禁仍復其舊一時士民贖生至紛紛中有大士堂福民侯王祠祠之左為昭諫公遺像鄉民歲時伏臘于此每東顧上流又有許忠烈祠耿然並峙東安彈丸區也如羅之文章許之忠烈並可昭垂不朽題詠幾遍獨東海冒愈昌撫吊凄楚堪為二公擊節今録之云千載人傳昭諫名空山無處覔先生已知霧豹南山隱恍聽天雞半夜鳴繞砌薜蘿堪製服近簷花柳共為情睢陽祠宇還鄰近忠義何當共一楹凌志題云題山詠水遍天涯誰識東安是舊家半畝荒基山寂寂夜深風雨落梅花許廣淵詩云廢宅百年後荒基一畝平獨憐新檜柏誰識舊軒楹閭里清風在溪山秀色明當時苦吟夜應使鬼神驚黑山蟠龍庵山在平地中陡然奮起仰視奇絶逶迤而上數百步許有崖兩石峰相對徑甚狹且迅再數十武復開見平地田地塘井可數十畝四逼山岡回繞上見青天中有龍池半畝許大旱不涸有禱輒應常有祥雲覆其上遠方望氣者往往登陟觀閲皆以為瑞謂小麻姑洞也有大石二一名伏虎石在洞口儼然虎踞扣之有聲每天將雨輒潤登據俯眺可閲百里山水盡環繞拜舞于下一名棋枰石在前岡寬廣平直相傳葛仙翁與客對局在此臘月山花盡開至今惟此山巔有蘭花映山紅十二月即開中有泉水一孔冬夏不涸清冽異常昔有異僧來此跏趺數月不食烟火去之時曾題壁間有俊毫千管秀翰墨一泓香松篁間竹韵另是一乾坤之句元時燬國朝僧智果募邑人檑鼎建有觀音堂文昌祠怡性軒外有亭名最高處人皆稱為真佛地昔蘇文忠姚次庵遊厯有韻明邑令林劍台以棹楔題贈至鄞入高明洲粵人張兢餘西吳蔡五嶽各有題詠其上咽水洞距縣三十里為廣陵村平坂中一山突出皆頑石前有一小洞洞口可容十數人站立人不問洞內外寂如也惟人向洞揖曰某來此要求仙官恩澤其洞內即閧閧作聲須臾水即向洞口濆出蝦魚亦隨水而出跳躍水中直俟伊人再揖曰水足矣洞內即劃然有聲其水與蝦魚復返洞口儻再請如前洞之出納亦如前雖百請亦百應也鄉人每歲致祭洞外田疇千畝皆賴此灌溉無旱涸之虞昔有縣令范君者曾往觀鳴鑼放炮至洞口作禮水不時出范留宿次早復請復不出范怒驅里胥言誣夜復宿中堂寺夢數老人皓髮黃衣行止翩翩叩門請見范與之坐問曰公何人斯老人曰豫秦人也避亂於此向不習漢官威儀畏聞車馬擁呼聲長官何必恚報者倘不信姑試之次早屏騶從至洞口感驗如常范乃驚異為之題記刻石而返夫桃源記人疑其幻茲洞以水為吞吐自秦至今靈應不絶無能測其從來亦奇哉惜在深山盤谷中不獲標名宇內然觀邑令一夢又以無名為貴矣寶勝院唐天寶間建為魚池寺宋祥符元年改今額有葛仙翁煉丹井曰乳泉其白如乳許仲蔚詩青雲路在天煉鼎亦徒然九轉果何物一泓空舊泉競知丹可煮不悟骨非仙汲引殊無狀葛稚川許廣淵詩葛公高隱處鑿井碧山前鍊就長生藥空餘白乳泉鼎藏今去水氣吐舊成烟午夜風雷作人疑羽珮旋寶乘寺唐上元二年建為靈遠寺初梓州刺史羅石朔掘地得銅鑄佛像俄失所在而新城人獲之野因建寺焉今有佛嶺由此也會昌中廢大中十三年復置為聖像寺吳越王迎其像入城宋大中祥符元年改今額有脫龍洞躍龍池噓雲亭妙香堂深靜堂大唐開山祖師名休糧白居易贈詩云三十餘年坐對山只將無事化人間齊時往往聞鐘笑一食何如不食閒司馬槱遊脫龍洞詩云雷雨何如起蟄龍蒼痕天矯石巖空不緣嗜好尋劉纍定向人間試葉公錢朝隱鐫脫龍洞詩云九骨何年脫洞巖真龍肯向此中蟠料應夜半凌空去雷震千山風雨寒李處全題深靜堂詩云鼎來朱墨苦難逃兩夕山中暫釋勞野岫擁簷青嶻稟回塘足雨緑周遭翻經深院心宜靜遠跡紅塵意自高謾把新篇供寫物么麼那敢說詩豪葉𢖍題妙香堂詩云巍巍畫棟插晴空時有芳馨四面通好為高禪參鼻觀未應公子𨷖熏籠簾前一炷沉檀韻外數番蘭蕙風信道杜陵佳句在心清渾賦此堂中寧國寺在縣南七里青巒山晉郭文舉常隱于此夜有虎為一金梗喉俯地作求救狀郭探手去之虎搖尾回拜再三次早啓扉則有一死麋乃虎所銜置門外者咸和二年人為立祠禱祈必應晉天福八年吳越王因碧沼清徹遂命額曰碧沼寺閬詩五峯高插雲居勝覽景留題趣味長碧樹葉陰山骨潤白蓮花馥水池香鶴尋巢徑松千蓋僧臥溪流石一牀閒玩不知西日落馬蹄歸去帶斜陽王圻詩高僧居處足清虛泉繞階庭樹繞廬鬱密青巒垂薜荔渟湛碧沼映芙蕖客來尚喜紅塵隔僧住應知與世殊猶感支郎碧雲句使人繁慮頓然除牛仙客詩步步穿蘿入徑幽柏高松老幾人遊花開花落非僧事自有清流對碧流裴極詩一沼光涵四座寒夕陽回首更憑欄憑師蚤把香蓮種他日期來結社看杜荀鶴詩山半一山寺野人秋日登就中偏愛日獨上最高層有果猿搖樹無齊鴿看僧僧門日多事來此復何能方干詩深僻孤高無四鄰白雲明月自相親海中日出山先曉世上寒輕谷未春逼野溪聞唳鶴林通村徑見樵人此時惟有雷居士不厭籃輿去住頻林杜詩幽谷泉聲冷鳥啼僧定深好花叢古砌寒瀑發高岑遊者陸鴻漸居人支道林欲辭青嶂去臨去復成吟釋智圓詩一到無塵境相留靜話長秋聲歸古木月色滿空廊嵐氣侵衣潤溪泉漱齒凉終期整瓶錫來此掩閒房邵輶詩地勝千嵓秀名高萬古存丹崖紀靈躅紺宇蔽祗園樹老垂藤影池幽浸蘚痕會心多興趣隨意坐林樊劉大綱詩夜色清無滓虛凉月滿亭螢飛時度竹魚躍乍萍冉冉雲歸𥁞霏霏露欲零劇談渾得趣相對兩忘形類列福光寺在縣北十五里多福禪院在縣西七十縣安隱院在縣西三十里瑞相院在縣西七十里通靈塔在縣北二里多寶塔在縣西五十里筆峰塔在獅子山於潛縣獅子正宗禪寺去縣北四十五里嘉德後鄉天目山有獅子巖林洞幽深松石奇怪元至元十六年建延祐七年賜額後燬洪武九年重建歸併于此曰大覺正宗禪寺在縣北四十里曰善法禪寺在餘杭縣東南三里寂照教寺去縣南二里豐谷鄉舊名吳興唐大中五年改今額宋隆興初邑令葉𢖍重建寶慶初避御名改為此君軒元末燬洪武初重建歸併于此曰明智寺在縣西十八里曰治平寺在縣北十里曰常樂寺在縣南五十里曰布金院在縣東二十里曰廣覺院在縣東二十五里曰三學院在縣南十五里曰悟真院在縣南三十里曰淨勝院在縣南六十里曰妙樂院在縣北七里曰廣慈院在縣北四十里曰褒忠院在縣北四十里曰崇法院在縣西南三十里昌化縣治平寺在縣西一里舊名欣平唐大中二年建開平二年改今額元末兵燬洪武十五年重建歸併于此曰法會寺在縣南三十里曰大明慧照寺在縣西八十里曰普濟寺在縣西七十里曰千頃龍興寺在縣西北六十里曰普向院在縣南五十里曰百丈廣福院在縣西二十里曰法興院在縣西四十里曰鷲峰院在縣西五十三里吳珩法會寺詩地占金山勝泉分銀漢流杉篁能護翠猿鶴似驚秋祗憶登臨晚寧辭取次游列峯饒遠秀不惜上高樓蘇子由送無畏還慧照寺詩身老與世踈但有世外緣五年客江西歸帆謝往還依依二三老示我馬祖禪身心忽明廣不受垢汙纏偶成江東游欲別空淒然緣散衆亦去飄若風中烟華陽本荒邑緇素明星懸偶然得老舊依育王仙璉公善知識不見十九年我昔未聞道問所以入門告我從信入授我青眼篇冉冉百尺松起自一寸根南歸髮𥁞白尺書今始傳不知鄰邑中乃有門人賢百里走相訪觸熱汗雨翻懷中出詩卷清絶如斷絃我適病寒熱氣力才綿綿空齊默相向欲語不能宣未暇答佳意歸錫鏘金環空有維摩病愧無維摩言類列明因院在縣東三十里福全院在縣東北五里清修院在縣南四里澄寂院在縣南二十八里南塔在縣東南青山之麓今院燬而塔猶存
