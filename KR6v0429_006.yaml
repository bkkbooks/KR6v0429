誰共樽前酒牢落空留案上杯我憶故鄉歸未得可憐鶗鴂重相催范仲淹顯聖院詩登臨溪上寺遷客獨依依遠水欲無際孤舟曾未歸亂峰藏好處幽鷺得閒飛多少天真趣遙心結翠微南山普寧禪寺在縣東北三十里常熟鄉宋白雲通教大師創庵以居隆興間改庵為院曰傳燈又改普安淳熙七年改今額元至正末燬洪武三年重建歸併于此曰慧照塔院在縣東北三十里曰定一院在縣東北三十五里曰松隱庵在縣北七十五里慈聖寺在縣東北四十里常熟鄉名靈嶽肇於唐五代天成元年復建宋治平二年改今額元至正末燬洪武間重建歸併于此曰永壽寺在縣東北三十五里曰安衆寺在縣東北四十里曰西教庵在縣北三十里歐陽詢慈聖寺記略杭州餘杭縣西北有鎮曰曹橋鎮走北十里得精舍曰靈嶽後漢建武二年有周閩越王無諸十二代孫搖氏捨宅之所建也光孝寺在縣間林東扇一陶望齡光孝寺碑記光孝寺唐蔣山太平興國禪師建太宗敕額迄宋而寺貌幾灰矣端平二年住持法薰德力不減于初彬彬稱盛左右丞相咸為篆石迄我皇明而寺貌又幾灰矣幸正德元年無盡和尚禱雨龍門之山太白龍王獻白蛇于鉢內而大雨灌溉萬民繇是寺貌復興寶壽其別號也左通西溪勝槩右達赤松名林前有龍門峻嶺後有閒林幽村內不見寺外惟見雲古井甘泉詩脾可沁萬厯間如清真聽重修建天王殿樹鐘樓置山贖田為永遠計誠大福地也徑山興聖萬壽禪寺在縣西北五十里唐代宗時僧法欽結庵於此永泰中有白衣士來求法度為沙彌欽指坐後石屏謂曰能開此乎曰可遂叱之分為三片今號喝石巖遂即剃度名崇慧如長安與方士競法既勝代宗問其師承對曰臣師徑山僧法欽召赴闕賜號曰國一禪師逾年辭歸詔杭州即其庵建寺曰徑山僖宗乾符六年改為乾符鎮國院宋大中祥符元年改賜承天禪院政和七年改徑山能仁禪寺開禧年間孝宗御書額賜徑山興聖萬壽禪寺由宋迄元為禪林之冠元末兵燬洪武間重建歸併于此曰廣化禪寺在縣西十里曰順慶禪寺在縣北三十里曰妙濟禪寺在縣西北四十里曰實際禪寺在縣北二十里曰雲福禪院在縣東北四十里曰圓覺庵圓修庵並在縣東北十五里吳泳撰興聖萬壽禪寺記國家駐蹕臨安自西天目龍翔鳳舞舒岡布麓盤結而為帝王之都者錢塘也自東天目熊騰馬奔凌深拔峭發越而為梵釋之宮者徑山也山以徑名乃天目之徑路其地尊故鬼神不敢宅其境勝故凡庶不得居必也以大法力建大道場然後能儲精會秀覽光景而納于其中國一禪師卓錫于此興廢逮今蓋四百餘年矣先是慶元己未冬龍王殿灾精廬佛宇一夕而燼僧元聰治故而復新之後三十五年夏再燬無準範師慨然曰曩在育王時曾夢一神人偉衣盛儀衛馳騎而前迎疇昔之夜又夢前神人者持念一寶珠以相授曰謹勿訝或謂夢中之人龍珠之數則火之日也豈住止成壞皆數耶師於是以精進心轉不退輪以勇健力撾無畏鼓披榛塞竅度材于山視昔所植可以為椱為梁為杗為桷者適飽厥用則鳩工聚糧命幹力之僧相其役一念才起諸天響合上方頒賚甚渥公卿士大夫樂施捨南國之好善者不祈而助貨不命而助力越三年考成曰殿曰堂曰門曰廊曰樓觀棲客之廬齊庖之所庫庾井廄靡不畢具最是龍游閣居翠峰之頂畫栱璇題承雲絢日而虛欄之外曰凌霄之閣天空宇逈若與灝氣者游循而下曰寶殿曰寶所曰靈澤殿曰妙莊嚴閣宸奎麗榜殿寶鎮此山實振古所未有舊兩僧堂幼學者居外久習者居內殆非不二法門今則統而為一楹七而間九席七十有四而衲千焉翼五鳳而閲離門之虛建萬佛而補艮山之闕皆以大用勝服之若夫乘金相水西秦異僧所云更不道也王在晉游徑山記武林之屬多佳山水而餘杭之有徑山稱最勝東西兩天目山高插天水因山曲折浸為巨源若兩目然故曰天目入兩日以是山為徑路山遂以徑名余雅慕徑山而未有企及也歲在辛亥南湖告成功監司往閲視余以鞅掌三路不得從諸大夫後會八月逾望三日往吳興謁臺使者畢歸由苕溪苕溪一帶天目諸山衆流環合遡流可達乃從吳興泛舟過德清渡雙溪雙溪之流一出天目一出高陸至雙溪橋合流入徑山港舟不得通舍舟登陸過化城接待寺化城為故宋佛日禪師宣公所創踞徑山東麓宋時棟宇宏麗欽錫化城二字上創重屋尊而閣之殿寢門廂庖𢊣湢浴靡不備具載郎官楊汝明記中我朝香火猶盛漸次廢棄寺田轉佃閭左豪右踞之然化城巷之名不泯馮司成開之創刻經之緣始于清凉之妙德庵地峻遠役匠轉輸工力費倍乃遷之徑山徑山雲霧罩籠藏板其中易朽腐始議復化城化城地坦無雲氣潤濕便藏板而易輸工力乃為屋十間以安經板處工匠而大士金身以草殿居之海內宰官居士布金恢復化城舊域捐資贖地而有子襟鼓衆跋扈必欲與沙門相角事聞當道屬豫訊其事郡邑勘明豫按法治其尤割地歸僧封畛不失而其間有墓冢者聽之以寧其穸窀佛處蘧廬中得重開法地以須十方大檀越之力豫過化城而一二野衲邀入和南佛前稱善事周遭故址枳𣗥蓁蕪闢草萊而重新法王之宇西來白馬茲其為翻經演法之場乎過化城折而西北抵徑山山去縣五十里雄據乾位挺然為東目正幹宴坐朝陽天顯堆珠鵬凌霄御愛七峯攢擁草木蓊薆樹古而蒼地僻而野山門幽寂有老松婆娑可䕃十畝與木蘭交枝薄青旻翳白日松為數千年植而木蘭亦森發離奇匪深山無此異種參差白塔同虬木橫斜巢雲歸鶴竹松間雜景色清饒葱翠交睫入山而路轉深地轉奧無數篔簹霏烟濛濛新芊雄妬母高凌排岡直上各高十里層巒峻嶺長騫偉觀盤跚逶迤盡在竹間行路籜龍透地躡屐崚嶒一頭陀引導美箭蒙茸蘿葛糾縛時摩僧頂羣峯嶈嶈拱護靈嶽中豁平區坦壑去險而夷重巖滴水有洞空沕頭陀指為明月池其間小井為龍湫龍歲一來顧雷雨曀冥過洞行少許路繞屋後登崖參大慧禪師塔明堂窒塞方伯吳公言塔前當介然闢之而成路僧苦去屋未果闢由塔崕而東為喝石巖唐時僧法欽結庵有白衣士求法度為沙彌欽指坐後石屏謂曰能開此乎叱之分為三片代宗召法欽赴闕賜號國一禪師辭歸杭即其庵建寺曰徑山宋開禧間孝宗賜額興聖萬壽禪寺東南勝道場無逾此者行過復嶺崇嶐隱天有斐菉猗坎窞為池方塘一鑑湛潔如澄鮮漾碧僧曰放生池池邊刻經工匠排列鴈行伏迎道左已訪淡居上人所寓靜室治蔬為供清話移時片言點悟此不殊欽公三片石恨不如白衣士立度為沙彌耳別而登樓同餘杭令戴君進飯夕陽西沉遂促從者亟行余時有天目之興徑山直傳舍視之竭蹶而趨至無垢寺而宿焉是夜惺惺不寐取唐崔元翰碑籀文摩擬不能屬草乃讀東坡徑山詩擊節高吟與松濤林籟相為答和殘月半莽烟伴榻無何而山鳥嗚嗚不覺東方之既白矣吳之鯨徑山紀游庚戌浴佛日久雨乍霽與俞似宗佛石宿禹杭文昌壩亟呼筍輿沿溪行宿霧漸消山頂次第現如新粧出羅幌行可二十里飲溪邊酒家遙望舟枕巍然獨峙秀鬱可挹又三十里林漸深地漸高將逼雙徑循趾攀巘委折數百重澗花飛灑俱成白練山形周環復叠如入谼中上下篠簜檀欒萬畝一色余隨輿偃仰覺日光淡射風細雲疏非若高峯軼雲蒼𠏉蔽景作鞺鞳之聲䃱磹之狀也嶺甫半輿人告疲余顧佛石隔山小浮圖非即歇足處耶佛石指曲磴數坂曰此須繞而上耳既上嶺如馬脊左右懸削忽白雲覆他山飛捷於鳥細雨隨至余振袂度數盤沐佛聖水杉松環立平臺俯瞰則三山門巋然列矣視小浮圖又在足下遠峰嵣㟐近峰嶢屼含澤吐霓倐忽殊態武林兩高龕赭一線俱在靉靆中余嗒然宴坐雲海蕩吾心胸覺生平寥廓之氣呼吸相應昔陶貞白志在冲舉每云指白日覩青天去此不遠獨於爾時有會已投松源山房古杉蒙茸方沼沉碧高樓十五楹邃潔可居僧冲宇供笋蕨煨漿不減白墮似宗糾以觴政甚洽月光初燦僅於密樾中作掩映觀耳晨起謁新殿制度宏偉未飾丹堊過妙喜庵禮大慧禪師塔視龍湫舊蹟循左級而上觀放生池池圓如圭廣可盈畝惜無游鱗潑剌再上為寂照庵刻藏經處鐫工麕集室後供達觀甚肅令人轉思密藏忽緇衣籜過謁余詢知為門人通州崔叔錦為諸生不得意刳心大典棲遁於此兩月矣余擕之出過喝石巗石㭊為三昔中子山人乞國一師剃度以呪力護佛法賜號性空大師大厯中代宗遣內侍迎國一入京徑山之興實由於此訪雞兔二冢至今在岩下三白駒或寢或訛乃載經板出山者儼然雪山梵從也是日陰翳多廉瀸久益密叔錦別去返松源山樓飯後稍有霽色命輿從右級而上旋轉竹徑菖蒲田新秧離離澗水澄瀉石磴梳潔如鏡高岡礱密遙見炊烟一縷從修篁中出即知為雲房杳然無覔徑處余喜忘返翛然緱山烟客餐沆瀣佩九莭靈苗不復知有人世既過傳衣庵為萬松禪師傳衣處躡白雲庵攀蘿而上為凌霄峰浩渺如大瀛海何減泰岱新殿枕鵬搏山勢拱衛余謂此山幽曠非通都大邑而宸章御蹕後先輝煥故樓名五鳳閣建龍游南朝四百八十寺未有其比今山水依然未知八十一代傳燈何人耳返流止亭輿人告息各曳杖尋東坡放生池坡公游徑山二詩如欲看細字銷殘年靈水先除眼界花俱頌水德今濁甚亭碑幸無剝蝕及讀樓鑰百萬杉松雙徑杳三千樓閣五峰寒自是實境語矣似宗探藏録許為刻高僧傳燈下各翻一編間拈以問佛石佛石各為宣說吐旨玄暢因曰宗門不立文字而微言奧義終古不磨猛志精求參悟非遠今人根力未堅而遽稱文喜游戲倣佛而妄冀豐干正恐慧蕊乍枯慈筏罔濟耳相與嗟嘆久之余夙知有聞谷住徑山急欲一晤而聞其坐不語禪殊悵怏佛石為通信聞谷慨然曰吾素所願見者也曉訪之觀音閣時禪習者三十餘人而閣戶閴寂鳥雀不喧入左扉若無人者執事虔默惟謹聞谷坐余輩小閣色靜而氣融神理泓上發語簡遠真禪定士也余為肅容而別微聞谷幾虛徑山一游矣蘇轍詩去年渡江愛吳山忽忘蜀道輕秦川錢塘後到山最勝下枕湖水相縈旋坐疑吳會無復有扁舟屢到凌深淵今秋復入徑山寺勢壓衆嶺皆迷巔連峰沓嶂不知數重重相挹如青蓮散為雲霧翳星斗聚作潭洞藏蛇蜒欽公未到人跡絶千里受記來安禪荒榛野草置茅舍坐令海賈投金錢至今傳法破煩惱飽食遇客宜安眠解裝投錫不復去紛紛四合投烏鳶或言處此猶未遠海上人少無煩煎天台鴈蕩最深處水秀石瘦尤清便青山獨往無不可論說好醜徒紛然終當直去無遠近藤鞋竹杖窮年方九敘詩雲裏五峰環紫翠空中一徑轉微茫黃花漸報重陽節白社遙尋古道場精舍更宜留謝客玄都何必訝劉郎高僧趺化千秋寺獨有靈雞塜樹蒼湯賔尹訪淡居詩覔友尋師度會稽舍情千載不能啼閒從國一堂頭過一片香兒吊塜雞拔天跳地穿黃嶽抱月回風隱徑山著處盡成香國土單肩赤腳恣周還半月東山水上行薰風南逗晚凉生從君參得黃楊木大好隨緣斷佛情格物何當物格殊子韶妙喜兩糢糊而今賸有關西首劍擊憑誰落畫圖吳用先雨中登徑山與淡居上人夜坐詩喝石開山意若何靈巗千載鬱嵯峨幾盤翠袖穿雲度十里青松帶雨過寶界烟蘿香氣裊珠林鐘磬梵音和清霄喜對支公話把臂中峰一浩歌化城寺在餘杭縣北四十里雙溪之上馮夢禎議復化城疏引刻經之緣始于清凉之妙德庵地寒而峻遠役南匠轉輸工力費倍功半不得已而有徑山之遷徑山為東天目正幹五峰攢回中間佛界我東南勝道場無逾此而雲霧籠罩十日而九藏板其中最易朽腐又不得已而有化城之議化城踞徑山之東麓去雙溪數里地坦平無雲霧既便藏板而輸工力事事皆宜因故址而新之先為十間屋令足以安經板處工匠而他役徐侯其後似無甚難舉今約同志以十緣倡之緣五十緡禎雖貧勉任一緣夫刻經大役自北而南而其南也又自徑山而化城三徙而後定而任事之人始于密藏繼豫後豫而終之者又未卜何人也因緣時節惟佛與佛乃能究盡而自創緣以至未來凡于此事曾捨一錢半銖及一手一足之力已上福不唐捐直至成佛而吾等與焉豈不幸甚方伯吳用先重興化城接待寺疏余從紫柏尊者游逾二十載所承鉗鎚錐劄罔所不至通身熱汗不知透出幾番矣末後以流通佛法付囑不唯唯徼天之幸承乏越中即悉心殫力求終刻藏之役茲功已過半緣成或有日矣乃謀藏板善地卜及化城化城故宋佛日禪師宣公所創接待寺郎官楊汝明記之甚詳見徑山集中及我朝而香火猶盛漸次凌夷僧陡凋落遂以寺田轉佃於方姓者輾轉相侵盡為居鄰所剝蝕矣然其徑尚存化城巷之名至今在人口今年淡居上人圖恢復之而鄉紳王中泉公首倡義舉願以其地歸寺於是左右聞風者響應乃淡居猶運慈心量其多寡各給其直余與吳下諸君子協濟之雖未盡復舊址從此誅茅建剎亦庶幾可觀矣然此非今日創議也蓋自馮開之司成始矣而余又不知司成之原有此議也一日淡公過豫持開之手卷見示謂偶從密藏棄篋中撿得之余展閲疏引即向時與藏公所謀卜化城以厝經板者也噫奇哉司成往矣謀于十數載之前而余與淡公成于十數載之後不約而合無心而成九原可作當為鼓掌苐勝地既復梵宇鼎新向後更有許多商量不無藉十方大檀之力余小子亦不敢不賈勇從事使道化重興法輪常轉誓頭目腦髓之不恤而遑恤其他時萬厯辛亥歲浴佛日大祿寺在縣西北九十里長安鄉晉永康年間建元大德年間重建元末燬洪武二年重建歸併于此曰光教寺在縣北八十里曰靈石院在縣北六十里曰慈相院在縣北一百里靈源院在縣東南十二里安樂鄉舊名龍泉唐咸通七年僧善本建宋治平二年改今額元末燬洪武二年重建歸併于此曰普濟寺在縣東十五里曰寶輪寺在縣東南三里曰澄鑑院在縣東十五里曰光福院在縣東南十五里悟真院在縣西北三十里長安鄉唐咸通八年僧法顯創宋治平二年改今額元末燬洪武年間重建歸併于此曰石泉寺在縣北八十里曰大智寺在縣東北三十五里曰法華寺在縣西北四十里曰寶幢寺在縣西北六十五里曰寶嚴院在縣北一百二十里曰迎恩院在縣西北四十里曰大安院瑞相院並在縣西北五十里王安石悟真院詩野水縱橫漱屋除午殘夢鳥相呼春風日日吹花草山北山南路欲無洞霄宮在縣西南十八里漢元封三年建宮壇于大滌洞前唐弘道元年有先生者于洞下建天柱觀南向四維壁封三步禁樵採為長生林中宗時賜觀莊一所後有米法師改觀為北向乾寧二年錢武肅王與閭丘方遠相度山勢復改南向未納土時嘗改天柱宮宋祥符八年陳堯叟奏改今名賜仁和縣田一十五頃并賜鐘磬法具等歲度行童一人應天慶節設醮以祝聖壽天聖四年詳定天下名山洞府凡二十處洞霄大滌洞為第五政和二年都監何士昭陳乞賜度牒三百道方臘之亂宮燬紹興二十五年重建仍建昊天殿于東廡後殿左陽通明館乾道二年三月壽皇洎顯仁皇太后臨幸嘗以軍士守禦後奏罷以山麓民充佃夫防禦淳祐七年靈濟通真先生孫處道奏請賜錢益市恆産規制愈崇政和間援天柱觀例經尚書禮部給洞霄宮印記慶元二年以歲久漫滅重給宋初天聖節道場應本縣文武官僚入山建散諸山僧咸至立班自南渡後惟道士就宮建散而縣官止於普救寺行事凡諸宰執大臣丐閒去位者以提舉洞霄宮繫銜咸淳甲戌冬宮燬一空元至元甲申後再新宮宇元末兵燬洪武二十三年重建厯二十餘年而後修垣巨殿門廡室廬庖庾壇皆次第用完無改舊觀矣王達記晉許邁稱餘杭山是洞庭西門潛通五嶽山陰至臨安名有金堂玉室仙人芝草左元放之徒漢末諸得道者咸在夫古者採真之士往往於名區奧壤穹崖邃壑留連忘返者何哉蓋老氏之學貴清靜非名區奧壤穹崖邃壑不足以養其高致故名山大川瓌詭之觀人迹所罕至者必為其徒得之余嘗因邁之言而稽馬餘杭之西有山曰天柱自漢元封三年建天柱觀宋祥符間改稱洞霄宮仙吏謂之福地而天目諸峯遐邇羅列光靈勢氣與造化相為流通蓄奇孕秀莫可殫紀當雲行鳥飛之際一柱中立屹然摩空羣山四靣俯拱自列而宮正踞其幽深峻絶之境丹臺紺殿瓊樓璇室烜赫心目為民禬禳動輒有應元步日窘四海鼎沸所謂丹臺紺殿瓊樓璇室一燬無遺大明升天九有寧謐洪武庚午提點賈公力以恢復自任夙夜劬勩罄槖是營不三載賈化去副知宮事資深吳公暨希然龔公克紹厥職繚以修垣構以巨殿至乙未門廡室廬庖庾壇壝次第用完丹臺紺殿瓊樓璇室視昔不異許邁所謂金堂玉室仙人芝草者宛然可徵漢末諸得道者其骨雖朽其神不死安知不與茲山之光靈勢氣相與盤旋於冥漠之間即夫置榮悴於兩忘齊天地為一指為道家之常事然數百年之規矱一旦而復之非惟其徒以樂清靜無為之教且俾一方萃嚮慕之誠致水旱禬禳之福明靈歆顧祥慶駢臻詎不密裨皇化為邦氓之利也哉其嗣法弟子周應常劉宗顯慮乎久而泯其績也來京師求余記余喜諸君子能翼其教也姑書此庸刻諸石後有記者尚考于斯陳堯佐詩娟娟紅樹碧峯前為愛桃花入洞天偶逐霓旌才百步却憂人世已經年谷口停驂上翠微五雲宮闕闢金扉不知何處朝元會却是龍鸞隊仗歸一帆高掛出紅塵萬