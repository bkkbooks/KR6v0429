body:
  text: 明吳之鯨撰城外南山分脈由鳳山候潮上至風水洞下至艮山梅竹菴上中下各據其一在萬松嶺境路幽仄高可眺江般若院在上梅竹左徑舊廢萬厯甲午僧真誠定淳重建有普同骨塔報先菴在孔家山萬厯己亥僧普明建仁和令劉洪謨倡緣樊良樞有碑記并卓錫青松額樊良樞鳳凰山報先菴記鳳凰山都會神皋也山之陰萬松書院本報恩招提舊址弘治中參知周公毀寺建院祀先師孔子配以四賢令孔氏子孫世守之號曰孔家山云山夾道多巨松蓊薈盤鬱自萬松坊迤邐入有半剎焉曰報先萬厯己亥普明上人來自匡廬卓錫茲山吾鄉劉公洪謨為邑宰于斯也邑人直指金公階州牧孔公承士請復為菴菴環堵皆山也左薄湖濱右挹江濤拱城闉而負八蟠可盡茲山幽絶之勝山後有古松三株婆娑偃仰有千霄凌風勢則郡邑之陽所隱映也普明圽後弟子庶勝能守其衣鉢勝亦吾鄉人也所奉象教移自廬山嵗以西江檀越餉米為伊蒲供惟飲茲山泉水爾泉皆自來從石罅中流淙淙足供茗碗諸比丘皈依勝上人潄風咽月諷誦不輟高足肅然豫觀虎林招提之在湖山者未有不以湖山纍者也叢雲香閣飾以丹璇碧澗竹林雜以金翠則中央渾沌鑿矣市聲喧豗車塵霧起歌舞雜遝壺觴交錯遂令淨土化為火宅良可愾歎獨茲山與市㕓遼邈幸不為人所居而菴踞長松修筠之間白雲一塢流水一泓優鉢花香菩提樹茂庶幾清淨之場勝上人與諸比丘逍遙雙樹翻演三車惟聞空中山谷答響而已上人丐豫一言為山靈護此山有靈後必有供養護法即如劉公與豫不先後合揆雖使佛氏精舍與孔林並存可也報國寺在鳳凰山麓即南宋𡸁拱殿基殿角銀杏樹有實無心楊載錢塘懷古詩云萬年珠樹落秋霜蓋指此也至元十一年賜額禪宗大報國寺妙濟禪師開山延祐六年燬僧大欣重建元末燬于兵洪武二十四年立為叢林萬厯丙午僧海音新葺舊有大雄殿大悲閣碧梧軒舞鳳軒皆宋制元廢南宋大內為五寺而此獨存梵天講寺宋乾德中吳越王建名南塔治平中改今額元元統中燬永樂十五年重建有靈鰻井金井石塔二高五丈列門之左右先是四明阿育王山有靈鰻井吳越王迎阿育舍利歸梵天寺奉之鑿井南廊鰻忽見寺以蘇東坡為伽藍與玉岑山為二僧贊寧有記王在晉重修梵天寺建觀音閣碑記杭有鳳凰山唐以前建州故吳越為國治宋南渡以山為行宮山如翥鳳兩翅翩然左薄湖右掠江碧流瀠溯水光相映山之東麓環入宋都宮禁𫟍蒼翠華麗佳氣鬱葱經鳳山門折而南又南折而西為梵天講寺宋乾德三年吳越王所建也初名南塔治平中改今額燬於元元統間重創於永樂十五年蓋年久而傾圮矣僧成杉于嘉靖甲子建佛殿仁良于萬厯甲辰建天王殿山門來綸於萬厯壬子募鄉紳洪給諫黃儀部等同建觀音閣而梵天古剎煥然增飾焉又鑿得水池泉窖題名玄鏡而南塔故墟儼然稱勝焉夫自宋乾德至今為年六百五十寺經幾燬燬而復興無改於乾德之舊法宮梵宇與江海湖山同茲永奠回視和寧祥曦集英崇德明堂郊祀翬飛翼拱變為緑莎蒼薺金鋪鐵葉化為枳棘銅駝亭臺囿圃踐為甌寠汙邪兩川晴霽萬家煙火若明若滅如聚如散空中之色色色成空而獨最勝招提法身非相無假三輪常依無住之住蓋皇王大業有而非有雖凌厲一世率歸於無空門淨緣無而非無即興歇相尋仍歸于有有歸于無視循環之天命無歸于有藉不朽之人心人心常有則佛法如在佛以無相為體以不住為宗以妙有為用三塗法界總集諸天護持消磨劫煞佛說無盡法我願世人結無盡緣吳越宋元偏全世界眼底一瞬法華圓滿寂照堂前年復如是請觀靈鰻井問四明阿育王三界浮沉倐忽變遷徙倚孰無孰有山頭明月夜夜照人來去不似宋行宮凄凄冷冷也只今梵天無改諸達官標題具在其合掌以告之諸天是為記僧守詮詩落日寒蟬鳴獨歸林下寺柴扉夜未掩片月隨行屨惟聞犬吠聲又入青蘿去蘇子瞻和詩但聞煙外鐘不見煙中寺幽人行未已草露濕芒屨惟應山頭月夜夜照來去寒食遊南塔寺寂照堂詩城南鐘鼓鬬清新端為投荒洗瘴塵總是鑑空堂上客誰為寂照鏡中人紅芳歸去風驚曉緑葉成陰雨洗春記取明年作寒食杏花曾與此翁鄰棲雲菴由梵天中山居循徑而上高樹密篠倣佛觀江濤幽閒可結禪習貫酸齊棲隱處貫之父楚國公貫濟格裕實遂以貫為氏號曰酸齊年十二三膂力絶人使健兒驅三惡馬疾驅持槊立而待馬至越二而跨三運槊生風觀者辟易或挽強射生逐猛獸上下峻阪如飛稍長折節讀書目五行下菴其修藏之所也西可達龍華寺勝果禪寺唐乾寧間無著喜禪師建吳越王鐫彌陀觀音勢至三佛及十八羅漢像於石壁宋慶厯初郡守鄭戩奏請額曰崇聖寺至正燬洪武初盥初敬公重建苗衷有記永樂燬嘉靖戊午僧正因復建寺門向有江山勝槩額蔣公暉題并書榜云入深松徑開名剎上盡雲峰見大江山形翔舞如鳳江潮泙湃松徑盤紆澗淙潺灂真偉觀也殿旁為將軍池鐘樓鐘本宋景陽舊物嘉靖間胡中丞取鑄為軍器壬子重鑄仁和令樊良樞有鐘樓記登顛為千佛閣廢基上為三松頂側為崇聖塔相傳高七級二十餘丈宋景祐建下為柳浦緑䕃𡸁𡸁無異官堤桂洲夏公讀書其問題曰天峰孤嘯筆勢飛舞今在松濤閣有介亭祖無擇建中峰亭中峰習禪定於此忠實亭高宗御書鳳山二字宋洛王書金星洞晦夜放光石通明洞飛龍石飛雲洞上天梯觀石許僧泉泉不盈握大旱如注臥醉石霧岩題石平如掌長江在枕上歸雲洞躍雲石石側為竹塢即懶耕禪師塔院僧洪恩書檀欒齊吳之鯨額乘鷖閣并榜云踈徑曲穿藏異石紫蘿深護吸天花蓋竹與石交勝云循級而上即月岩規峰削立有隙如鏡中秋子夜相映如合璧題詠半多蘚剝伏石如虎大中丞梅林胡公望海烽崇飲于此至今有去思碑最上為御校場宋殿前司營親軍護衛之所石笋隊列名排牙石一名隊石相傳孝宗時登頂閲江操執鐵杖六十斤許上下如飛以志復一稱女校場至此則江湖俱在指掌而龕赭對峙海門一線盡入覽觀矣唐僧處默詩路自中峰上盤回出薜蘿到江吳地盡隔岸越山多古木叢青靄遙天浸白波下方城郭近鐘磬雜笙歌王介甫詩登高見山水身在水中央下視樓臺處空多樹木蒼浮雲連海氣落日動湖光偶坐吹橫笛殘聲入富陽蘇子瞻登介亭餞楊傑次公詩籃輿西出登山門喜與我友尋仙村丹青明滅風篁嶺環佩空響桃花源前朝欲上已蠟屐黑雲白雨如傾盆今晨積霧卷千里豈畏觸熱生病根在家頭陀無為子久與青山為弟昆孤𡶶盡處亦何有西湖鏡天江抹坤臨高麾手謝好住清風萬壑傳其言風回響答君聽取我亦到處隨君軒圓法師詩并敘云勝果名剎相望而高軒虛閣盡得江山之勝槩因謝宣城天際識歸舟雲中辨江樹之句頗類是景用以為韻成詩十章寄勝果裕師開士雖不足發揮騷雅庶寫相懷之心耳江色杳無極渺渺接遙天歸帆帶夕陽去鳥衝寒烟幽景不同觀遐想成斯篇樓閣聳岧嶤參差極雲際高窗曉色鮮晚景餘霞麗寥寥羣動息冥心遠塵世冷淡杳難羣幽趣惟吾識高情薄雲漢清談潤金石不學浮世人奔名競雕飾惟靜百慮忘軒開萬象歸空江答夜鐘高嶠留殘暉幽砌絶塵踪孤雲自依依顧惡如探湯觸物類虛舟他人莫己知此道本吾求獨坐時相懷斜陽下危樓崔巍高山側觸石生片雲自將霖雨期不與塵士羣杳杳游太虛對此幾思君高蹟將誰親幽棲白雲中閒階吐蒼苔古木生清風時將西竺詩講議訓來蒙靜躁各所好是非安能辨聲利如我仇雲泉若牽挽寂寂深林中芳菲自堪翦羣峰聳危碧倒影沉空江清景生晚晴冷色涵虛窗逍遙縱吟賞能使吾心降海日照吟軒江風動庭樹此景樂間情何人識高趣登樓獨南望杳杳空烟霧王伯安詩江上但知山色好峰回始見寺門開半空虛閣有雲住六月深松無暑來病肺正思移枕簟洗心兼得遠塵埃富春咫尺烟濤外時倚層霞望釣臺深林容鳥道古洞隱春蘿天逈聞潮早江空得月多氷霜叢草木舟楫玩風波巖下幽棲處時聞白石歌豫章王孫朱多炡登勝果詩大內離宮已盡荒空餘臺殿鎖醫王諸天欲雪藤蘿紫淨土非春草木香山到隔江排作鳳石眠當路叱為羊攀援削壁窺奇絶海月先穿一線光蕭一中詩秋月同看此夕圓坐中風景共悠然茫山色青天外隱見江濤綺席前蓬鬢漸因時節改壯懷徒為世情牽巖前高閣空寥闊莫惜清樽酒盡添鄭繼之御教場詩萬峰雲木鬱蒼蒼故壘仍存閲武場南渡關河雙眼盡中原風物百憂傍尚傳草莽開黃屋想見龍蛇繞御牀往事只今俱灑淚兩階千羽意何長仁和令樊良樞鐘樓記鳳凰山志稱鍾一郡王氣而勝果寺居其翠釋處默詩云路自中峰上盤回出薜蘿遂為千古名勝上方鐘磬與下方笙歌齊鳴答響抑何盛耶自昔唐迄宋明歷千劫矣舊有巨鐘每晨鳴如鳳應朝陽歲久鐘從樓圮寸莛不發道場岑寂郡邑風會若或缺馬萬厯庚戌之夏樊子宰是邑會壑上人登猊座說楞嚴經豫數過從因笑謂壑公淵明過虎溪乃不聞鐘故應不攢眉去耳于是吳伯霖為南郊檀越與壑公謀興道場首議三亟而鳧氏之鐘為最虞長孺先生感而疏之謂豫喜聞桐魚之扣必能引七寶杵發此鯨音也夫引七寶杵者余則安能壑公高座撾鐘說法令三千大衆盡開聾聵余亦能扣者耳若夫長孺以大覺證菩提伯霖以大乘觀聲聞豫尚不能暗解庶幾聞此霹靂聲醒我睡夢中人也華鐘既鏗鳳凰其鳴郊雉皆雊蒲牢震吼政於是和地於是靈人文於是乎興鐘亦綦重矣鐘樓成而後開薜蘿之徑啓松濤之閣舉中峰歸雲二三室次第振飭此伯霖所謂素朴略施點綴而曇林蓮社共證勝果者也樊良樞遊勝果寺一徑青蘿合逶迤白石橋天吳苑樹地圻浙江潮寒晚催僧臘春雲斷野樵言尋無著子雙澗落風瓢月巖夜坐長林穿窈窕巨石劈谽谺磴轉團風葉巖空結雨花步檐窺月脅拂渚下星槎不記歸時路春燈亂暝鴉夜宿松濤閣古剎開幽徑長松潄碧溪卷簾江色近隱几石幢林暝深巢鶻潮生遠應雞獨憐僧夢片月下窗西鳳凰山懷古滿目山河似裂繒鳳凰峰勢𩰚崚嶒百年霸氣迷秦望萬樹寒煙積宋陵江浦聽鐘潮乍落海門憑檻月孤升登臨不下牛山淚林杪幢幢見佛燈善應總持菴在尊勝宋開寶六年錢王建於西湖南山曰總持治平二年改寶林院有可賦軒景定間遷建於便門鐵箭改善應總持元至元三十一年復遷建今所張孝祥可賦軒詩光明獵獵上烏巾不羡西湖爛漫春借我繩牀對修竹為君一洗軟紅塵圓通菴去總持可百武宋紹興間僧德厚建門有大井極甘冽通鳳山泉脈萬厯間僧德雲圓曉重修從此自東而北至艮山門福田慶壽寺在候潮門外普濟橋宋寶祐二年徐路鈐捨宅建寺請額曰福田以居白石皓禪師元至治間燬泰定間重修復請額加慶壽二字洪武二十四年立為叢林延聖寺在候潮門外宋乾德間吳越王建於清波門外名土宿院天聖二年超法師沿江施食以濟修堤之士詔移院于今所賜額延聖嘉定年間御帶陳玉節於寺側建天妃殿崇奉海神元元統乙亥重建洪武二十四年立為叢林普濟寺在候潮門外普濟橋對宋太平興國元年建有理宗元命殿御書曰祈永度宗元命殿御書曰申祐皇太后元命殿御書曰順福有閣以奉觀音大士御書曰圓通寶閣石碑具存元初以祈永殿奉五顯之神元末燬國初重建周宣靈王祠萬壽寺在江口寺內有鰲背觀音像甚古俗稱淨因羅漢萬壽觀音即此也門有江陽第一山扁資教菴在候潮門外宋大中祥符元年