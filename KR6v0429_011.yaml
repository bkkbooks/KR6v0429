body:
  text: 明吳之鯨撰報恩寺五代杭州報恩慧明禪師姓蔣氏幼出家參學精練志探玄旨乃南遊於閩越間歷諸禪會莫契本心後至臨川謁淨慧禪師師資道合尋回鄞水大梅山菴居時吳越部內禪學者雖盛而以玄妙正宗置之門外師欲整而導之一日有二禪客到師問曰上座離什麼處曰都城師曰上座離都城到此山則都城少上座此山剩上座剩則心外有法少則心法不周説得道理即住不會即去其二禪客不能對新到僧問如何是大梅主師曰闍黎今日離什麼處僧無對師尋遷于天台山白沙卓菴時有明彥上座博學強記來訪師敵論宗乘師曰言多去道遠矣今有事借問只如從上諸聖及諸先德還有不悟者也無明彥曰若是諸聖先德豈不有悟者哉師曰一人發真歸源十方虛空悉皆消殞今天台山嶷然如何得消殞去明彥不知所措自是他宗泛學來者皆服膺矣漢乾祐中吳越忠懿王延入王府問法命住資崇院師盛談玄妙宗一大師及地藏法眼宗旨臻極王因命翠巖令參等諸禪匠及城下名公定其勝負天龍禪師問曰一切諸佛及諸佛法皆從此經出未審此經從何而出師曰道什麼天龍方再問師曰過也資嚴長老問如何是現在三昧師曰還聞麼曰某甲不患聾師曰果然患聾法安禪師初住曹山上堂云知幻即離不作方便離幻即覺亦無漸次諸上座且作麼生會不作方便又無漸次古人意在甚麼處若會得諸佛常現前若未會莫向圓覺經裏討夫佛法亘今未嘗不現前諸上座一切時中咸承此威光須具大信根荷擔得起始得不見佛讚猛利底人堪為器用亦不賞他向善久修淨業者要似他廣頞凶屠拋下操刀便證阿羅漢果直須恁麼始得所以長者道如將梵位直授凡庸宋釋永安姓翁氏溫之永嘉人少歲淳厚黃中通理遇同郡彚征大師風鳴越嶠玉瑩藍田護落文心沉潛學奧以其出樂安孫郃拾遺之門也而有慕上之心往拜而乞度然征性高岸而寡合安事之也曲從若環蓋哀其幼知擇師耳天成中隨侍出杭俄有從十二頭陀之意潛逃欲登閩嶺參問禪宗屬封疆艱棘𨚫回結菴于天台後遇韶禪師法席頓遣羣疑重來禮征咄之曰棄背孝養爾日速辜遺行于斯還有裨補前記否安跪對曰從來無事請用塞責征肯頷之漢南國王錢氏召居報恩寺署號禪師焉乃以華嚴理論為會要因將合經募人雕板印而施行每有檀施罕聞儲蓄回捨二田矣以開寶甲戌歲終而焚之其舌存焉纍投火煅色雖同乎熾炭寒則柔弱今藏普賢道場中慧月禪師法端上堂云數夜與諸上座東語西話猶未盡其源今日與諸上座大開方便一時説却還願樂也無久立珍重僧問學人恁麼上來請師接師曰不接曰為什麼不接師曰為汝太靈利通辨明達禪師紹安師上堂云一句染神萬劫不朽今日為諸上座舉一句分明記取珍重僧問大衆側聆請師不吝師曰奇怪曰恁麼即今日得遇于師也師曰是何歟師有時示衆曰幸有樓臺匝地常提祖印不妨諸上座參取久立珍重問如何是和尚家風師曰一切處見成曰恁麼即亘古亘今也師曰莫間言語玄則禪師頌初問青峯如何是學人自己峯曰丙丁童子來求火後謁法眼眼問甚處來師曰青峯眼曰青峯有何玄句師舉前話眼曰上座作麼生會師曰丙丁屬火而更求火如將自己求自己眼曰與麼會又爭得師曰某甲秪與麼未審和尚如何眼曰你問我我與你道師問如何是學人自己眼曰丙丁童子來求火師于言下頓悟開堂日李王與法眼俱在會僧問龍吟霧起虎嘯風生學人知是出世邊事到此為甚麼不會師曰會取好僧舉頭看師及看法眼乃抽身入衆法眼與李王當時失色眼歸方丈令侍者喚問話僧至眼曰上座適來問底話許爾具眼人天衆前何不禮拜蓋覆𨚫眼摵一坐具其僧三日後吐光而終從禪師福州人也姓陳氏少投石梯出家初住越州稱心寺後住茲院僧問古人有言今人看古教未免心中閙欲免心中閙應須看古教如何是古教師曰如是我聞僧曰如何是心中閙師曰那畔雀兒聲師於開寶六年癸酉六月十四日辰時沐浴易衣告門人付囑訖右脅而逝法輪寺法輪端禪師謁真淨文禪師機不諧至雲居會靈源分座為衆激昂師扣其旨然以妙入諸經自負源嘗痛劄之師乃援馬祖百丈機語及華嚴宗旨為表源笑曰馬祖百丈固錯矣而華嚴宗旨與箇事喜沒交涉師憤然欲他往因請辭及揭簾忽大悟汗流浹背源見乃曰是子識好惡矣馬祖百丈文殊普賢幾被汝帶纍添禪師上堂喝一喝曰師子哮吼又喝一喝曰象王嚬呻又喝一喝曰狂狗趂塊又喝一喝曰蝦跳不出斗乃曰此四喝有一喝堪與祖佛為師明眼衲僧試請揀看若揀不出大似日中迷路妙行寺思淨錢唐喻氏建妙行院于北𮤚接待供僧三百萬畫阿彌陀佛入於神妙楊侍郎傑贊為喻彌陀人從而稱之淨於西湖孤山之北鐫石為大佛頭紹興十年十一月七日入寂禮部侍郎張九成銘其塔香積寺宋三藏法師名法道舊名永道順昌毛氏出家宗唯識百法二論又受西天總持三藏密咒軌及傳圓頓戒法於圓照師咸得其要政和中賜椹衣主左街香積院賜號寶覺林靈素以左道罔上宣和初詔改僧為道士服冠巾天下從之無敢後師獨毅然抗詔黥流道州後七年還僧建炎三年賜號圓通法濟紹興間召對上面命欲為之去其涅迹師曰雖感聖恩然先皇之墨不忍除也上曰這僧到老倔強許自便故事道場僧左道右崇觀以來遂易舊制師不能平詣朝廷與道士劉若謙論辨卒獲改正十七年秋説偈端坐而化茶毗舍利無數建塔九里松仙林寺大明師號雪庭一號梅雪隱人杭仁和籍父姓桂名徵母徐氏昆仲三人師最少以景泰丙子生毀齒喪父患痘風因得目疾數求出家十五尋師唯邪解成化癸巳參休休翁于郡城仙林寺一見契合受無字公案十七祝髮日夜研究滯沉寂之境座元某勉使看教因閲楞嚴至一毫端上現寶上剎有疑後在江陰乾明寺忽覩萬佛閣金碧崢嶸於眉宇間偶會得毫端現剎之句弘治改元除夕聞鐘聲數年行履忽爾活脫信口偈云員響心非聞大千同一照抹過上頭關更不存玄妙乙卯又隨休休翁於淨慈寺乃蒙印可所著有請益警進拈古頌古擬寒山和永明詩偈等凡二十卷號幻寄集行世廣化寺錢唐廣化住持覺宗聖台之黃巖人俗姓蔡始從夢堂於四明時怪石住大慈招師居侍司未幾又從石室學詩日臻其奧若趙子昂虞伯生張仲舉輩皆稱賞之後參南堂於本覺南堂曰汝自是了事人但聞見太多隘塞胸次以致本地風光不能發現於是隨問曰如何是佛南堂曰晨朝有粥齋時有飯擬再進説破次日謁云和尚開大爐鞴鎔鍛聖凡我正如一塊頑鈍鐵投入其中以求鍛煉成就美器若不能者是和尚之爐鞴欠熱耳南堂念其虔懇曲誘之曰我此法門只貴直截承當不在世智辨聰也汝須捨世智向父母未生以前道一句看宗聖無語遂效古人頂彌勒佛像旦暮行道祈生內院一日取平生詩文稿悉火之乃逝崇先寺宋杭州崇先真歇清了禪師左綿雍氏子襁褓入寺見佛喜動眉睫咸異之年十八試法華得度往成都大慈習經論領大意出蜀至沔漢扣丹霞之室霞問如何是空劫已前自己師擬對霞曰你閙在且去一日登鉢盂蜂豁然契悟徑歸侍立霞掌曰將謂你知有師欣然拜之翼日霞上堂曰日照孤峰翠月臨溪水寒祖師玄妙訣莫向寸心安便下座師直前曰今日升座更䐽某不得也霞曰你試舉我今日升座看師良久霞曰將謂你瞥地師便出後遊五臺之京師浮汴直抵長蘆謁祖照一語契投命為侍者踰年分座未幾照稱疾退間命師繼席學者如歸建炎末遊四明主補陀台之天封閩之雪峰詔住育王徙溫州龍翔杭之徑山慈寧皇太后命開山臯亭崇先上堂云我于先師一掌下伎倆俱盡覔箇開口處不可得如今還有恁麼快活不徹底漢麼若無銜鐵負鞍各自著便上堂云轉功就位是向去底人玉韞荊山貴轉位就功是却來底人紅爐片雪春功位俱轉通身不滯撒手亡依石女夜登機密室無人掃正恁麼時絶氣息一句作麼生相委良久曰歸根風墮葉照盡月潭空師終于臯亭崇先塔于寺西華桐塢諡悟空禪師黃龍菴臯亭黃龍慧南禪師依泐潭澄禪師分座接物名振諸方偶同雲峰悅禪師遊西山夜話雲門法道峯曰澄公雖是雲門之後法道異矣師詰其所以異峯曰雲門九轉丹砂點鐵成金澄公藥汞銀徒可玩入煅則流去師怒以枕投之明日峯謝過又曰雲門氣宇如玉甘死語下乎澄公有法授人死語也死語其能活人乎即背去師挽之曰若如是則誰可汝意峰曰石霜圓手段出諸方子宜見之不可後也師默記之曰悅師翠巖使我見石霜於悅何有哉即造石霜中途聞石霜不事事忽叢林遂登𢖍嶽乃謁福嚴賢賢命掌書記俄賢卒郡守以慈明補之既至日其貶剝諸方件件數為邪解師為之氣索遂造其室明曰書記領徒遊方借使有疑可座而商略師哀懇愈切明曰公學雲門禪必善其旨如云放洞山三頓棒是有喫棒分師曰有喫棒分明色莊曰從朝至暮鵲噪鴉鳴皆應喫棒明即端坐受師炷香作禮明復問趙州道臺山婆子我為汝勘破了也且那裏是它勘破婆子處師汗下不能加答次日又詣明詬罵不已師曰罵豈慈悲法施耶明曰你作罵會那師於言下大悟作頌曰傑出叢林是趙州老婆勘破沒來由而今四海清如鏡行人莫與路為讐呈慈明明頷之上堂云千般説萬般喻秪要教君早回去去何處良久云夜來風起滿庭香吹落桃花三五樹師室中常問僧曰人人盡有生緣上座生緣在何處正當問答交鋒𨚫復伸手曰我手何似佛手又問諸方參請宗師所得𨚫復垂腳曰我腳何似驢腳三十餘年示此三問學者莫有契其旨脫有酬者師未嘗可否叢林目之為黃龍三𮤚晦堂心禪師參雲峯悅禪師三年無所得辭去悅曰必往依黃檗南禪師師至黃檗四年不大發明又辭再上雲峯會悅謝世就止石霜因閲傳燈至僧問多福如何是多福一叢竹福曰一莖兩莖斜曰不會福曰三莖四莖曲師於此開悟徹見二師用處徑回黃檗方展坐具檗曰子已入吾室矣師踴躍曰大事本來如是和尚何得教人看話百計搜尋檗曰若不教你如此究尋到無心處自見自肯即吾埋沒汝也上堂云愚人除境不忘心智者忘心不除境不知心境本如如觸目遇緣無障礙遂舉拂子曰看拂子走過西天却來新羅國裏知我者謂我拖泥帶水不知我者嬴得一場怪誕佛日寺宋杭州佛日本空禪師初遊天台山嘗曰如有人奪得我機者即吾師矣尋謁雲居作禮問曰二龍爭珠誰是得者居曰卸却業身來與子相見師曰業身已卸居曰珠在甚麼處師無對同安代云回頭即沒交涉遂投誠入室時始年十三後四年參夾山才入門見維那那曰此間不著後生師曰某甲不求挂搭暫來禮謁和尚維那白夾山山許相見師未升階山便問甚處來師曰雲居來曰即今在甚麼處師曰在夾山頂𩕳上山曰老僧行年在坎五鬼臨身師擬上階山曰三道寶階從何而上師曰三道寶階曲為今時向上一路請師直指山便揖師乃上階禮拜山問闍黎與甚麼人同行師曰木上座山曰何不來相看老僧師曰和尚看他有分山曰在甚麼處師曰在堂中山便同師下到堂中師遂取拄杖擲在山面前山曰莫從天台得否師曰非五嶽之所生山曰莫從須彌得否師曰月宮亦不逢山曰恁麼則從人得也師曰自己尚是冤家從人得堪作甚麼山曰冷灰裏有一粒豆爆乃喚維那明下安排著師曰永審明還解語否無山曰待明解語即向汝道師終于佛日卵塔存焉智才禪師台州人僧問如何是道師曰水冷生氷曰如何是道中人師曰春雪易消曰如何談談師鳴指一下問東西密相付為甚麼衆人皆知師曰春無三日晴曰特伸請益師曰拖泥帶水曰學人到這裏却不會師曰賊身已露上堂城裏喧繁空山寂靜然雖如此動靜一如生死不二四時輪轉物理湛然夏不去而秋自來風不涼而人自爽今也古也不改𮈔毫誰少誰多身無二用諸禪德既身無二用為甚麼龍女現十八變君不見弄潮須是弄潮人珍重上堂云風雨蕭騷塞汝耳根落葉交加塞汝眼根香臭叢雜塞汝鼻根冷熱甘甜塞汝舌根衣綿溫冷塞汝身根顛倒妄想塞汝意根諸禪德直饒汝翻得轉也是平地骨堆參淨慧戒弼禪師僧問如何是毗盧印師曰草鞋踏雪曰學人不會師曰步步成蹤文祖禪師僧問峭峻之機請師垂示師曰十字街頭八字立曰秪如大洋海底行船須彌山上走馬又作麼生師曰烏龜向火曰甚麼則能騎虎頭善把虎尾師以拄杖點一下曰禮拜著奉先寺杭州奉先法明普照禪師法僧問釋迦出世天雨四華地搖六動永審和尚今日有何祥瑞師曰大衆盡見曰法王法如來是也師曰人王見在問淨慧實印和尚親傳今日一會當付何人師曰誰人無分曰恁麼即雷音普震無邊剎也師曰也須善聽宋奉先法昱禪師永嘉人也得法于天台國師吳越忠懿王召入問道命軍使薛溫於西湖建大伽藍曰奉先建大佛寶閣延請師居之演暢宗旨署圓通妙覺禪師僧問如何是西來意師曰高聲舉似大衆師開寶中示滅于本寺華嚴寺唐杭州華嚴釋玄覽姓褚氏其先河南人食菜于錢塘因是家焉覽誕膺明德生而懸解深達實相以崇善本自初念至于捨家師承慧昶師德無不滿衆用皆足年高行尊久為師範及見覽無一息之間違仁告門人曰無上之道清淨為本有能一念用其心吾未見學不足者江表無真僧久矣或以此子為法鼓耶俾遐邇聞之其預為達匠之所甄異也如此其本邑有故華嚴寺覽以苞桑之地近於玄禮師之先塋屬隋室不競法宇弛頽名將壑遷迹亦時廢屬於唐初募信人重建文明歲有勑許還舊額廣輪制度兼移基址背山臨水返往形勝覽初以具戒依天竺次以僧録住一間居後以耆德統華嚴三寺次第同致于道無不在因教有遷也覽嘗以憫物慈濟為己任遂議寺前平湖之通川為放生池時太守袁從禮因茲勸勉深入慈門以禁六里司馬楊敏言感夢又廣至十里是以揚鬐掉尾噞喁浮沉不虞其害得遂生性焉覽又以經像為最則殿前畫四像慈氏為首鑄金銅像三百五十座彌陀為首寫經二千餘軸金字涅槃經為首如是功德以順現報故王考宗追贈和州刺史右散騎常侍封舒國公無量則覽之元昆也量修學之日臨平湖龍見無不往觀舒公晏然不離書案氣度如此明皇初年舒公侍講帝嘉尚之歸覲太夫人年已期昆季皆以華皓晨昏之地説法而已覽以開元二十二年示疾終于臨平所造寺壽八十有四唐釋道光姓褚氏踰齓出家方冠受具詣光州和尚學通毗尼于時夏淺德崇壇場屬望蓋天賚真士為東南義虎雲雨慈味笙鏞道聲光持法華經創塔廟洎沒身不怠也初光未歿其月三日質明支疾凝神依色身觀彌陀具相現在其前滿庭碧華昔所未覩者四日昧爽有異人請光為和尚遂開目彈指曰但發菩提心至五日曼陀羅華自天而雨門人神烈義津追慕弗遑各云法味流布行化香火無窮云羅漢寺宋宗徹禪師吳興人姓吳氏幼歲出家依年受具巡方參禮依黃檗希運禪師法席黃檗一見便深器之入室領旨後至杭州州牧劉彥慕其道立精舍于府西號羅漢院化徒三百師有時上堂僧問如何是西來意師曰骨銼也問如何是南宗北宗師曰心為宗僧曰還看教也無師曰教是心問性地多昏如何了悟師曰亂雲風卷太虛廓清曰如何得明去師曰一輪皎潔萬里騰光師後示疾遷化門人塔于院之北隅梁貞明五年錢王廣其院為安國羅漢寺移師塔於大慈山塢今寺與塔並存七寶寺宋用欽居錢塘七寶寺依大智學律部聞大智示衆曰生弘毗尼死歸安養出家學道能事斯畢即標心淨土一志不退日課佛三萬嘗神遊淨土見佛大士種種異相謂侍者曰吾以明日西行矣即集衆念佛黎明合掌西向跏趺而化慶善寺杭州慶善院普能禪師上堂事不獲已與諸人葛藤一切衆生秪為心塵未脫情量不除見色聞聲隨波逐浪流轉三界汩沒四生致使正見不明觸途成滯若也是非齊泯善惡都忘坐斷報化佛頭截却聖凡途路到這裏方有少許相應直饒如是衲僧分上永為奇特何故如此才有是非紛然失心咄上堂拈拄杖曰未入山僧手中萬法宛然既入山僧手中復有何事良久曰有意氣時添意氣不風流處也風流卓拄杖一下杭州慶善守隆禪師開堂日僧問知師久蘊囊中寶今日當筵略借看師曰多少分明曰師子吼時全露現文殊仗劍又何如師曰驚殺老僧問千佛出世各有奇祥和尚今日以何為驗師曰木人把板雲中拍曰意旨如何師曰石女拈笙水底吹上堂花簇簇錦簇簇鹽醬年來事事足留得南泉打破鍋分付沙彌煮晨粥晨粥一任諸人喫洗鉢盂一句作麼生會多少人疑著千頃慈雲院唐杭州千頃山釋楚南閩人也俗姓張氏爰在齠齡冥然跪於父母前訴志出家投開元寺曇藹師而受訓焉當授經法目所經覩輒誦於口執巾侍盥灑掃應對頗能謹願逮乎冠歲乃落髮焉詣五臺登戒就趙郡學相部律往上都學淨名經一律略通宗旨則知頓機不甘為漸教縛遂往芙蓉山根性未發謁黃蘗山禪師問答雖多機宜頓了倏值武宗廢教南逐深竄林谷大中興教出遇升平相裴公休出撫宛陵請黃蘗出山南隨侍由此便詣姑蘇報恩寺專行禪定足不踰閾僅二十餘載乾符四年蘇州太守周慎嗣嚮風請住寶林院又請居支硎山至五年昌化縣令徐正元與紫溪戍將饒京同召住千頃慈雲院訓示禪徒之外唯儼然在定逾月或浹旬光啓三年前兩浙武肅王錢氏請下山供施昭宗聞其道化賜以鹿胎衣五事別賚紫衣文德六年二月忽雙虹貫堂室二鹿蹶然入寺法堂梁折至五月辭衆後於禪牀垂兩足伸二臂於膝奄然而逝春秋七十僧臘五十六遷塔于院西隅大順二年壬子歲二月宣州孫儒寇錢塘之封略兵士發塔見南全身不散爪髮俱長悔罪而去南公平昔著般若經品頌偈一卷破邪論一卷以枝梧異宗外敵見貴於時也廣福寺臨安府廣福惟尚禪師初參覺印問曰南泉斬貓兒意旨如何印曰須是南泉始得印以前語詰之師不能對至僧堂忽大悟曰古人道從今日去更不疑天下老和尚舌頭信有之矣述偈呈印曰須是南泉第一機不知不覺驀頭錐覿面若無青白眼還如𪂶𪂶守空池舉未絶印竪拳曰正當甚麼時作麼生師掀倒禪牀印遂喝師曰賊過後張弓出住廣福日室中問僧提起來作麼生會又曰且道是箇甚麼要人提起興教寺興教洪壽禪師同國師普靖次聞墮薪有省作偈曰撲落非他物縱橫不是塵山河及大地全露法王身興教惟一禪師僧問佛未出世時如何師曰白雲數重曰出世後如何師曰青山一朵龍興寺唐杭州龍興釋可周俗姓傅晉陵人也出家于本部建元寺友生勉之曰非其地樹之不生今豫章經謂之江論謂之海胡不往請業乎周感其開導挈囊達彼遇雲表法師盛集窮法華慈恩大疏日就月將斡運深趣昭宗初自江西回台越之間命其啓發梁乾化二年受杭州龍興寺召開演黑白衆有半千兩浙武肅王錢氏命于天寶堂夜為冥司講經鬼神現形扈衛往往人覩焉嘗有祭銅官祠神巫氏久請不下後附巫曰吾隨從大人去西關天寶堂聽法方回武肅王聞而鄭重賚周金如意并鉢紫衣一副加號靖智通明焉以天成元年終于觀音院本房初周乾寧四年戾止台州松山寺講疏闕鈔遂依疏節成五卷曰評經鈔音訓五帖解宣律師法華序鈔一卷行于浙之左右弟子相繼不絶漢杭州龍興釋宗季俗姓俞臨安人稚齒瑰偉心志剛直嘗天震鄰家樹季隨僵仆有姊尼抱就膝視之曰此非震死且有生候至夜未央蘇而復作遂勸令出家事欣平寺僧後往衢州投巨信論師學明名數論文義淹詳且難詘伏鋒芒如也逮回杭龍興寺召講時僧正蘊讓給慧縱橫兩面之敵也與閭丘方遠先生江東羅隱為莫逆交見而申問季作二百語酬之讓正賞歎遂請開講四十餘年出弟子七八百人漢乾祐戊申歲疾終于本房初季講次遇一異人作胡語問西域未來之經論一衆驚然季眇二目曾夜行感神光引之嘗覽古師之述作曰可俯而窺也遂撰永新鈔釋般若心經暉理鈔解上生經彌勒成佛經疏鈔補猷鈔闕諸別行義章可數十卷並行於世季道行孤僻性情方正寡言語氣貌高邁誓不趨俗舍暨老懇請亦罕赴白衣家居惟屢空衎然自任而孜孜手不釋卷樂道向終至今此宗越多弟子講導不泯焉多福寺宋杭州多福和尚僧問如何是多福一叢竹師曰一莖兩莖斜曰學人不會師曰三莖四莖曲問如何是衲衣下事師曰大有人疑在曰為什麼如此師曰月裏藏頭湖光寺周杭州湖光釋師簡姓趙氏丹丘人也弗循戒範放肆恬然擁破衲衣多誦詞偈好懸記杭越間災福初無信者驗猶合符於一行景淳山經地理別得徑門常言昔泰山道辨相冢得術餘無取焉喜為人遷山相冢吉凶如其言居無定所多遊族姓家言腹飢便求雞肉餐此外得美酒啜數杯而去初無言謝然長於勒書大字題牌寺觀門額書成相之吉凶隨言久近驗之始居杭西湖旁院無疾而終後有行客自長沙市中見攜手話舊寄言崇壽院主汝先負錢若干今放汝我眠牀芻薦下層有紙裹肉脯必應腐敗為棄之院僧依言果然見之因寫貌供養簡曾言尖頭屋已後火化去及州南塔戊午歲被天火爇之應言無爽矣常照寺宋慧明禪師號晦菴學于慧光晚依青山常照寺修淨業日課法華楞嚴圓覺持彌陀聖號萬數慶元己未春示疾謂弟子曰吾學大乘求生淨土今果遂矣纍足坐視衆聞天樂西來徘徊頂上茶毗五色舍利無算天目山唐天目釋明覺俗姓猷河內人也祖為官嶺南後徒居為建陽人覺儒家之子風流蘊藉好問求知曾無倦懈宿懷道性聞道一禪師於佛迹嶺行禪法往造焉遂依投剃染由此即願觀方𢖍嶽天台四明遍嘗法味復於徑山留心請決數夏負薪面皯手胝下山至杭州大雲寺禁足院門續移止湖畔青山頂結庵而止屬范陽盧中丞嚮風躬謁召歸州治大雲寺住持元和十五年避嫌遠囂隱天目山是山也特秀基墟跨涉四郡有上下龍潭深不可測怪物往往出於中有白鹿毛質詭異土人謂為山神也覺遁是中檀信為禪宇長慶三年春及冬至明年二月大旱野火蔓延欲燒院僧惶懼覺曰吾與此山有緣火當速滅少選雷雨驟作其火都滅遠近驚歎以大和五年七月十九日示寂唐錢塘永福釋慧琳字抱玉俗姓柯新安人卯齡受業于靈隱西峯為金和尚弟子所傳法要斷無重問大厯初受具足戒于靈山會習學三教一領無遺不樂聲華止好泉石一入天眼二十餘年天眼即天目也其山高三千丈周圍三百里與天柱廬阜等相儔匹上有二湖謂為左右目登涉艱阻數日乃到巔頂多蛟龍池潭三所最上池人不可近氣臭逆人不可久視或説山神作白鹿形每五月與震澤龍會必暴風雨焉琳居此率多妖異而心不撓元和丁亥太守禮部員外城南杜陟請出永福寺登壇至己丑歲春刺史兵部郎中裴常棣召臨天竺寺壇度人畢歸寺講訓生徒向二十載郡守左司郎中陸則刑部侍郎楊憑給事中盧元輔中書舍人白居易太府卿李幼公刑部郎中崔鄯刑部郎中路異相繼為邦伯皆以公退至院致禮稽問佛法宗意染指性相此諸名公簪組上流辭學高度或號毗曇孔子或名勝力菩薩非琳何以感動哉太和六年四月二十五日示滅享壽八十有三法臘六十四以其年五月十二日葬于今永安寺西山之陽瑪瑙坡之左石塔巋然存矣高峯禪師諱原妙故武辨也初參斷橋倫公語未契立三年死限于淨慈脅不至席口體俱忘或如廁惟巾單而出或發函忘扄鐍而去後參雪巗欽公有省遁入天目獅子巗構死𮤚立參三十年影不出山每以萬法歸一一歸何處話極力究竟一日諷經次忽覩五祖演和尚真贊驀然大悟上堂云無邊剎境自他不隔於毫端十世古今始終不離於當念只如山僧每日在張公洞裏橫眠竪眠或歌或詠諸人還知麼諸人每日在選佛場前東行西行或嗔或喜山僧還知麼若也彼此知得不免分身碓搗拔苦犂耕若也彼此不知管取釋迦拱手彌勒皈依因甚如此不見道知之一字衆禍之門上堂云萬法歸一一歸何處乃顧視左右下座上堂云十方世界是箇鉢盂汝等諸人吃粥吃飯也在裏許屙屎放尿也在裏許行住坐臥乃至一動一靜總在裏許若也識得達磨大師只與你做得箇洗腳奴子若也不識二時粥飯將甚麼吃參元正上堂新年頭行新令露柱燈籠急著眼聽竈頭西南角有片方磚惺惺伶俐伶俐惺惺念茲在茲必恭必敬因甚如此徐十三郎行年本命上堂云愛之欲其生惡之欲其死愛惡兩重𮤚以拄杖卓云總向遮裏起直饒識得根源更買草鞋行腳三十年以拄杖中何曾踏著遮裏擲拄杖云你有拄杖子與你拄杖子上堂卓拄杖云獅子窟獅子吼獅子兒無前後驀然直下身便解人前開口即令莫有身底麼擲拄杖云蝦跳不出斗中峯禪師明本杭之新城人生有異徵為童兒戲必為佛事暫入鄉校尋去稍長閲經教然指臂求佛甚切晝夜彌厲困則首觸柱自警期必得乃已及入死𮤚密受心要久之誦金剛經至荷擔如來阿耨多羅三藐三菩提處恍然開悟自是説法示人如千江一源奔注放溢莫之能禦從容自在若不經思纍千百言應問無礙隨其根器廣為䇿勵推以為大辨焉緇素及門自以為有得即所聞受傳録模印行於四方所謂法語書題唱之屬不可勝計又有書五篇曰破胎息論妄傳曰闢信心明義解曰擬寒山詩曰辨七徵心處曰説如幻法名曰一花五葉集虛谷凌禪師於師為尊屬見而歎曰此佛祖向上事非下根小器所可識也仁宗皇帝聞而聘之不至製金襴袈裟賜之曰佛慈圓照廣慧禪師賜獅子院名曰正覺禪寺英宗亦封香製衣即所居而修敬焉駙馬太尉藩王王使人從師問法意以為未足請于上親往見之既見構亭巖前曰真際表得法也三藏法師沙津愛護持必鼐雅實哩遊方時常從師參詰及事三朝每為上道之翰林承旨趙公孟俯每受師書必焚香望拜與師書必稱弟子結一菴名幻住信施金幣重寶交至一視之邈如也師相好魁碩見者稱歎皆畫像事之南詔人有奉其像者夜有神光燭天其士感悅遂篤信禪宗云時人為之語曰師乘大悲願力為法檀度觀時識宜隨機應物多諸方便如摩尼珠無有定色為未證得謂證得者我説無悟由為求名聞利養者韜晦巖谷為毀犯律儀者演毗尼法為妄認法塵以資狂解者導以正悟為圓機者直示向上師皆以身先之不事空言而師方自以文字失於學問參究闕於明悟尋常好事者所稱蓋報緣之偶然耳翩然為退休之計蓋師之高邁過人而謙抑如此斷崖禪師俗楊氏父太宥母張氏以宋景定癸亥十一月二十三日生師於湖州德清縣自幼不食葷酒六歲始能言但從其母誦法華經於人世事懵無所知姿貌嶷然志若有所待年十七有禪者過之誦高峯上堂語曰欲窮千里目更上一層樓師忽言曰此大善知識必能為人拔釘去楔耳能與我往見之乎母驚異之略具衣裝與之行見高峯于天目山師子巖立死𮤚為童子峰謂之曰汝所持何多為師曰以待寒暑峯曰學佛者不如是師即盡以散諸人乃令提萬法歸一一歸何處話因名之曰從一他日峯為僧舉牛過櫺話師聞之忽生大疑參究不倦一日告峯曰上極天宮下窮水際盡大地界一琉璃瓶峯曰莫作聖解他日過鉢盂塘見雪自松上墜有省即詣峯呈頌曰不分南北與西東大地山河一片雪聲未絶峯痛捧之不覺殞身崖下懸崖壁立人意其必死同學明通捫蘿接磴以救之則已出半山無所苦也謂通曰我往江西見欽公去也通曰汝辜負老漢棒矣力挽之還即同還山之西禪院自誓曰我七日不證則決去矣遂直堅壁忘廢寢食夜則攀樹露立達旦未及所期豁然大悟馳至死關呼曰老和尚今日瞞我不得也呈頌曰大地山河一片雪太陽一照便無蹤自此不疑諸佛祖更無南北與西東明日峯上堂云我布縵天大網打鳳羅龍不曾遇得一蝦一蟹今日有蟭螟蟲撞入三十年後向孤峰絶頂揚聲大呌且道呌箇甚麼舉拂子云大地山河一片雪師便奪峰拂子為衆舉揚訶勵同學辭不少遜復曰盡大地有一人發真歸源從一皆知之峯歎其俊快有僧參峰次峰令見師師曰驀直去其出言大抵如此久參者愧之幾有命如懸𮈔之慮遂歸德清其母為賣簪珥同入武康上柏山結茅以居人見其渾俗罔測其意越五年還山見峯峯云大有人見你拖泥帶水師曰兩眼對兩眼遂剃落峯改其名曰了義元貞乙未高峯示寂師亦韜晦或遊禪林頽然居下板孤峭巖峻不假借人辭色或觸其機鋒發言如奔雷諸方客衲莫不驚歎居不擇地隨寓而休而律範大間凜如冰雪所至四衆歸重公侯貴人爭相迎奉師于正宗禪寺纍請住持若不聞召未嘗受請立僧而咸尊之曰義首座云中峰本公大揚高峯之道烜赫昭著法席之盛中外罕及至治癸亥棄衆而化同門布袍雍公見地明白提唱超卓而去世更久後泰定三年師勉從衆請歸坐祖庭者一載所謂正宗禪寺者也參學之衆輻輳而至或示衆曰除却語默動靜道將一句來又嘗曰一息不來向何處安身立命然或嬉笑怒罵粗言穢語人所不堪或不因勸請自肆談説或成頌偈不待思惟應機而發人所莫測元統元年歲除日師忽謂從者曰有一件事天樣大還委悉麼良久云明日是年朝正月六日詣法塔西指于地曰更好立箇無縫塔其晚與禪者談笑至夜分乃曰老僧明日天台去也禪者曰某甲隨師去師曰你走馬也趕我不及翼早跏趺而化大明空谷禪師諱景隆字祖庭號空谷姑蘇洞庭黿山陳氏子父月潭居士母金氏生師于洪武癸酉七月十二日童時不茹葷趺坐若禪定永樂壬辰從辨山白蓮懶雲和尚受學參禪雖家居而湖海禪伯如古拙和尚輩靡不參謁庚子出家虎丘宣德二年詣杭州昭慶受戒遂依師住靈隱七年往天目禮祖塔憩錫一載苦參究忽有省因造懶雲剖露雲印可之師所著有空谷集三十卷心宗洞達機辨峻拔儒釋通貫事理交融大理卿吳公志之師存年五十二時自作塔銘於武林西湖之修吉山院名正傳有正傳十景之咏在集淨土院淨土惟正禪師秀州華亭黃氏子幼從錢塘資聖院本如肄業且將較藝于有司如使禱觀音像以求陰相師謝曰豈忍獨私於己哉郡人朱紹安聞而加歎欲致帑度之師慨然曰古之度人以清機密旨今反是去古遠矣吾墮三寶數當有其時已而遇祥符覃恩得諧素志獨擁毳袍且斃同列慢之師曰佛乎佛乎儀相云乎哉僧乎僧乎盛服云乎哉厥後有願輸奉歲時用度俾繼如之院務亦復謝曰聞托鉢乞食未聞安坐以享聞歷謁諸祖未聞廢學自任况我齒茂氣完正在筋力為禮非從事屋廬之秋也於是提策東引學三觀於天台復旋徑山咨單傳之旨於老宿惟素舊董臨安功臣山淨土院師輔相之久而繼席焉然為人高簡律身精嚴名卿巨公多所推尊葉內翰清臣牧金陵迎師語道一日葉曰明日府有燕飲師固奉律能為我少留一日欵清話否師諾之翼日遣使邀師留一偈而返曰昨日曾將今日期出門倚仗又思惟為僧秖合居巖谷國士筵中甚不宜坐客皆仰其標致師識慮洗然不牽世纍雅愛跨黃犢出入軍持巾鉢悉挂角上市人爭觀之師自若也杭守蔣侍郎嘗與師為方外友每謁至郡庭下犢談笑終日而去蔣有詩曰禪客尋常入舊都黃牛角上挂瓶盂有時帶笠穿雲去便好和雲畫作圖師嘗作山中偈曰橋上山萬層橋下水千里唯有白鷺鷥見我常來此平生製作三十卷號錦溪集又工書筆法勝絶秦少遊珍藏之冬不擁爐以荻花作毬納足其中客至共之夏秋好玩月盤膝大盆中浮水上自旋其盤冷笑達旦率以為常九峰韶禪師嘗客于院一夕將臥師邀之曰月色如此勞生擾擾對之者能幾人峰唯唯而已久之呼童子使熟炙峰方飢意作麵餅頃乃橘皮湯一杯峯匿笑曰無乃太清乎又問曰師以禪師名乃不談禪何也師曰徒費言語吾懶寧假曲折但日夜煩萬象為敷演耳言語有間而此法無盡所謂造物無盡藏也皇祐元年孟夏八月語衆曰夫動以對靜未始有極吾一動歷年六十有四今靜矣然動靜本何有哉於是泊然而逝光慶寺光慶遇安禪師錢塘人也姓沈氏丱歲出家于天台華頂峯禮菴主重蕭披剃依年受具尋遇本山韶國師密契宗旨乾德中吳越忠懿王命住北𮤚傾心院又召入居天龍寺開寶七年甲戌安僖王請于光慶寺攝衆署善智禪師初上堂有僧問無價寶珠請師分付師曰善能吐露曰恁麼即人人具足也師曰珠在什麼處僧乃禮拜師曰也是虛言問提綱舉領盡立主賔如何是主師曰深委此問曰如何是賓師曰適來向汝道什麼曰賓主道合時如何師曰其令不行問心月孤圓光吞萬象如何是吞萬象底光師曰大衆總見汝恁麼問曰光吞萬象從師道心月孤圓意若何師曰抖擻精神著曰鷺倚雪巢猶可辨光吞萬象事難明師曰謹退問青山緑水處處分明和尚家風乞垂一句師曰盡被汝道了也曰未必如斯請師答話師曰不用間言又一僧方禮拜師曰問答俱備僧擬伸問師乃叱之師有時示衆曰欲識曹溪旨雲飛前面山分明真實箇不用別追攀問承古德有言井底紅塵生山頭波浪起未審此意如何師曰若到諸方但恁麼問曰和尚意旨如何師曰適來向汝道什麼師又曰古今相承皆云塵生井底浪起山頭結子空華生兒石女且作麼生會莫是和聲送事就物呈心句裏藏鋒聲前全露麼莫是有名無體異唱玄談麼上座自會即得古人意旨不然既恁麼會不得合作麼生會上座欲得會麼但看泥牛行處陽焰波木馬嘶時空花墜影聖凡如此道理分明何須久立珍重太平興國三年隨寶塔見于滋福殿賜紫號明智大師淳化初還光慶舊寺三年九月二十日示寂武林山支遁字道林廬人幼有神理聰明秀徹初至京師太原王蒙甚重之曰造微之功不減輔嗣隱居餘杭山沉思道行之品委曲慧印之經卓焉獨拔得自天心禪月大師貫休以詩謁吳越王錢鏐有滿堂花醉三千客一劒霜寒十四州之語鏐令改作四十州乃可相見休曰州亦難添詩亦難改孤雲野鶴何天而不可飛遂去蜀宋慧亨住武林延壽初依靈芝習律專修淨業六十年每勸人必以念佛為先有江自任者忽夢寶座從空而下云亨律師當升此座適社孫居士預啓別亨即在家作印而化其時師亦謂其徒曰孫君已去吾亦行矣即説偈曰彌陀口口稱白毫念念想持此不退心決定生安養端坐而化號清照律師後唐杭州真身寶塔釋景霄姓徐氏丹丘人初在表公門後慕守言闍黎義集敷演于丹丘執性嚴毅寡與人交介自持多事凌轥形器惡弱後納請往金華東白山獎訓初學時有江西徽猷律匠出義記曰龜鑑録多學彭亨領徒到霄寺正值講次當持犯篇再三歎賞自此聲溢價高每晨滴茶一旦化為乳焉著記二十卷號簡正言以思擇力故去邪説而簡取正義也武肅王錢氏召於臨安故鄉宰任竹林寺未幾命赴北塔寺臨壇天成二年也次命住南真身寶塔寺終焉遷葬于大慈山塢以本受師號塔曰清源杭州瑞龍幼璋禪師唐相國夏侯孜猶子大中初伯父司空出鎮廣陵師方七歲遊慧照寺聞誦法華志求出家伯父初不允因師絶飲食不得已而許之師慧遠禪師後遊諸禪會薯山白水咸受心訣咸通十三年至江陵騰騰和尚囑之曰汝往天台尋靜而棲遇安即止已而又值憨憨和尚撫而記曰汝却後四十年有巾子山下菩薩王於江南當此時吾道昌矣尋抵天台山於靜安鄉創福唐院乃契騰騰之言又往隱龍院中和四年浙東飢疫師於溫台明三郡收瘞遺骸時謂悲增大士雪峯嘗往見之遺棕櫚拂子而去天祐三年錢尚父遣使童建賫衣服香藥入山致請至府庭署志德大師館于功臣堂日親問法師請每年于天台山建金光明道場諸郡黑白大會逾月而散將辭歸山王加戀慕於府城建瑞龍院延請開法時禪門興盛斯則憨憨懸記應矣天成二年丁亥四月乞墳塔于尚父父命陸仁璋於西𮤚選勝地建塔創院改天台隱龍為隱迹塔畢師入府庭辭尚父囑以護法尅期順寂尚父悲悼遣僧正集在城宿德迎引入塔杭州傾心法宗一禪師上堂良久曰大衆不待一句語便歸堂去還有紹繼宗風分也無還有人酬得此問麼若有人酬得這裏與諸人為怪笑若酬不得諸人與這裏為怪笑珍重僧問如何朴實免見虛頭師曰汝問若當衆人盡鑒曰有恁麼來皆不丈夫秪如不恁麼來還有紹繼宗風分也無師曰出兩頭致一問來曰甚麼人辨得師曰波斯養兒問佛法去處乞師全示師曰汝但全致一問來曰為甚麼却拈此問去師曰汝適來問甚麼曰若不遇於師幾成走作師曰賊去後關門問別傳一句如何分付師曰可惜許曰甚麼則別酬亦不當去也師曰也是間辭問如何是不朝天子不羡王侯底人師曰每日三條線長年一衲衣曰未審此人還紹宗風也無師曰鵲來頭上語雲向眼前飛問承古有言不斷煩惱此意如何師曰又是發人業曰如何得發業師曰你話墮也問請去賞罰如何是吹毛劒師曰如法禮三拜師後住龍册寺歸寂餘杭大錢山從襲禪師雪峰之上足也自本師印解洞曉宗要常曰擊𮤚南鼓唱雪峰歌後入浙中謁錢王王欽服道化命居此山而闡法焉僧問不因王請不因衆聚請師直道西來的意師曰那邊師僧過這邊著曰學人不會乞師指示師曰爭得恁麼不識好惡問閉門造車出門合轍如何是閉門造車師曰造車即不問汝作麼生是轍曰學人不會乞師指示師曰巧匠施工不露斤斧瞽菴講師台之寧海人母金氏夢大士現五色雲中覺而有娠及生逮長灑然有出塵之思年十二投會稽悟本院一山元出家元天歷初受具聞天岸濟公主萬壽圓覺寺師往依焉濟見其天機峻利有一日千里之勢乃曰子盍從吾師遊他日大顯南嶽一宗吾於子有望矣濟之師即佛海也佛海倡道上天竺師廁多士中晝夜研磨三觀十乘之旨悉貯心胸叩之者辨口如水佛海遂命司賓及佛海退居南天竺演福延師為第一座至正五年升隆壽教寺越六年江浙省臣復聘主演福寺寺當兵燹之餘鞠為荒墟師創殿宇以納負笈之士遇有咨問悉竭所蘊而示悟之自持一榻二十年蕭然如在逆旅洪武四年某月順寂神思不亂如返故廬宋學士濂為撰塔銘千歲和尚名寶掌中印土人魏晉間東遊自云六百七十三歲周威烈王十二年丁卯生左手握拳有珠在掌中因以為名始抵峨眉五臺南返衡廬入建業與達摩遇於梁朝遂扣法焉洎來二浙愛天竺之勝結茒而居者四十五年復往四明天台及諸名山遊歷將遍唐貞觀十五年還竺峯久之移居浦江寶巖顯慶二年正旦手捏一像九日而成與其貌無異即告徒曰吾誓住世千歲自來支那忽四百歲今已過七十有二年矣説偈而化世稱千歲和尚遺記滅後有僧來取吾骨勿拒越五十四年刺浮長老至彼作禮塔戶倐開得其骨皆連鎖金色因持來別建塔藏之為中竺開山始祖贊曰人壽幾何朝露逝川生周涉唐本誓則然東遲達摩心印始傳孰云佛法獨在西天海月法師名慧辨字訥翁華亭富氏子受業普照從天竺韶及浮石矩傳天台教觀韶將老命師代講夢章安以金篦擊其口曰汝勤於誨人當得辨智久之率繼其席嘉祐中翰林沈公遘帥郡以嚴為理察師道行獨異之俾蒞僧職遷都僧正東坡時為通守嘗與師為方外之遊講授二十五年往來常千人無何歸隱草堂但六事隨身而已熙寧六年冬旦起盥濯別衆而化遺戒須待東坡至方可合棺四日坡始抵山中見其趺坐如生頂尚溫暖作三絶哭之師沒二十一年東坡追序其事云余去杭夢至西湖上有大殿榜曰彌勒下生故人海月辨師之流皆行道其問乃作贊辭濱銘其塔贊曰滄海孤月生于雲間飛輪竺嶺萬象光寒知之者誰眉山老仙有如不信銘贊皎然水源法師名淨源字伯長姓楊氏生而敏慧依東京報慈寺海達大師得度奮志參尋初見華嚴承遷次見橫海明覃後見長水子璿盡得華嚴奧旨聲譽藉甚住泉之清涼𧁨之觀音杭之祥符湖之寶閣秀之善住左丞蒲公守杭尊其道以慧因院易禪為教命師居之所至緇素景慕師筆力遒徑合華嚴證聖正元二疏為一以便觀覽製華嚴楞嚴圓覺三懺法及作法華集義通要十四卷又疏解仁王般若等經高麗國王子為僧曰統義天航海而來問法於師朝廷遣侍講楊傑館伴化及外國其道可知矣元祐三年冬示寂茶毗得舍利無數瘞於慧因院之西北壽七十八先世泉之晉水人故學者以晉水稱之贊曰法界無盡一心洞明奮厥餘力詮釋羣經作式𡸁範聿有駿聲慕法者衆海國揚舲前載未備今補
