body:
  text: 明吳之鯨撰北山分脉由錢塘門至三天竺菩提院本錢惟演別墅也捨以為寺有白蓮緑野等堂碧玉四觀披灝等軒南漪迎薰澄心涵碧玉壺雪𣰽瑜等亭後併入昭慶寺真覺院即隱菴法濟院舊名觀音院有明軒爽軒妙因院即慈光菴寶嚴院俗呼九曲院昭慶律寺晉天福間吳越王建宋乾德二年重修太平興國三年建戒壇於寺中每歲三月三日海內緇流雲集於此推其長老能通五宗諸典者登壇說法敷陳具戒其徒跪而聽之名曰受戒至今行之天禧初有圓淨法師學廬山慧遠結白蓮社搢紳之士與會者二十餘人運使孫何為之記南渡後以其地為䇿選鋒軍教場尋復為寺元末燬洪武間重建成化間燬雲水僧廣慎復營之嘉靖間燬于海寇都御史胡宗憲重創殿宇隆慶間復燬新都汪道昆募建萬厯二十五年敕賜銀一千兩助建內有萬善戒壇藏經閣千佛閣緑野堂觀音井碧玉軒四觀堂看山亭臥牛石放生池宋陳堯佐詩湖邊山影裏靜景與僧分一榻坐臨水片心閒對雲樹寒時落葉鷗散忽成羣莫問紅塵事林間肯暫聞王元之詩夢幻吾身是偶然勞生四十又三年任誇西掖吟紅葉何似東林種白蓮入定雪龕燈焰直講經霜殿磬聲圓謫官不得餘杭郡空寄高僧結社篇大佛寺舊傳為秦始皇纜船石宋宣和中僧思淨者當兒時見之作念曰異日出家當鐫此石為佛及長為僧妙行寺遂鐫石為半身佛像飾以黃金構殿覆之遂名為大石佛院淨即喻彌陀也元至正間院燬佛像亦剝落永樂間僧志琳重建敕賜為大佛禪寺弘治四年僧永安重修寺畔有塔俗稱壺瓶塔宋諸帝原葬紹興府寶山此山又名上山又名攢宮山自西僧嘉木揚喇勒智發其冢將諸帝骨雜以牛馬犬羊之骨併而葬塔于江干號為鎮南塔俗則呼為白塔至今相傳其地為白塔嶺未幾被雷火所擊杭人驚異且哀諸帝之不幸也共收餘骨葬寺東造塔其上號壺瓶塔事見山陰唐之淳懷古集旁即沁雪泉張太尉總宜園德生堂理宗書扁泳飛亭放生亭天禧四年王欽若請以西湖為放生池禁民採捕故構此亭放生碑郡守王隨記李攀龍詩西湖斜日淨風烟北嶺岧嶤出半天磴道半從空外轉樓臺已入鏡中懸塔分西域銅勢石紀秦王錦纜年白社但須彭澤酒青山不用華家錢波搖玉樹堪雙映月上珠林好獨眠我輩自狂君莫訝平生未敢謬周旋昔太學生所作風入松詞一春常費買花錢日日醉湖邊玉驄慣識西湖路嬌嘶過沽酒樓前紅杏香中簫鼓緑楊影裏鞦韆暖花十里麗人天花壓鬢雲偏畫船載得春歸去餘情付湖水湖煙明日重携殘酒來尋陌上花鈿時帝微行見此笑曰詞斯美矣但明日重携殘酒終帶儒酸不如改為明日重扶殘醉次日召兩官之金輪寺在保叔寺山門之側周顯德二年吳越王建楊蟠詩云首出羣山內推開幾度看不因風雨折欄檻滿溪寒保叔寺古名崇壽院一名聖壽禪寺在寶石山上山名壽星瑤石山又名巨石山又名石甑山山高六十餘丈開寶中吳越相吳爽建內有九級浮圖名應天塔後燬咸平中僧永保重建去其二級人呼為保叔塔嘉靖元年燬二十二年山西僧永杲募緣重建或云南宋為保所塔張即之湖山勝槩門扁僉事焦煜寶石門扁羅隱封山記徐一夔碑記梯雲嶺巾子峯一名獅子峯錢王箭臺永保岩一勺泉甘泉天然樓乳泉井在山北其色白如乳汁石屏風古名此寺為屏風院墜星石一名落星石一在山上一在山之北原學士軒元學士黃文獻公嘗寓此看松臺開化方豪建獅子巖在看松臺之上覽勝樓極樂菴錢湖龍君廟碑陰陽池在塔下水月園在大佛頭之西宋紹興中高宗以賜和王楊存中為書水月二字門扁水月亭玉琳堂俱在水月園內宋樞密童粢墓錢思復詩云金剎天開畫鐵簷風語鈴野雲秋共白沙樹晚逾青鑿屋岩藏雨黏崖石墜星下看湖上路歌吹正沉冥林和靖詩巾子峯前烏桕樹清霜未落葉先飛如何天竺林間路猶到秋深夢翠微一勺泉詩絶頂盤峯秀蛟宮湧地蓮塔棲南斗下僧問劫灰年鬼谷摧堅石神功琢湧泉派疑銀漢瀉溜訝玉龍穿沆瀣雲根滿分明琬琰鐫一泓通海眼孤浸立山巔正正沉華月亭亭蘸碧天味香流乳滑嵌泄濺珠圓魚躍金梭見虹垂寶帶懸洗甌僧瀹茗供佛客擎錢幾許詩脾沁寧當俗慮牽靜為仁者學湛若定心禪渴想𣂐瓢飲酣宜潄石眠何人識恬淡終日愛潺湲莫怪頻來此煩疴頓覺痊劉賔山閏九月登山詩一年難遇兩重陽且復登臨到上方佳節不隨秋去早山林應笑客來忙白衣人遠誰供酒黃菊花殘強傲霜莫遣西風吹落帽鬢毛林葉共蒼蒼又同沈石田登寶峯詩僧樓重會沈休文把酒看山興絶羣一道泉聲池上落兩湖春色坐中分苦吟野鳥如憐我不飲山花亦笑君須把老懷傾瀉𥁞毋勞別後賦停雲相嚴院晉天福二年錢氏建有十三間樓樓上貯三世佛一尊蘇子瞻治郡時常判事於此智果禪寺舊在孤山吳越王所建宋紹興間徙築于此先是蘇子瞻守杭州與智果禪院師參寥子善名其所居泉曰參寥泉寺既徙北山有泉適出寺後好事者仍名參寥泉以志舊蹟元末燬洪武初僧可祥惠炬重建徐一夔作記其梁題云元祐五年歲在庚午二月辛卯二十五日乙卯上梁蓋子瞻手書自孤山移置者昔東坡在黃州夢與參寥子賦詩覺記兩句云寒食清明都過了石泉榆火一時新後七年坡守杭參寥住持智果寺內有泉宜茶寒食日東坡偶過訪之因憶舊夢以參寥名其泉參寥子即道潛僧之別號也東坡夢中識之道潛平時有詩曰數聲柔櫓蒼茫外何處江村人夜歸又曰隔林倣佛聞機杼知有人家在翠微偶經臨平道中詩風蒲獵獵弄輕柔欲立蜻蜓不自由五月臨平山下路藕花無數滿汀洲東坡見之稱賞不已後得之于西湖智果寺一見如舊及坡移守東徐潛往訪之於逍遙堂坡遣一妓前乞詩潛援筆題曰寄語巫山窈窕娘好將魂夢惱襄王禪心已作沾泥絮不逐東風上下狂自是名聞海內吳立夫詩古寺湖水上寺門但菰蒲一泉湛如玉巖骨旱不枯粵從參寥鑿得與蓋壤俱東坡或茗宴西嶺猶松竽人誰問詩侶世頗笑酪奴瓦甃縱然在木瓢知已無汲水宜汲深塵心非轆轤別禪勝別味俗舌空醍醐老僧久不識香池冷宿盂卓哉郡太守遺像擁眉鬚間來試我酌霧雨變須臾尚持金芙蓉便踏赤鯶魚治平寺初名錦塢庵僧法聰建有烟雲閣壽星寺在智果寺側有壽星石明遠堂垂雲亭寒碧軒一擊軒平秀軒東坡祠杯泉觀堂江湖偉觀扁趙與建東坡次韻周長官詩琉璃百頃水仙家風靜平湖響釣車寂歷疏松欹晚照伶俜寒蝶抱秋花困眠不覺依蒲褐歸路相將踏桂華更著綸巾披鶴氅他年應作畫圖誇寒碧軒詩清風肅肅搖窗扉窗前修竹一尺圍紛紛蒼雪落夏簟冉冉緑霞沾人衣日高山蟬抱葉響人靜翠羽穿林飛道人絶粒對寒碧為問鶴骨何緣肥明遠堂詩十年不向此憑欄景象依然一望間龍蜃吐雲天入水樓臺倒影日銜山僧於僻寺難為隱人在扁舟未是閒孤鶴似尋和靖宅盤空飛下復飛還朱繼芳江湖偉觀詩吳山表裏水為池百有餘年壯帝畿天目遠將雙鳳落海門近拱六龍飛胥濤白雪生秋思太乙紅雲駐夕暉江上沙鷗湖上舫柳邊風裏兩依依寶雲寺在寶雲山下一名千光王寺宋乾德二年吳越王建即瑪瑙寺東空園是也有靈泉錦塢澄心閣妙思堂南隱堂清軒月窟宋邳王墓抱朴子墓在寺側葛仙翁名洪字稚川抱朴子其別號也蘇東坡雪後游寶雲寺詩寶雲樓閣閙千門林靜初無一鳥喧閉戶莫教風掃地捲簾疑有月臨軒水光㶑灔猶浮碧山色空濛已斂昏乞得湯休奇絶句始知鹽絮是陳言薩天錫葛嶺詩煉仙子渺茫間一夕乘風去不還火冷爐頭灰已盡雲封洞口嶺長閒千年瑞氣生瑤草夜半天風響珮環真境空明自今古烟塵依隔瀛寰秦舜友初陽臺詩晨光凝遠眺寒露滴松風玉笛一聲曉萬山青翠空瑪瑙寺舊在孤山今葛嶺東一名寶勝院開運三年吳越王建宋治平二年改賜是額紹興二十二年徙于此有瑪瑙崖瑪瑙山居紫雲洞寶雲山高生閣僕夫泉初陽亭初陽臺煉丹井中庸子陶器墓乃法慧禪師也張伯雨宿瑪瑙寺詩一宿葛洪丹井上化為蝴蝶夢魂清湖田凉蛤四散吠烟寺曉鐘相鳴孤嶼橫生為玉几初陽煥爛似霞城拏舟又入水雲去還我風篁雪竇聲登初陽臺詩初陽臺上新亭好一曲笙簧石壁開驚去玄真狂道士步虛飛下玉清臺葛洪嶺上訪真居一飲丹泉足自如拂袖莫嫌狂散甚子非知我我知魚趙達夫白鮮于樞三人遊初陽臺聯句詩巾子峯頭艤釣船初陽臺上坐鳴絃出雲高樹明殘日過雨蒼苔泣細泉絶俗誰能繼遐躅凌虛我欲挾飛仙還家政恐鄉人問化鶴重來知幾年招賢寺在葛嶺上唐德宗時郡人吳元卿為六宮內使棄官學道結庵于此後吳越王改為寺宋高宗葬欽宗神主于此寺後尉遲恭井梅泉東坡書扁白樂天紫陽花詩序云招賢寺有山花一樹色紫氣香芳麗可愛頗類仙物而人無識者因以紫陽花名之詩云何年植向仙壇上早晚移栽到梵家雖在人間人不識與君名作紫陽花嘉德永壽講寺俗稱毛寺宋理宗時秦國夫人毛氏者皇后母也既老結庵于此就葬焉即庵為寺有芝産墓側因名芝巖前有放生池翔泳堂幻隱洞寶粧閣東有寶嚴院垂雲亭借竹軒西有定業院環峰堂襲夢軒神仙宮靈耀觀並廢白玉翔泳堂酒中詩環辭度得雪兒歌濃墨斜書碧玉柯醉折芙蓉薰酒盞裏湖凉似外湖多鳳林寺俗呼喜鵲寺唐長慶初禪師圓修居此四十餘年棲息松上有鵲搆巢其傍人遂呼為鳥窠禪師白樂天守杭州時常往參之曰大師居處甚險禪師曰太守險樂天曰弟子位鎮山河何險之有禪師曰心火相交識性不停得非險乎樂天服之宣德間僧如月重建敕名鳳林寺圓修骨塔存焉僧來復詩寶網金幢變劫灰瞿曇寺裏蓋蒿萊鳥窠無樹山夔泣不見談禪太傅來君子泉本在定業院中亦鳥窠禪師道場也院廢而泉湮後人遂勒石于此寒冽而深會為方沼可氷鮮焉伴玄庵在瑪瑙寺側有葛翁丹井祭酒馮夢禎顏其堂曰白業㕓僧性智焚修妙智庵一名報國觀音院在栖霞嶺上舊多桃花春時爛然如霞故名栖霞左有寶雲右有仙姑二山相挾嶺在其中如劍門故名劍門嶺有危松翠華如蓋上臨賜為御愛松有紫雲洞栖霞洞金鼓洞靈芝岩烏石峯閻頭陀盛暑曝背其上改名悟石護國仁王講寺在無門洞詳記中釋文石記略曰洞在西湖北山智果山居後初陽臺下紫雲洞前舊傳岩石㟏岈懸巒匝地宋有高僧慧開字無門者居此故因師名云當淳祐理宗時召問法要稱旨命師求雨救荒得效賜號佛眼而師嗜靜隱於此山師法軀短小每登座說法必假重墄學者竊掩口胡盧師因命工鑿後山成像約高丈餘且誓曰願後有身偉不減此師既遷化距宋景定四年歲癸亥十一月錢塘孫某婦李氏夢一僧持燈籠寄宿自云慧開道人翌日遂産男子異相非凡逮長身長九尺有奇出家受具是為中峰和尚於時咸識為無門祖師後身斯像徵也洞之右出則從護國左出則由玉泉左向則烏石峰右上則金鼓洞入從右脅則前繞澄潭入從左脅則高藏像殿下為禪室庭除庖湢寮舍而已古跡既廢湮沒無痕復于嘉靖甲申年有高行沙門曰圓果厥號香林京口人也離俗既久操方有年遊歷至杭長行分衛夜宿三門時在仙林律寺檀信見其苦寒製新衣衣之送齊作供絡繹蜂聚果師厭之略不少受遁至北高峰絶頂假一席之地縛草為團瓢止觀其中主僧見其不出營食時時閔而給焉如是斂足已逾六載冬忽大雪旬有四日地積丈餘主僧甚念是必僵死俄城中善信不期而會至者三十餘僧相慰苦寒出郭何事咸曰夜夢關公提刀立馬厲聲告曰北高峰古佛餓困雪中幾及半月何不裹糧救旃此無心道者飯之勝恆河沙百寶上施施佛也彼此相訝夢不少差衆既覔師設供師怡然禪坐殊無凍餒之色作唄受齊舉皆歡欣衆因勸師下山師曰諸君早去每日未晡羣虎來集繞菴哮吼若遲返駕是必驚恐由是相送下山不覺行過積慶值一長人長可丈許師意必非凡人縱步逐之愈趨愈疾俄至斯洞長人景滅問諸薪者報云烏有而諸豎但拾瓦礫纍於一礬石間師趺坐相對小憩良久石上恍然有光灼灼師撥去瓦礫頂相儼然爬搔砂土眉目盡顯諸童喜笑而去告揚城市現像所以城中男婦聚觀塞途禮像異師悉以衣裓手捧畚去其土須臾畢盡像因畢露師慨然喜曰將非緣在斯乎遂謀募構小殿蔽之并得斷碑復詳無門祖師像也是時杭有守備內相郭公設食濟饑以師道行延請為主是後兩山凡遇禪講咸以師篤實充為司庫四衆舉稱庫頭庫頭云師嘗見前峰松際披拂儼如黃絹不測幾長復作大雨階𥁞沒乃蟄其下遺坑一尋神臨尚在隔歲復歸清泉自出久之方止先是土人相傳為黃龍祠在昔禱雨靈應敕封靈濟侯護國神龍師得斷碑于斯有證夫龍之為物可巨可細可彌可密即令傾天倒地覆雨雲其性恆然凝寂三昧故云那伽常定無不定時果道人高行深修臥雪旬餘居山數載出則經新古剎處定動恆然之間在佛法季運利益衆生所度弟子若緇若素不下千計若今蓮池法主東暉禪師皆其參學弟子夫山川洞壑由道見尊道在人弘弘必有所霞山定上人者跡雖棲棲而本實解脫左司馬公雅與契悟亦一時道行懸絲未絶果道人之前豈無一人見豎隳興廢劫中遂泯然無考嗚呼文石感比世道行交廢如果道人者亦寥寥其人定上人能拾士大夫遺言集之紹繼前修廣幾斯文俟夫君子易檢討云馮夢禎詩序云辛丑九月十五日西湖放生事竣雨中從朱比部泰復太學景升游無門洞期而不至者為虞稽勳長孺俞徵君羡長分韻賦五言古詩余得金字薄雲引湖泛纖雨繼山尋所存在濟物觸事欣合簮吾生定有涯娛性賴丘岑遵塗始近隄歷疇帶豐林遂得化人居窈窕入谷深絶壁繡莓苔幽澗戛鳴琴崇像斷石幻神龍隨錫吟觀化卑語海撫往希布金且饑伊蒲塞聊以澄煩襟朱長春得瑟字朝搴芙蓉英暮采桂華實有期山中人從邁理孤策凉秋風云厲微雨既蕭瑟崇岡引載途陰溜啓絶壁雀鳴空林中鼠走長松末洞門岌以幽古石白如雪言有黃龍游往往興雲窟感此化人居願言投偃息神仙何當期年往如過隙無為飾人世蹙蹙使生迫之恆得玉字同流況慈航咨此生生祝縱鱗悉還淵放翼仍棲谷豈伊曠山行不遑懷水宿湖氣溢沆嶺霧垂霡霂良友倘不俱玄賞將焉告衝泥入溟烟乘興匪由速到門桑竹清捫洞翠微觸封雲起瑤島鑿氷屑寒玉飛壁像飄雲巋然瞻丈六突兀霄漢間敷澤想靈沃池舒寶勝光林奏迦陵曲感茲出世因何願不酬復朔饑長莫辭鳬悲短莫續不忍蹣跚羞甘受輪轉辱誓弘般若力共接西方躅虞淳熙得商字補詩我昔驂黃龍逍遙青琳房豁落太無門聊與金仙翔手持緑玉杖驅龍出西方三翼開明湖蒼茫烟水長放魚戲蓮葉波動芙蓉裳雨花散珠宮香水浮鴛鴦回首渺丹崖洞壑滋瑤芳同舟二三客別我鄧石梁遙問昔所遊巖扉杳茫茫飛霞流錦石常䕃白毫光寒松鳴秋絃空翠天風凉長嘯拂紫髯爽氣凌金商葉落聞清聲片片龍鱗黃呼我出岫雲歸來向空王閶闔尚可排石戶徒相望窈窕入無倪極目笑長桑吾當握驪珠回光照石牀龍臥三千春銜日上高蒼吳用光詩序云萬厯壬寅夏五余憩聖僧菴上人霞山為余道無門石像之奇余意佛眼中峰香林名為往來而實無往來者提燈寄宿案礫放光祗為游戲三昧耳上人於此承當不因為賦曰正法當秋晚津梁像教開化身留石壁瑞氣繞香臺象罔從誰覔玄珠不用媒無門千古意徙倚白雲隈雙桐菴在紫雲山棲霞嶺側新安許太史買山構庵額曰雙桐竹徑迤𨓦岩幽寂可坐僧性慈焚修于茲如曉游雙桐菴訪了元師詩云挂鉢雙桐下巉崖屋半間庭陰留夜月階色亂春山世念隨雲薄禪心共鳥閒相過話岑寂不厭啓柴關淨性寺宋乾德五年吳越王建名淨心院大中祥符改今額元末燬國初重建傍有青衣橋淨業堂在秦亭山為淨性下院僧圓禮築室數楹饒竹函峰阮公過題云君多直節出塵俗日與高僧相往回雲集鳳毛清大夏春蟠龍角奮輕雷遂名萬竹淨業堂孫克弘書額曰香光莊嚴碧漪蓮社在秦亭山下孫克弘書黃汝亨題曰旃檀窟普慈院在秦亭山嘉靖初建僧廣莫棲寂于此莫號仁安多著述晚年參雲棲師皈心淨土嘗有頌云肘後神符殺百妖室中無復用吹毛太平天子頒新令不許門前更釘桃刺十指血書華嚴一部法華二十部覔地豎窆深臥其中董太史其昌為題石曰安法師墓玉泉寺舊名淨空院南齊建元中僧曇超說法于此龍王來聽為之撫掌出泉遂建龍王祠晉天福三年始建淨空院于泉左宋理宗書玉泉淨空院額以榜之祠前有池畝許清徹可鑑蓄五色魚數十頭遊泳如畫其前溉田千頃近者曰鮑家田吳越相鮑慶臣采地也宣德間置白紙局就池造紙淆濁久之局廢而泉復冽矣旁一小池水翠緑雖以白粉投之亦成緑色萬厯間錢塘令聶心湯重建有晴空細雨扁方伯竇公供書本藏經於方丈命住持僧性科等守之其藏經每本首葉有識云三吳大知識捐資刻經徑山有送余者嘆非家物流照衆生藏山于山藏佛於佛玉泉古寺百千年幾廢興而名不改佛力哉將山河大地非待盡者有乎月高欲殿蓬杳擬宮飛來飛去意將何窮玉人呈相自西徂東生返樂土佛緣是空萬厯辛亥秋合肥竇子稱識又匾曰神龍撫掌處旁有題云初游玉泉寺雨氣在天登樓觀魚疑若出聽余以為樂方伯則曰此四族中苦海乎已臨小池細沸生花顧問僧不知所對歸而求之乃神龍撫掌處也是日驚蟄心愈勃勃然動悲夫山來雲外臺豈世中一點浮漚窮盡瀛浡方伯為誰桐城吳體中同年友也竇子稱題王在晉碑錢塘山谷湖濆氷泉流涌穴竇可通破竹可引其勝最者為虎跑龍井沁骨澄心清堪飲啜然多自上下下明溜響滴水精融液凡山皆然吾聞蛟龍之所潛水深洞黑玄冥莫窮底裏杭之有玉泉介青芝塢石板巷九里松之間清冷湛徹方塘一鑑照人眉目魴鯉文鱗浮沉出沒悠然自適有客投餌魚即受餌汲水不驚觸人不避夏不知暑寒不知水魚之與水忘也見者亦忘其為魚與水也寺以泉名轉折而為方丈則甃石為平橋小澗噴珠飛沫滴如荷露灑如玉屑無雲而雨無雨而點點生於水靣苔藻相染水入深藍與青旻一色往自南齊建元靈悟大師曇超卓庵講經有老人于庵前撫掌泉自湧出泉名撫掌又曰細雨其來則自下上上滿而靡見其溢淆之莫能使淆神龍變化覆雨雲于鼓掌平地可成陸海巨浸可變桑田又安見夫大千世界自為升沉而乾暵水澤不聽命于神物之呼吸耶點蒼溪上大雨野中烈日蔣山龐眉直令一沼沸出西域止存其七山龍玄妙點化種種見奇其在本山則浙都之秀異獨鍾淨空名院創于五代宋理宗皇帝御書玉泉淨空錫額寺重葺于咸淳間元末燬而本朝宣德重興歷年二百所矣萬厯二十八年為織造內監孫公整其頽圮而住僧性科募金鳩工法宮梵宇益增而勝焉蠡水盂瀾洸洋淵漠若金波玉海毗盧遮那如來所都實報無障礙土溟涬誕宕罔測邊涯大根薩埵優游其處而與玄夷蒼水使者同宮左右顧而瞻忠魂義魄于橫塘望紫岫晴嵐于三竺鍾靈會景氣色神王池魚可化為龍霖雨澤物西湖滴瀝祗以供其一吸興歇變遷安往而不入龐眉老人之掌上也則豫又安知千百斯年青芝石板巍然隤然若至今存否也請以問之龍神曰有子之言不二余乃為記勒石志之白樂天詩湛湛玉泉色悠悠浮雲身閒心對定水清淨兩無塵手把青笻杖頭戴白綸巾興盡下山去我知是何人吳廉靜過鮑家田詩搖斾家家酒扶犂處處村草深迷井口槿密擁籬根緑水明秧本青山失曉痕多應忌蠶事畏客掩柴門僧濟顛詩千章老木冷涵秋今日重來話舊游一池寒水凝虛碧照出當年五百流中有神龍隱頭角為雨為霖蘇旱涸聖主𡸁衣風雨調龍亦安然在丘壑王世貞詩寺古碑殘不記年清池媚景且留連金鱗慣愛初斜日玉乳長涵太古天投餌聚時霞作片避人深處月初弦還將吾樂同魚樂三復莊生濠上篇喬時敏晴雨軒詩有序靈苑山之陽有泉涌焉其規可二丈許雖風日鮮美時恆似微雨滴瀝狀則細雨所由名也豫惜其名不雅馴易為晴雨顏其泉上小齊而系以詩湖光萬頃浮春空湖上老龍卑故宮謝遣雷師別雲吏跳身獨入潢池中戢鱗藏珠等尺蝘池水不波疑鏡融每當旭日正澄霽波紋衍漾如飛𩆬耳邊曾未聞淅淅眼底輒復看濛濛信知此龍用不窮有為自妙無為功大能山海小盆沼變化良與真宰通卷舒潛見亦偶爾詎肯屑屑私天工我行泉閒習龍意為傳此語開羣蒙飽聞九土困焦灼終擬膚寸酬玄穹靈峯寺闢於晉太康中伏虎禪師所創一名鷲峰院新志稱吳越王時建非也俗傳為裴休墓院亦非也萬厯初僧散寺敗僅存殿宇邑人左布政陳善延僧通慧居之寺舊有眠雲堂今廢翠微閣洗鉢池妙高臺臺已廢址或云在背山之頂或云即右偏山椒今法禪居是也嘉靖末年有邑諸生張少嶽萬言者隱于寺中四十年不入城市為詩文有幽致通政周詩相與倡和為築聽泉亭於寺側居之詩有記今在亭中山人往而泉石轉屬他姓荒僻岑寂游人罕至天陰月黑時聞倀嘯寒泉噴薄尚無恙云蘇軾妙高臺詩靈峰山上寶他寺白髮東坡又到來前世德雲今我是依稀猶記妙高臺許應元靈峰寺詩空門傳不二令節届重陽看取蓮花淨無煩菊蕊芳沙虗喧候鴈露冷咽寒螿幽賞豈終已請看山月光周詩早春入靈峰詩杪秋經月杜門幽獻歲方為鷲嶺遊梅蕚已看迎臘吐澗泉猶自帶水流雲蘿行樂風塵隔江海初衣歲月遒聞道山人思削跡尚嫌城市邇丹丘周詩聽泉亭記杭郡西湖諸山以二高峰為望北高峰蜿蜒東行鬱起巖巒靈峰為奇峰左右泉源胥委禪林之南雨成瀑而晴如珠聽泉石為勝少嶽山人栖跡靈峰披荊𣗥開蒙翳始得茲泉已又汰沙礫决汙滓而得茲所謂聽泉石者蓋舊物也石厚盈尺方廣幾丈乃舉之層崖之下而置之懸流之上為命今名云山人於石西偏構草閣一楹日吟哦其中未幾余以病告來歸於山人月率三四過過率登石箕踞竟日忘去則謂山人曰峰以泉勝泉以石勝茲石之上可琴可奕可樽可茗可憑可眺可吟可嘯顧不當亭耶山人韙余言方是時郡中人士雅有丘壑之尚者多從山人遊石上聞余言則爭捐資為山人命材鳩工之助甫浹旬亭遂告成諸君子則又載酒賦詩落之而請余記其事余惟山川靈祕在在而有其彰顯也必係之人靈峰之有泉石其來舊矣顧自勝國以前無從考者逮入國朝茲峰彰彰郡人耳目而泉石之勝尚湮滅無聞乃垂二百年得山人發之山人之栖是峰也又垂三十年然後亭之則豈偶然之故耶顧曩未亭也宜亭而輒虗逮其既亭無論士類即山樵野衲咸相視色喜以為若天造地設不可無此亭者夫往者與山人遊凡幾曾未有及茲舉者乃余發之諸君子適樂成之則又豈偶然之故耶山人於世味殊淡而於世故一切不營乃茲亭之構則經營區畫靡所遺慮諸君子者不競心於紛華綺靡之區而獨於枯槁寂寞之地用情若此其雅致高韻胥足尚矣繼自今酒食徵逐之流城市腥豔之論其尚毋辱茲亭哉少嶽山人張姓萬言名記之者則與鹿周生詩也普福講寺在九里松一名十方天台教院宋咸淳間天台僧明礪募貴戚鮑氏建凡八年始成穹殿傑閣諸剎罕倫飯僧至三千人易之巽為記有魏國公大普福扁趙子昂芝雲堂額國初猶盛今寥落將滅矣寺有十景芝雲臺緑雪坡藥澗橋思憶觀音葛翁泉辟支塔錫杖山瑞岡塢玉蓮池仙芝泉鄧文原寄住持無公詩淨土談玄屢欵扉平生我亦悟毗尼天台道在毗陵記廬阜神交惠遠師度嶺白雲飛錫處散花清晝說經時西南峰下龍泓路曾記山房舊賦詩圓覺天台教寺自唐開山為修證了義法師塔院宋南渡後重建高宗書天中萬壽圓覺寺額以賜時有僧守璋能詩所著有柿園集高宗嘗書其晚春一絶云草深烟景重林茂夕陽微不雨花猶落無風絮自飛復親書圓覺經及製二詩賜之詩云古寺春山青更妍長松修竹翠含烟汲泉擬欲增茶興暫就僧房借榻眠久坐方知春晝長靜中心地自清凉人言圓覺何曾覺但見塵勞盡日忙寺有歸雲堂三昧正閣清凉覺地皆理宗御書元至正燬宋吳寶鏌詩梵室飄香隔竹聞壁間舊賜寶奎文山深翠輦經行處猶臥從龍數片雲黑觀音堂在集慶寺東俗傳弘治間太監張慶遊山至此見青衣女子衝過匿入此菴索之不得見座中黑漆觀音禮拜而去香火遂盛此矇瞶之說也觀音豈真女子哉白玉蟾觀音像贊云柳絮多頭緒桃花好皮夫是之謂誰東海比丘尼又云頂戴彌陀呈醜拙手持楊柳惹塵埃縱饒人得三摩地當甚街頭破草鞋亦游戲語集慶講寺宋理宗淳祐十二年貴妃閻氏建為功德院閻氏鄞縣人明艷絶倫後宮為之奪寵寺額皆御書巧麗冠于諸剎經始之辰內司分市材木于郡縣旁緣為奸望青採斫鞭笞追逮雞犬不寧雖勳臣舊輔墓皆不得自保或作詩諷之曰合抱長材臥壑深于今惟恨不空林誰知廣廈千斤斧斫盡人間孝子心其後恩數漸隆雖御前五山亦所不逮一日忽于法堂鼓上得大字一聯云淨慈靈隱三天竺不及閻妃好面皮於是行天下緝捕其人終不得有三池九井月桂亭金波池善法堂並廢猶存理宗御容一幅燕遊圖一輻後改額顯慈集慶講寺列天台講院第一剎正統間廢嘉靖年中貴鄧文鎮召僧焚修至今仇仁近詩半生三宿此招提眼底交游更有誰顧愷漫留金粟影杜陵忍賦玉華詩旋烹紫笋猶含籜自摘青茶未展旗聽徹洞簫清不寐月明正照古松枝靈隱禪寺晉咸和元年僧慧理建山門扁曰絶勝覺場相傳葛洪書或云宋之問書寺有石塔四皆吳越王建宋景德四年改景德靈隱禪寺元至大元年僧慈照重修覺皇殿至正間燬國初重建改靈隱寺宣德間僧曇纘建三門面壁軒良玠建佛殿殿中有拜石長丈餘有花卉鱗甲之文工巧如畫正統間玹理建直指堂堂扁張即之書舊有百尺彌勒閣蓮峰堂千佛殿延賓水閣望海閣巢雲亭見山亭白雲菴松源菴及宋理宗御書覺王寶殿妙莊嚴域並廢隆慶己巳罹祝融煨廢殆盡萬厯壬午寺僧德明圓輔圓寧延法師易菴通公主席太宰張瀚為之護法倡緣建殿宇廊廡凡百楹塑諸佛聖像鑄鐘豎鐘樓重建慧理永安普同等塔悉就辛亥僧性證重建禪堂方丈回龍橋方伯浮渡吳公復捐俸百餘金建橋亭題曰覺路津梁上供準提佛題曰密因閣又為復閣曲軒以對溪流扁枕石漱流及雲松巢額壬子延介如石公講楞嚴義海於寺尋葺方等懺堂集三學精通禪者修方等懺法寺門原有五亭今止存冷泉由冷泉亭而上為翠微亭韓蘄王布袍跨驢日夕行游其中口不言兵今尚有故址宋之問遊靈隱寺詩鷲嶺鬱岧嶤龍宮鎖寂寥樓觀滄海日門對浙江潮桂子月中落天香雲外飄捫蘿登塔遠刳木取泉遙霜薄花更發氷輕葉互凋夙齡尚遐異搜對滌煩囂待入天台路看余度石橋張祐飛來峰詩西南山最勝一境是諸天上路穿巖竹分流入寺泉躡雲丹井畔望月石橋邊洞壑江聲遠樓臺海氣連塔明春嶺雪鐘散暮松烟何處去猶恨更看峰頂蓮白居易題冷泉寄唐林夫詩靈隱前天竺後兩澗春淙一靈鷲不知水從何處來跳波赴壑如奔雷無情有意兩莫測背向冷泉亭下相縈回我在錢塘百六日山中暫來不暖席君今欲依靈隱居葛衣草履隨僧蔬肯與冷泉作主一百日不用二十四考書中書賈島靈隱寺詩峰前峰後寺新秋絶頂高窗見沃州人在定中聞蟋蟀鶴于棲處挂獼猴山鐘夜渡空江水汀月寒生古石樓心欲懸帆身未遂謝公此地昔曾遊蘇子瞻遊靈隱寺詩君不見錢塘湖錢王壯觀今已無屋堆黃金斗量珠運盡不勞折簡呼四方宦遊散其孥宮闕留與閒人娛盛衰哀樂兩須臾何用多憂心鬱紆溪山處處皆可廬最愛靈隱飛來孤喬松百丈蒼髯鬚擾擾下笑柳與蒲高堂會食羅千夫撞鐘擊鼓喧朝晡凝香方丈眠𣰽毺絶勝絮被縫海圖清風徐來驚睡餘遂超羲皇傲几蘧歸時棲鴉正畢逋孤烟落日不可摹林逋同運使陳學士遊靈隱寺詩山壑氣相合旦暮生秋陰松門韻虛籟錚若鳴瑤琴舉目羣狀動傾耳百慮沉按部既優游時此振衣襟泓澄冷泉色瀉我清曠心飄颻白猿聲答我雅正吟經臺復丹井捫蘿嘗遍臨鶴蓋青霞映玉趾蒼苔侵溫顏煦槁木真性訝幽禽所以仁惠政及物一一深灑翰嶙峋壁返駕旃檀林回睨窣堵峰天半千萬尋陸務觀冷泉放閘詩泉聲飛出閘逶𨓦緑雲間此地原無暑多時不入山草欹疑石墜水定見魚還誰得同龜鶴遊吟半日閒僧契嵩冷泉獨賞寄冲晦詩南風掠波溪水滿山中遊人來洗浣獨立溪傍清興款更愛泉流芳草短平生幽計貴蕭散世道紛紜何足算人間五月夏雲煩相約歸來君莫緩張商英見山亭詩簾捲疏烟醉眼開浮雲飛盡見崔嵬苦嗟霖雨遮藏久深謝清風引致來丹桂有時明月滿舊山無路白猿哀禪師指我真空理心火茫茫一夜灰王守仁遊靈隱寺詩靈鷲高林暑氣清竺天石壁雨痕晴客來湖上逢雲起僧住峰頭話月明世路久知難直道此身那得尚虛名移家早定孤山計種果誅茆却易成張瀚遊飛來峰詩長松十里晝陰重引入飛來第一峰洞裏紫霞明日月天邊青靄插芙蓉小橋不斷橫溪路古寺先聞隔樹鐘戀賞頓忘城市遠歸途幾處暮雲封夏言遊靈隱和楊邃老詩捫蘿詰曲歷崔嵬玉削芙蓉回開白日老僧初出定仲春有客到山來林深秪樹雲霞繞地逈諸天日月回世上宰官元是佛洞門猿鶴莫驚猜補樂天詩在郡六十日入山十二回宿因月桂落醉為海榴開黃紙除書到青宮詔命催僧徒多悵望賔從亦徘徊寺暗烟埋竹林香雨落梅別橋憐白石辭洞戀青苔漸出松間路猶飛馬上杯誰教冷泉水送我下山來李攀龍詩武林臺殿敞諸天建自咸和第幾年才到上方雙澗合飛來何處一峰懸梵音動雜江潮轉燈影常含海日傳所以龍宮稱絶勝驪珠交映使君前喬時敏邀蕭太史玄圃游靈隱期盡韜光諸勝雨阻有賦禪林遙上翠微重檻外蒼茫遠寺鐘雨色飛來雙鸑鷟雲光忽落秀芙蓉人如白雪吟偏壯座有青山濘未通自到龍門曾作賦肯教仙吏不相從石佛菴在靈鷲山直指堂後梁簡文帝所造迦葉維衛石佛二尊萬厯間僧如𦝚持準提呪夢披荒莽中見石佛像身如芒刺募資建庵庵後建準提閣前後皆竹湯煥書竹林精舍覺遲居士沈疏石佛從名山湧出千載勝緣準提須寶閣莊成一時善現良以衆生業重每苔斑蘚剝埋金剛不壞之身而佛母行深正鳥語花飛破鐵桶無明之相咒心性印多臂相嚴獨對山前朗朗不起于坐手援天下事事了自當身無垢無淨而總持密因不二乘時乘人而建立勝果必圓況乎鷲嶺香飄下臨無地獅林風遠直指餘堂驚回淡士前生從此中來此中覿露喚醒伽藍幽夢應如是住如是布施三千界印證爾時十八咒傳持茲土篝燈夜讀茂才數月之緣著屐朝來居士片言之諾凡此有感有應有建立總之非因非緣非自然為是樂阿蘭那奉勸檀波羅密殿黑業造白業皈依無量光中辦信心印佛心供養窮未來際謹疏𦝚以石佛未了因緣徵辭于靈山乞士復傳意于聖水矜人吳之鯨而為之偈曰馬祖壁坐九年即成道石佛背壁坐百年未成庵云何未成庵是庵非道故道成五葉蘆庵成五株策若人金作土會見土成庵尋亦菴成道普願世間人共成石佛願庵成剎那頃石佛依然坐陳繼儒偈曰石佛出世準提又來若人彈指樓閣頃開效尼上人夢石佛得石佛今復欲建準提閣於庵後題偈倡之西湖長豫章樊良樞疏效尼上人夢佛得佛淡游居士求子得子實相耶幻泡耶金剛經云不可見三十二相見如來凡所有相即是非相若見相非相即見如來上人建準提閣於庵後是謂信心清淨即生實相矣吳朗士陳眉公發三菩提心成是無量福德余不能以七寶大施喜其成而讚之上人但信是心不取于相如是不動荷擔如來如是莊嚴佛土布滿黃金將八百四千萬億衆生共來頂禮咸瞻實相上人為說準提神咒一遍散諸華香雨諸天花此閣成窣地光明藏矣𡵺嶁山房郡人李居士因寺寮為棲隱處即墓其上遺誡并祭田俱歸寺僧供祀事子孫不得干預萬厯間僧鬻田且欲售屋矣司理丁公啓濬斷歸寺判詞古典可誦第歲久荒圮辛亥方伯吳公劄令祗樹僧清茂焚修其中茂捐資百餘金重葺韜光庵韜光禪師建師蜀人當唐代宗時辭師出遊師囑之曰遇天可前逢巢即止師遊靈隱山巢溝塢值白樂天守郡悟曰此吾師命我也遂卓錫焉樂天聞之遂與為友題其堂曰法安嘗以詩招之云白屋炊香飯葷羶不入家濾泉澄葛粉洗手摘藤花青芥除黃葉紅薑帶紫芽命師相伴食齊罷一甌茶韜光不赴報之詩云山僧野性好林泉每向巖阿倚石眠不解栽松陪玉勒惟能引水種金蓮白雲乍可來青嶂明月難教下碧天城市不能飛錫去恐妨鶯囀翠樓前內有金蓮池烹茗井壁間有趙閲道蘇子瞻題名永福禪院在天聖寺側與呼猿洞相對晉有上下永福寺創自慧理法師前蓮花峰後形勝山左香林亭右幽雅軒中有雨華亭金砂池諸勝空谷禪師詩云聲名纍動帝王家曾挽春風上海槎永福門開最勝處江山一望不為厯代久廢國初高僧宗詎建大雄寶殿尋燬萬厯癸卯苕溪龍翰捐資買永福故地延講師耶溪若公修持其中若復建佛閣三楹禪堂香積十餘楹方伯吳公扁曰古永福禪院給帖永護無著禪師塔舊有無垢院因韓𠈁胄取以為壽地故遷院於靈石山下止存此塔後楊郡王復取為壽地遂起此塔乃陶龕也禪師容色如初髮垂至肩指爪繞身舍利無數留三日猶不壞竟荼毗之僧肇淮海有詩云一定空山五百年不須惆悵啓頽甎路邊多少麒麟冢過眼無人贈紙錢鄴公庵杭守祖無擇愛此山之勝結庵於此以公所封名之自詠云松下門開入翠微草香花氣襲春衣山中深僻無人到自有閒雲共鶴飛形勝山前感物華却乘清興過僧家樓臺消廢無人問今古傳聞只自嗟雲擁斷崖埋石笋泉冲凉雨落金沙憑君識得尋幽趣只管高談至日斜白衲庵在靈隱西塢僧明殊過白衲詩衲僧深隱處麋鹿自成羣曲徑依山轉鳴禽隔竹聞澗飛晴日雨嵐散霽時雲坐久不知去長歌逗夕曛大桐庵在大桐塢萬厯間僧徹堂重建薦福寺晉咸和中建于下天竺基宋紹興間遷于此為徽宗吳太后葬所高宗書額太后手書金剛經置塔中有宜對亭通雲亭天池樓雙珠亭萬玉軒湖山至此幽邃極矣元至正末燬國初重建復燬墓前有二石馬琢刻如生舊傳夜輒馳驟鞦轡光瑩如玉張伯雨天池樓詩天池一樓小如架擎出半天天雨華山圍大石獅子座寺屬三朝母后家時呼白猿聽奇句亦許飛仙餐紫霞我來把斷朗風口只留牀角置袈裟下天竺寺坐靈鷲山麓亦晉僧慧理建隋開皇十五年有僧真觀者錢塘人操行高潔掌有仙文與禪師道安頭陀石室檀越陳仲寶拓而修之號南天竺寺五代時號五百羅漢院宋大中祥符初改靈山寺天禧四年復改天竺寺天聖中僧遵式重修有薝蔔堂慶元三年改天竺靈隱寺三竺之勝周回數十里而巖壑尤美者回聚茲區自飛來峰轉至寺後巖洞玲瓏瑩清朗如伏虬飛鳳層花絫蕚皺縠疊浪妍態怪狀不可縷陳其材木皆自巖骨擢起蒼翠蔥鬱不土而茂傳言茲山産玉故腴潤育物如此舊有御書閣藏仁宗中興五朝御書七寶普賢閣僧善照以七寶塑普賢像張仲舉遊寺詩石梁濺水濕蒼苔陰洞傍穿澗底回殿閣金銀從地湧山林圖畫自天開龍隨僧到分雲住猿認人呼下樹來遊興未闌斜日盡馬頭呼酒尚徘徊白樂天題香林洞詩西湖之西天竺深天香滿風多桂林老猿引子下高樹流水與雲來遠岑上方已變劫灰黑古洞長帶秋嵐陰清輝娛人且歸去後夜月明重來尋白廷玉詩山轉龍泓一徑深嵐烟吹潤撲衣巾松蘿掩映似無路猿鳥往來如有人講石尚存天寶字御梅嘗識建炎春城中遮日空西望自與長安隔兩塵唐圓澤和尚居慧林與洛京守李源為友約往蜀峨嵋禮普賢大士師欲行斜谷道源欲泝峽師不可源強之乃行舟次南浦見婦人錦襠負罌汲水師見而泣曰吾始不欲行此道者為是也彼孕我已三年今見之不可逃矣三日浴兒時願公臨門我以一笑為信十二年後錢塘天竺寺外當與公相見言訖而化婦既乳兒源往視之果笑尋即回舟如期至天竺當中秋月下聞葛洪井畔有牧兒扣角而歌曰三生石上舊精魂賞月吟風不用論慚愧情人遠相訪此身雖異性常存源知是師乃趨前曰澤公健否兒曰李公真信士也我與君殊途切勿相近唯以勤修勉之又歌曰身前身後事茫茫欲話因緣恐斷腸吳越江山尋已遍𨚫回烟棹上瞿塘遂去莫知所之贊曰京洛有約峩嵋是行機先一語洞達三生汲罌事異扣角詩清永懷陳迹山空月明三生庵在三生石側方伯吳公捐資贖地屬戒僧廣昆守之錢塘令楊萬里助資建庵姚鉉題翻經臺詩康樂悟玄機端坐此中息經翻貝葉文臺近蓮花石江元禧登謝康樂翻經臺詩竺國來靈詮震旦弘教典貝梵傳方言辭隱義莫辨隔以懸解通昧為慧心顯尋究理事融研對文字善澄慮憩靜區屏迹就曾峴蓮蕚玩烟霏虬姿娛仰俯今古晨昏遷何澤竟獨衍撫茲停白雲終然峙蒼蘚道勝據必超婘深樹無剪凌遡欽緬蹤容貌儼在眼人自永玄情豈伊石難轉中天竺寺在稽留峰北隋開皇十七年僧寶掌以唐高宗顯慶二年住浦江化去自稱度世一千七十二年故茲山中尚有千歲巖吳越王改崇壽院政和四年改曰天寧萬壽永祚禪寺南渡初有摩利支天菩薩像淳熙間建華嚴閣元天厯間有僧大欣得幸于文宗改天厯永祚禪寺洪武初賜號中天竺寺山門三字為魏國公署額正德間燬嘉靖二十五年僧惠鏞清琦清琳等募建殿剎聖像并建白衣觀音堂千歲寶掌詩偶居天竺經年久惟有山靈稱野情皓月徘徊庵內燭青山圍繞枕邊屏又云戶外白猿時獻果階前桂子落紛紛他年吾道重興日枯木生花別是春白樂天詩雜芳澗草合繁緑巖樹新山深景候晚四月有餘春竹寺過微雨石徑無纖塵白衣一居士方袍四道人境是佛國土人非俗交親城中山內客來往亦殷勤參寥子詩夕陽山氣靄蔥蔥路轉松陰覆幾重行過石橋人未見數聲先聽寺樓鐘稽留峰北好林泉珍重幽棲得所便柏子香中能宴坐想無餘習可攀緣霜壓簾櫳雪泫條銀河初轉斗垂杓清言共失三更夢錯恨芙蓉漏易消王元章送僧歸天竺詩天香閣上風如水千歲巖前雲似苔明月不期穿樹出老夫曾此聽猿來相逢五載無書寄却憶三生有夢回鄉曲故人頻問信孤山梅樹幾番開永清塢之背即為龍井正德中陳氏建庵塢中名永清庵心庵正德間寶珠禪師建有白雲巖玉液泉上天竺寺晉天福間僧道翊結庵山中一夕見瑞光發于前澗就視之得奇木刻畫觀音大士像後漢乾祐間有僧從勳自洛陽持古佛舍利來置頂中妙相咸備晝放白光士民崇信吳越主嘗夢白衣人求葺其居寤而有感遂建天竺觀音看經院宋咸平中浙西久旱郡守張去華率僚屬具幡蓋鼓吹迎觀音而禱霪雨濡足自是有禱輒應蘇子瞻雨中遊觀音院詩云蠶欲老兮麥欲黃山前山後雨浪浪農夫輒來女停筐白衣仙人坐高堂蓋有望于祈晴也南渡時捨施珍寶有日月珠鬼谷珠猫睛等雖大內亦以為罕見嘉祐中沈通治郡謂觀音以聲音宣佛力非禪那所居乃以教易禪命僧辨才元淨主之鑿山築室幾至萬礎治平中郡守蔡襄奏賜靈感觀音殿額元淨乃益鑿前山闢地二十有五尋殿加重簷建炎四年烏珠入臨安高宗遜于海烏珠謁天竺問知觀音本始乃舉之輿中與大藏經併徙而北時有比丘智完者率其徒以從至燕舍于都城之西南五里曰玉河鄉建寺以奉天竺之僧乃重以他木刻肖前像詭曰藏之井中而出之至今稱觀音出現井其實非故物也乾道三年建十六觀堂七年改院為寺門扁皆御書慶元三年改天台教寺元末燬國初重建纍朝代有宣賜金帛及寶幡之屬正德時聖母張進古銅塔一座滲金觀音像並供後殿錢塘戴文進畫羅漢一十八軸萬厯癸丑冬東宮進滲金大士一尊并金犼金念珠一串現存大悲閣大學士商輅鐘樓碑記學士黃縉觀音殿碑記寺有白雲峯乳竇峯中印峯獅子峯雙檜峯白雲堂兩峯堂中印堂雲漢閣應真閣延桂閣秋香閣伴雲閣雙桂軒清華軒靜處齊植杖亭謝屐亭夢泉亭流虹澗金佛橋琮老橋凝翠泉觀音泉水月池西方殿有撤骨池以鎮火灾雲液池池上有辨才手植山茶花並廢唯白雲堂尚存宋孝宗觀音像贊猗歟大士本自圓通示言有說為世之宗明環無二等觀以熙隨感即應妙不可思理宗觀音像贊神道至妙兮隱顯莫測功德無邊兮感應甚速時和歲豐兮祐我生民兵寢刑措兮康此王國李太白與從姪良游天竺寺詩挂席凌蓬丘觀濤憩樟樓三山動逸興五馬同遨遊天竺森在眼松風颯驚秋覽雲測變化弄水窮清幽疊嶂隔遙響當軒寫歸流轉成傲雲月佳趣滿吳洲白樂天詩一山門作兩山門兩寺原從一寺分東澗水流西澗水南峯雲接北峯雲前臺花發後臺見上界鐘清下界聞遙想吾師行道處天香桂子落紛紛李綱由上竺赴洞霄宮詩山谷投閒日乾坤版蕩時秦庭徒痛哭漆室竟誰知欲仗空王力潛開聖主疑奸雄俱掃盡談笑定華夷嶽飛過上竺寺偶題強胡犯京闕駐驆大江南二帝雙魂杳孤臣百戰酣兵威空朔漠法力仗瞿曇恢復山河日捐軀分亦甘朱熹春日過上竺詩竺國古招提飛甍碧瓦齊林深忘日午山迥覺天低琪樹殊方色珍禽別樣啼沙門有文暢啜茗漫留題張栻詩上竺諸天近中林萬木低迥超塵世外恍入雪山西忽漫參龍象行將混鹿麛何年釋簮𥿈于此獨幽棲真德秀詩世事不可了還須是入山遙尋黃葉路迥出白雲間瀹茗止煩渴談空得笑閒飄飄有餘興歸去掩柴關魏了翁詩風波滿平地世路繞羊腸急欲逃塵網遙登選佛場雲深午猶暝竹密夏生凉興逸忘歸去高眠借石牀東坡蘇軾聞辨才再住天竺詩道人出山去山色如死灰白雲不解笑青松有餘哀忽聞道人歸鳥語山容開神光出寶髻法雨洗浮埃寄聲問道人借禪以為詼何所聞而去何所見而回道人笑不答此意安在哉昔年本不住今者亦無來此語竟非是且食白楊梅倪雲林秋夜宿上竺詩禪月湛高秋金天夜色幽珠林星彩動碧殿露華浮蓮漏忙催酒松濤怒撼樓清凉徹毛骨吾欲喚貂裘大士鴛鴦殿前楹僧道福如淵重建後殿僧平澗重修鐘鼓樓如淶如淵重修天王殿祖玉重修香山殿道福建圓通門道律建張仙祠德洪建伽藍殿道霑建普門圓徑建彌陀殿道霑建普同塔方志為首鼎建心安兩山居德霖建白雲峯山居海堅建上天竺三門圓逸重修武林外史邵常生撰上天竺寺靜庵讓法師擬號正定塔行述師禹杭人俗王姓十五出家上竺禮進公為師幼時性喜合掌人以天香童子目之既祝髮和平撙節既四十慨然以家事付徒如貴曰余世事畢矣因受戒雲棲寺寄名廣行持戒精切認真毫不肯苟平日傷末法陵夷每興善業必躬必倡慨寺風不振直諒必歸正持身其肫肫樹教之意可方遠録公其懇懇公廉之心無愧都僧正者萬厯辛亥七月二十五日示疾令具薰沐更衣見目下有紅光端趺西坐兩手高擎十指作掐數狀忽有醉僧來呌哭師不悅遂不瞑次早小子與訣見其身倚而掌合亦常視與合掌中間勞苦之者或強抑就枕稍知道者或勸逸吉祥時師幻身既展轉非已而靈臺能主宰惟示不豫色然既瞑而禪僧貫如來誠求其故曰師得無欲坐乎忽發聲曰諾衆始驚扶起坐既坐足蹜蹜而已僧又曰師得無欲趺乎顧而笑因與結始欣然首謝衆遂以彌陀為飯含梵唄當衆臨圍繞蹕踴達旦甲子正午而寂僧性田與沐頂暖如火年五十甫一法臘三十有五蓮池師聞之讓窑龕使瘞於是斂幎藏金避木韜釘蒲圌置褥白茅廢衾塗香末香既潔且勻塞蜆蘊之小大式均懷其幽隙苴其寬深幾不滅頂及肩而盈既不使其金鎖之杌亦不礙其爪髮之生凡此見山中之創見惟貫如之力存焉小子見山之僧欲借跏趺為重往往痛楚綢繆業緣局促雖夾輔以多方奈四大之傾仆蓋欲坐而不能師乃能坐而不欲可歎也亦可喜也向使師出世熏習之場則不必加年自有金臺寶池之兆向使寓身寒苦之地則清明在躬必有謝三緣見道之辭今雖止乎此又向使當彌留𭞤亂而奄忽於情見之中則與六十年小子見聞擾擾者何以異哉經所謂無諸痛苦一心不亂斯其人矣因請之蓮池師及世之有菩薩行者擬以正定名其塔焉是辛亥十月朔日小子時年七十有五書總校官庶吉士臣朱鈐校對官中書臣吳甸華謄録監生臣梁鳴岐詳校官太僕寺少卿臣李欽編修臣程嘉謨覆勘
