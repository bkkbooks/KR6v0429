body:
  text: 明吳之鯨撰城內梵剎按舊志三種俱以仙林寺為首今仍之依次分派一自南至候潮門一自北至鳳山門以便觀覽仙林慈恩普濟教寺在安國坊宋紹興三十二年洪濟大師智𡖖建賜額隆興元年孝宗改賜額曰隆興萬善戒壇淳祐三年理宗賜額曰飛天法輪寶藏又製鐘銘賜之銘曰大塊嚂噓震薄蓋輿眷此洪鐘以實出虛欒銑其角十分其鼓豈有鑄鼎收金遺禹博大闡繹厚薄和均上開天閫下徹地垠乃警聾聵乃割昏曉咨爾有聞孰不心皎以為有聲匪撞不鳴以為無聲如雷如霆作鎮梵宮法音無際鞏我神皋萬有千元至正間張士誠據為軍器局洪武四年重建置僧綱司有司即其鐘樓為郡城昏昕之節正德間徙其鐘更鑄置朝天門仁和縣歲造玉牛迎春於此天長淨心寺在仁和北壁後洋街晉天福四年錢氏建南渡後析其地為軍寨咸淳元年興復元季燬景泰間重建聶大年送僧日福聽講還山詩云歸去深居遠俗譁莫教巢燕污袈裟從今悟了三生話高倚瓊臺看雨花寺內有龍華寶閣宋理宗時捲簾使許禎建宋亡禎挈三子居之學佛自晦名出塵菴元延祐元年有僧講法華經天華紛降遂名龍華其時寶閣穹壯冠絶郡城歸併於此者曰清修院正定菴保福院九曲法濟院宋高宗幸天長賜僧廣寶詩云大界宜春賞禪門不掩關宸遊雙闕外僧引百花間車馬喧長路煙雲淨遠山觀空復觀俗皇鑑此中間壽聖寺在虎林山上舊名長壽在東青門外淳祐間僧無住光隱重建永樂十三年潮壞徙建今所即壽聖院故址遂名壽聖山上古朴一株為風雨所掣內有大井銀杏皆宋物也殘碑龍鳳御書之寶篆額尚存俗稱祖山寺虎林山在武林門內一里而近有小土阜高可三丈廣不滿百步宋太乙宮元大青蓮寺在其下宋為雜造局局廢山之陽舊有此長壽寺後易名今額吉祥律寺在仁和縣之安國坊宋乾德三年睦州刺史薛溫捨地為寺立今額治平二年改曰廣福南渡初以其地為文思院軍頭司其寺界于兩間仍扁以吉祥之額舊傳其地多牡丹熙寧間名人巨公常賞之寺有觀空閣蔡端明吉祥寺賞牡丹對月詩花未全開月未圓看花賦月思依然明知花月無情物若使多情更可憐蘇東坡詩銘跋八首賞花人老簮花不自羞花應羞上老人頭醉扶歸路人爭笑十里珠簾半上鈎花將落而述古期不至今歲東風巧剪裁含情只待使君來對花無語花應恨直恐明年便不開述古期明日同至因用前韻仙衣不用剪刀裁國色初酣卯酒來太守問花花有語為君零落為君開惜花吉祥寺中錦千堆前年賞花真盛哉道人勸我清明來腰鼓百面如春雷打徹涼州花自開沙河塘上插花回醉倒不覺吳兒咍豈知如今雙𩬆摧城西古寺沒蒿萊有僧閉門手自栽千枝萬葉巧剪裁就中一叢何所似瑪瑙盤盛金縷杯而我食菜方清齋對花不飲花應猜夜來雨雹如李梅紅殘緑暗吁可哀自跋云錢塘吉祥寺花為第一壬子清明賞會最盛金盤綵籃以獻于座者五十三人夜歸沙河塘上觀者如山爾後無復繼也今年諸家園圃花亦極盛而龍興僧房一叢亦奇但衰病牢落自無以發興耳昨日雨雹如此花之存者有幾可為嘆惜也冬至遊寺詩井底微陽回未回蕭蕭寒雨濕枯荄何人更似蘇夫子不是花時肯獨來後十餘日復至東君意淺著寒梅千朵深紅未暇裁安得道人殷七七不論時節遣花開觀空閣銘過眼榮枯電與風久長那得似花紅上人宴坐觀空閣觀色觀空色即空大中祥符律寺在祥符橋畔梁大同二年邑人鮑侃捨宅為寺舊名發心唐貞觀中改衆善神龍初改中興宋真宗時改大中祥符其廣九里子院有千佛閣諸天閣戒壇院內有鐵塔一石塔四錢王所鑿九十九眼井實靈芝大智律師受經之地金人南寇燬于兵南渡初斥為軍器所元初仍建寺至正末燬洪武間重建其傍地盡為軍民之居蘇子瞻祥符寺上元觀燈詩紗籠擎燭迎門入銀葉燒香見客邀金鼎轉丹光吐夜寶珠穿蟻閙連宵波焰裏元相激魚舞湯中不畏焦明日酒醒空想像清吟半逐夢魂銷曾子固詩月明如晝露華濃錦帳明廊笑語同金地夜寒消美酒玉人春困倚東風紅雲燈火浮滄海碧水樓臺浸遠空白髮蹉跎歡意少強顏猶入少年叢可久師上元詩門前燈火鬬分明一室清風冷欲冰不把琉璃間照佛始知無盡本無燈長壽庵放生池記西湖古放生池也法久而敝實亡名存敝之久而安焉恆産乎水族併迷其名若罔聞者歲在乙未豫演圓覺于佛國山之南屏南屏故有池當其三門一時主會諸名公捐資贖而出之植蓮其中斷漁業人由是知放生池為武林舊事既而豫復鑿池上方既而北門有園園有池復贖之園距上方南北相望者半拘廬舍而城之內有二放生池矣頃豫碑上方謂以是為之兆兆且引而蔓延之顧豫德微年衰不足以風未知繼此而興起者更幾池也上方苦隘僅為池餘少叢竹羽蟲之獲逭其生者聊以依止茲頗間曠池聮比擴之則濊然成浸水涵而土山壘之則嶾然成山循而界之則幽然成徑相其宜而樹之竹木則鬱然蔭而成林將使嚶嚶洋洋樂而相忘雖無繇擬飛泳亭之萬一而猶冀想像其遺蹤則上方所不逮也園以東為興福禪院旋而南為養濟院又旋而西為得一道院養濟昔號悲田聖主賢臣哀煢民之顛連而無告者設也今之困矰餌伏質于刀砧必不可逃而待烹其無告尤甚貿而畜之池縱之林俾終保殘壽慈孰加焉佛示三福云慈心不殺而五福千箕疇亦壽為其最瀕殺而重壽之福孰加焉天地之大德曰生舜之德曰好生德一而已上清下寧侯王所以配兩間之久長貞萬物之壽命者恆於斯德孰加焉儒道釋三聖人之偉迹鼎峙夫三方若環拱然而園介乎其中是曲阜之仁里摩竭之慈室西華長生葆真之靈宅天合而冥鄰也豈偶然之故歟夫救生之滅也而有生求其生而未嘗生也而無生無生然後無不生則生滅一生滅一則福興于無相悲濟于無緣福不可得悲不可得一亦不可得唯法性常住不斷不續同于虛空彼梵網以放生為常住法常住者金剛身無量壽也乃菴其園曰長壽而園有荒廬數楹飭治之為供接引導師及當來慈氏尊像蓋津梁所放一切含靈先生安養息輪回苦後于龍華而得授記也廬止是無增多以淨戒僧守之守之之方具如上方記中語時里之父老聞豫言前執豫手歔然太息曰園之源吾弗知之矣吾猶及見二禪人居焉向稔其古為伽藍而業已蔬圃莫返厥初吾何圖重睹今日也是役也始其事者豫與化𡖖宋君而諸上善人樂助而成斯美利者例得書碑左云袾宏記青蓮寺在車橋北宋隆德間錢氏建祥符中改淨戒院先是宋元豐中吳處厚以皇嗣未立上書乞立程嬰公孫杵臼廟詔封嬰為成信侯杵臼為忠智侯廟食於絳後又以韓厥存趙孤三人皆以春秋祠于祚德廟紹興二十年建祚德廟于院內以春秋二仲祭之至正末張氏據聖壽青蓮二寺為府而廟亦廢崇福庵在平安坊石晉開運三年僧義宣教厚法師建宋元兵火因仍入國朝復興嘉靖間僧苦徭役乞庇于總戎萬鹿園稱萬氏宗祠幾為所據萬厯乙酉僧能惠等募贖鼎新殿剎宏偉緇侶雲集稱十方禪院馮夢禎沈楩虞淳熙為之記法輪寺在觀橋南五代長興中龜法師建於城東湯鎮額曰觀音後改安國宋大中祥符間改法輪洪武間立為叢林永樂十八年潮嚙殿基僧至恂改建今所棲禪雪洞院在平安坊吳越王建於艮山門外名觀音院建炎間改棲禪院至正十二年僧時俊作雪洞于今處移請舊額為棲禪雪洞院今併慧雲寺僧泐季潭詩洞雪團團白飄來不自風恍疑雲母室如在水晶宮大暑愁冷深春未覺融不須燈照夜定起月朦朧祥止庵禪室虛生白居之最吉祥了經何待月上𩬆不知霜宿恐雲來借寒愁火有妨老禪棲息穩無復夢華陽興福寺在斜橋南宋紹興丁卯左丞薛昂以花藥圃施僧慧觀築菴名曰擇勝尋建佛剎請龍山廢興福院額表之國初定為叢林止止菴在羲同安谷坊萬厯三十年僧如玉重建廣壽慧雲禪寺在三撥營畔宋淳熙十四年張循王之孫鎡捨宅建寺紹熙元年賜額俗稱張家寺有留雲亭白蓮池元至正間燬洪武十七年僧文副重建永樂九年永忠宣德間廣睿弘治元年福海相繼重建萬厯間旁地侵為賽西湖辛亥復原額僧梵琦留雲亭詩云人家十萬繡成堆未抵南湖一假奇象輦不來春草緑小亭雲鎖紫珉碑僧德祥白蓮池詩云念念西池道路賒東池今已種蓮花他時若到西池上應念東池是故家吳用先重復慧雲寺建宣義張公祠碑慧雲者張宣義所捨南湖園宅紹熙間請于朝以為寺者也歲久漸湮狹少其額迤東稍稍入軍營而所為南湖俗稱白洋池者亦不知何時并入民居萬厯間復有豪依大璫踞其寺之半并沒其所失額于軍營者即具宮室安處其上為年且二十有餘余與右轄竇公力清故物盡反所侵併營房悉撤還寺俱復其租慧雲已光復矣已與孫司理喬仁和楊錢塘謀修飾佛宇首建張公祠以酬其宏深之願古今之捨宅為寺者多矣即右軍東山輩皆慧業文人卒不聞親勒文字建之金石慧雲獨有之模豐碑所手書預製發願疏出自血誠讀不能終篇淚下想見公之為人也史魏國與公同時稱公間居遠聲色薄滋味矻矻詩文自處不異臞布考之史乘殊非實録魏國蓋以是飾公焉夫公雄才大略風流文雅人也玉津討賊之舉公實沈幾製為文章靈心燦出筆彩縱橫絶無書生筆墨之氣蓋非矻矻以此道見者自奉極侈園池聲伎服玩之麗甲天下南湖園世所傳凌霄亭玉照堂諸勝在焉即其排比十有二月之燕遊各有次序而牡丹一會名伎且百數十人梅花之社一棹徑穿十里豈齷齪小生為假令歌舞濃而感慨生杯酌酣而逸興闌此亦稱英雄回首大力矣而考南湖捨寺之年顧即其經始之第二歲諸所賞心樂事之見于南園者乃更其假舍寓居于所捨之後是誠何心哉公之言曰光明藏中孰非遊戲若心常清淨離諸取著于有差別境而能入無差別智則坊酒肆遍歷道場鼓樂聲音皆談般若倘情遮物隔境逐源移如鳥黏黐動傷性命又烏知所為説法度人然則公之捨寺也寺與家等捨與不捨等身後之捨與生前之假寓等赤灑白淨不挂一絲真捨矣彼所為滄海桑田之感公實無當焉而圖報福田之論猶淺之乎言公哉乃知真用世人真文人真受享人即能為捨其用世捨其文捨其受享而大展手眼于覺海無邊中也斯寺一區公之自力實足以奠之發願之文猶其誘人者耳寺迄今猶呼為張家寺公之真誠在人也慧雲其舊所賜額踞杭北城艮山門之西南湖之上其中東西井各一原碑載地百畝今清得為畝者五十四有竒為弓者一千三百十七有竒周以界石東底營南界長和巷西許田北負睥睨後之人如有妄覬而搏取之者公之誓文可畏也公名鎡字功甫別號約齋循王之曾孫官宣義郎直祕閣判臨安軍歷右司郎為少卿云張鎡自撰誓願文云大乘菩薩戒弟子承事郎直祕閣新權通判臨安軍府事兼管內勸農事張鎡右鎡一心歸命本師釋迦牟尼佛當來下生彌勒尊佛西方極樂世界阿彌陀佛十方法界諸佛諸大菩薩緣覺聲聞大梵天王帝釋尊天四大天王韋馱尊天守護正法天龍八部大權聖衆五嶽四瀆名山大川祠廟神祇伏望不離真際普賜證明鎡恭以欲導羣迷必闡揚于佛道將興遺教宜建立于僧坊勝福難思契經具載鎡生佛滅後值法住時幸發無上心願學第一義念真乘難逢于曠劫思慧命常續于未來助行欲妙于莊嚴隨力當施於利益深心所在至願方陳閻浮乃衆生選佛之場震旦多大乘得道之器教法東漸而獨此為盛祖師西來而其傳不窮由是衆多之伽藍遍我清淨之國土或據名山勝地或居赤縣神州皆古德之所興實檀那之自創伏遇主上體佛心而治天下崇祖道而護宗門惟錢塘駐蹕之方乃寰宇觀光之地昔相國曾聞十禪之建今在所未見一剎之隆如來演教于王城蓋居精舍宗師接人于閙市可乏叢林都民膠擾而罕聞説法之音衲子往來而靡有息肩之處慨斯闕典久矣經懷昨倦處于舊廬遂更謀于別業園得百畝地占一隅幽當北郭之鄰秀踞南湖之上雖混京塵而有山林之趣雖在人境而無車馬之喧爰剪荊榛式營棟宇勞一心而經始歷二歲而落成念勝處可作精藍而薄德豈宜於大廈顧棲身之尚賴姑假舍而寓居浮生自嘆于艱虞幻質纍縈于疾疚求佛祖之加被祈天龍之護持增長善根銷除宿業年得踰于知命運獲度于多災必法尊經變穢坊而成淨域定依前哲捨居宅而為梵宮用分常産之田常作香厨之供願主席者皆有道行使挂錫者咸悟心源為東方立光明幢與末世灑甘露雨插草不離於當念布金何借于他緣言弗苟陳誓無終悔鎡切慮事有多障時不待人先期或至於報終異議恐紛于身後宗族長幼朋友親姻或稱亂命之難從或謂名教之有害引屈到嗜芰之説誚王旦削髮之言壞我良因奪我素志以至恃勢力而求據占由賄賂而請住持輒汙招提妄談般若是出佛身之要是斷正法之輪死當墮于阿鼻生遂遭于竒禍特將此誓痛警若人俾草一時之狂心勿受歷劫之極苦蓋念起立塔廟飯食沙門流通大事之緣成就圓機之善恭願皇圖鞏固睿算增延期永措于兵刑庶宏持于像教上薦祖先父母次及知識冤親八難三塗四生九類悉資熏而獲益總解脫以超輪廣此願心周乎法界作菩提之妙行為淨業之正因佛國俱空畢竟首登于極樂法身非有不妨面奉于彌陀普與有情同成此道謹疏其碑現存書法遒媚酷似小米雲間董太史其昌極珍之復有魏國公史浩撰記學士樓鑰書俱存七寶寺在鹽橋束梁貞明七年錢王建名上方多福院宋大中祥符間改今額有六遊堂臨暉閣郡守王欽若詩普照院俗稱報師菴在鹽橋北晉天福八年錢氏建舊名報國千佛院祥符間改今額洪武十四年僧正宗重修嘉靖八年燬重建潮鳴寺在慶春門北梁貞明元年建初名歸德院高宗南渡駐蹕寺中聞江濤聲賜今名寺北有回龍橋高宗嘗作詩賜統制劉漢臣勒石寺中詩云野寺參差落漲痕踈林欹倒出霜根扁舟一棹向何處家在江南黃葉村兵燹重建洪武二十四年立為叢林普慈寺在蒲場巷內宋紹興間僧思淨建元至元間僧元忠修水月菴在潮鳴寺東僧道弘拓地四畝搆禪堂焚修其中旁有放生池蓮居菴在土橋東古延壽菴址燬于兵萬厯六年里人虞淳熙建懺室延紹覺法師安居而加拓之結禪講期方伯吳公碑定額為蓮居有記虞淳熙載錢塘志曰廣承字紹覺潘氏子少穎悟師圓鑨勤三七懺精相宗雲棲宏命之代講於天台賢首教模象知形無師自會晝夜聽衆圍繞戒鎧甚堅後觀佛面西而逝方伯浮渡居士吳用先碑記武林故稱佛國古剎精藍賁相望于山林城郭間然天下莫不重趼而走雲棲者非獨其剎勝也禪教律爭取宗焉四十年來法嗣棊布區中其間紹明教律以一精藍走天下者則無踰蓮居云蓮居為紹覺承上人菴院上人即雲棲首座余既獲參請雲棲謀以公餘謁講席而竟示寂往矣寒灰老衲飛錫蓮居亟為余道其生平甚悉蓋年未三十已從雲棲大師應期吳越間所至輒命代講儼然堪作人天範矣而猶不自滿假遄歸建懺室禮法華足不窺戶外者六易寒暑嚴淨毗尼研討三藏於台宗尤宿契馬弱冠辨六即義時賢悉為遜席讀法華玄籤會釋過目即能點檢其訛演唱垂二十年四方弟子日益進上人為之搜玄抉祕破難析疑盡形壽無幾微倦色人率擬師智者後身上人欿然自視若未敢鴈行于四明荊溪間也既以聲聞行律身又以菩薩行弘法視末世中濫據法王之席而缺篇犯聚空腹高心且哆口增結算沙云者何啻在羣之鶴翔仞之鳳乎以故崛起一隅竭四衆參雲棲而下即參蓮居城東咫尺地卓然為海內一時法窟云蓮居當慶春清泰二門之間左負郭右亘土橋門繞清流竹樹環列臨其地者恍然有樂邦水樹之思馬先是依大覺上人於萬厯六年始建二十四年上人復加拓之懺室則德園虞公所建菴名則古鄞屠長卿公所顏余更為酌定者也其徒大真三十五年佃地在菴師歿而真主菴事二三居士復為廣室置産時共四方名宿結禪期講其中宛如其師在時嗚呼天下古迹名區半委之斷崖衰草蓮居以一泥丸馳譽二紀且使子若孫悠然承之可久可大豈非法席之興以人不以地而行寡儀範學無師傅固難以虛聲籠世也哉余故樂而志之使知蓮居所以蔚為世宗者誠非偶然而雲棲一滴水其沾溉固無涯也上人著有心經二解唯識因明觀所緣緣論記若干卷方謀梓行世其懿行備載銘傳暨錢塘志中弟子具辨才能升座者甚衆茲不復詳聊志菴居始末如此華藏寺在橫河橋東唐清泰二年吳越王建名報恩院大中祥符間改今額淳熙十五年重建僧濟天岸詩清泰年間古道場門前馳陌幾炎涼破除客夢憑吟草陪伴禪心有佛香寶地月來清耿耿江城潮落夜鏜鏜叮嚀細桞營頭鼓莫放騰騰更點長悟空寺在淳祐橋東晉天福七年僧齊教建名崇新院大中祥符改額淳祐六年法昌重修元末燬永樂元年德兼重建門有小溪茂樹可蔭長明寺在螺螄門內晉天福間建宋開寶四年錢忠懿王改名法燈治平二年改長明佛印禪師開講于此元季燬弘治十五年僧如塤重建萬厯庚戌葺治一新相國寺在淳祐橋東北百步許北齊天保六年建名建國唐時燬為鄭景宅園景雲初僧慧購為寺值睿宗由相王即位賜名相國元末燬洪武初僧大雲重建置僧綱司於內正德八年僧東明重修尚書洪鍾為之銘費宏詩舍衛結禪林幽棲一徑深竹窗懸緑蔓蓮座相黃金解脫身前業遙知去後心坐談那忍別殊為滌煩襟虞淳熙詩行到雲深處雲深故不飛鐘聲遲好月詩思轉明璣入午藤花飯經冬薜葉衣那知人世裏辛苦屬輕肥靈芝崇福律寺在東花園崇新巷俗稱蠟燭菴唐貞觀己酉年郡人施光慶捨宅建名實際院宋佛印禪師重興元季燬元統間僧妙通重建洪武二十四年立為叢林永樂間徵僧能守纂修永樂大典宣德徵僧如真校修藏典正統徵僧智淳説戒開壇為天下傳戒宗師乙亥年辭朝沐浴坐化皇上遣禮部趙勗諭祭智淳曰爾夙悟善緣堅持梵行邇膺榮命為釋宗師方闡法音導人為善倐云示寂良可悼嗟靈其如存服茲諭祭賜敕諭祭碑額見存為律宗第一山錢塘縣歲造土牛迎春于此元時劉伯溫以行省都事坐法宿菴中簡俊上人詩云城外春江動客愁江邊細草緑悠悠還將短髮臨歧路畏向東風憶舊遊斜日遠天歸鴈急薄雲孤館落花稠青燈不放還家夢一夜腸回一萬周萬厯壬寅僧如堯重修大慈菴在墓園巷宋淳祐四年僧德殊建洪武三十四年僧可觀重修金剛廣福教寺在章家橋東晉天成間善杲法師肩負金剛憩息于此夜放光明陳少師感異捨地為寺初名功德院宋寶佑年間理宗賜今額至正末燬洪武十八年重建有衍慧堂御史謝文昌記萬厯辛亥寺僧常秀捐衣鉢募衆重修妙淨菴即古妙淨寺在香餅子園萬厯甲寅沈宮詹㴶集善信重建延雲棲僧大雯焚修於此祗園寺在東花園獅子巷西北太平興國間僧清照建舊在郊臺側南渡後造御馬院移築于此至正間燬重建東岡寺在獅子巷西乾德元年德法師建紹興三十二年賜額永樂十八年僧松巖重建惠林寺在蒲場巷紹興初汴僧惠林禪師隨駕來杭建興國院于天慶坊嘉定四年移于薦橋門外報國寺基改名惠林元至正間展城圍入尋燬洪武初僧曇芳重建佛惠寺俗呼壽火星菴在仁和縣之義和坊元大德間建後燬景泰間重建崇寧萬壽教寺俗呼姚園寺在高陽閭巷宋初為姚氏花園紹興初僧慈昌購園結菴乾道初賜額淳祐二年建膺福殿以奉理宗御容元季燬洪武初僧大雲重建慈雲寺在高陽閭巷周顯德二年僧圓覺建名慈濟大中祥符間改今額理宗書靈感道場四字洪武二十四年立為叢林沙門延禮重修嘉靖二十年燬僧圓鼎重建水陸寺在獅子巷南宋太平興國七年生法師建咸淳間僧師則重修內有銀杏二株甚巨蓋宋物也寺故在城外張氏展城圍入蘇軾寄水陸寺清順師詩草沒河堤雨暗村寺藏修竹不知門拾薪煮藥憐僧病掃地燒香淨客魂農事未休侵小雪佛燈初上報黃昏年來漸識間居味思與高人對榻論白蓮寺在仙林橋東晉開運元年吳越王建名華藏院宋治平間改妙惠院咸淳間僧祖顯誦經持戒地産白蓮因賜白蓮妙惠寺額下水陸寺在平安坊舊名無礙院宋嘉熙三年被潮水衝坍僧行椿于太平橋西南無礙院住寶佑二年奉禮部符據臨安府四月給帖賜額重建改今名東有古柏軒孝義菴在菜市橋西即古無礙菴故址萬厯間禪師袾宏重建方伯吳公及郡邑長各助資給劄名孝義無礙菴方伯郭子章匾曰超塵詳司馬宋應昌記蓮池禪師少與豫同業黌校豫登仕禪師出家為嘉靖乙丑禪師夙志方外以二尊人在不敢離既先後歲雙失怙恃將力酬所願而室人湯氏年才一十有九前兒殤亡憶子輿之規疑未決已而念風燈石火時不我延遂疾從剃染湯處室齋戒禪誦與其母偕母尋故孑然煢居宗人議後以三姪文彬無何湯亦脫簮珥為尼僧召文彬謂曰茲無所事後不後我固無害彼生而養死而服而殯而祭世法也吾學佛存資鉢衲歿歸闍維耳夫何求哉因舉所有田廬普給羣姪於文彬低昂之而別以居屬文彬已從鄰僦舍繩樞蓬門夕燈晨香𨵙如也嘉禾朱公子衷純追厥先大夫銀臺虞葑先生遺意首事搆菴而豫與一時宰官居士比丘某某從馬纍百金買趙氏故宅宅苦隘水文學施傍屋一楹附益之又歲久頽圮幾盡衆相與施材緇侶之能匠石杇墁畚插者相與施工施力中為禪堂鑿井於左廡餘垣軒厨湢略備而已豫惟禪師無子無留資無素所憑依故舊親戚僚友湯以年少婦獨御家政伶仃苦辛多歷年所如一朝及其分田割廬皆出本懷亦難矣諸上善人憐而菴之義舉也舉于義則十方常住業也後清信女展轉相續焚修于此菴遠為二尊人莊嚴報土又孝思之道也按府志菜市橋西有古無礙菴其後漸沒入于民家徒而北里之耆氓告豫以斯地正菴之舊址久湮忽興殆天意非人力而義以孝不虛孝以義不泯若交相成而不相悖乃沿古證今合而顏之曰孝義無礙菴沈氏子孫尚其念之護之以無忘孝義永為人天福田流慶淵淵後必有昌大其門閭者湯法諱祩錦暨禪師同師關中南五臺性天和尚遡禪師出家逾四十稔蓋行年五十九而菴成崇恩延福院在鹽橋下八界舊係西北流寓濠州鍾離縣孔雀妙明寺淳熙十四年嗣濮王請為功德院賜今額聖壽寺即永福寺在後洋街宋嘉定元年僧永明建淳祐間賜額永福以奉秀王香火元至元燬洪武初善祥重建宣德十年賜今額覺苑寺在豐樂橋東宋嘗徙三聖廟于此改賜額曰旌忠廟寺久廢宣德中重建千頃廣化院在木子巷北開平元年吳越王建舊名千頃大中祥符九年改賜今額中興後為臨安府祝聖道場僧了性精于醫善草書東坡嘗為作六觀堂老人草書歌趙清獻公名其堂曰垂慈堂以著其療疾濟人之功東坡草書歌物生有象象乃滋夢幻無根成斯須方其夢時了非無泡影一失俯仰殊清露未晞電已徂此滅滅盡乃真吾云如死灰實不枯逢場作戲三昧俱化身為醫忘其軀草書非學聊自娛落筆已喚周越奴蒼鼠奮髯飲松腴剡藤玉版開雪膚遊龍天飛外人呼莫作羞澀羊氏妹參寥子千頃廨院觀司馬才仲遺墨詩朦朧春雨濕村橋竹裏禽啼婆餅焦度谷倦聞車軋軋穿林愁聽馬蕭蕭細窺陳迹僧房靜默想風流鄙俗消浮魄浮魂今已矣無人為作楚詞招明慶寺在木子巷北唐大中二年建為靈隱下院大中祥符五年改今額宋中興駐蹕視東京大相國寺凡朝廷禱雨暘宰執百官建散聖節道場咸在焉淳熙十四年六月嘉熙四年七月皆以禱雨車駕臨幸理宗回鑾撒蓋甘雨隨至平章喬肅公行簡獻詩賀上用韻以賜又御書明慶二大字淳祐六年重建法堂御書南山道場為額嘉泰三年建閣藏御書扁曰宸奎萬壽之閣有蘇文忠書觀音經碑及題識大智祖師書彌陀字碑又有法喜堂明碧軒王荊公為僧修廣作法喜堂詩浮屠之法與世殊洗滌萬事求空虛心思以此不挂物一堂收身自有餘堂陰置石雙嵽嵲石腳立竹青扶疏一來已覺心膽豁况乃宴坐窮朝晡初憶幼時勇自許壯大看俗尤崎嶇豐車肥馬載豪傑少得志願多憂虞始知進退各一理造次未可分賢愚會將築室反耕釣相與此處吟山湖沈文通詩溷溷學佛者營營良足悲不知佛之樂誰使汝學為廣師吾州秀智解乃天資既以法為喜萬緣脫若遺高堂客滿坐妙語破羣疑來者豈不辨辨此堂之題王荊公寄題明碧軒詩明碧軒南竹數叢別來江外幾秋風道人無復人間世嗟我今為白髮翁趙忠簡公明慶僧房夜坐詩月明窗竹冷橫斜坐看風燈落燼花老眼病餘嫌細字枯腸寒甚怯清茶囊空豈是久為客夢短其能飛到家但有流年尋鬢髮蕭蕭蓬葆靖霜華菩提律寺舊在錢塘門外宋太平興國二年錢惟演捨宅為惠嚴寺七年賜額建炎間火紹興中復建有堂二曰南漪堂迎薰堂東坡題南漪堂看杜鵑花詩勒于石至元末築城徙寺于憲司巽方太學街東永樂間節菴守公被召修大典智淳修戒律別原修藏典約宗亦以高行被召四代入覲亦沙門榮遇云正統十一年丙寅七月丁卯朔初九日皇帝遣禮部郎中趙朂賜祭宗師智淳曰爾夙悟善緣堅持梵行邇膺榮命為釋宗師方闡法音導人為善倐云示寂良可悼嗟靈其如存服茲諭祭萬厯二年重建後殿內奉旃檀白衣觀音像蘇軾題南漪堂看杜鵑詩南漪杜鵑天下無披香殿上紅𣰽毺鶴林兵火真一夢不歸閬苑歸西湖菩提寺小軒晚晴詩杭潁雌雄本自殊淡粧濃抹是吾姝滿傾漲玉千鍾酒來看鎔銀百頃湖白鳥去邊山潑黛緑蒲疏處雨跳珠不知能似王摩詰貌得西湖落照無靈壽寺在曲阜橋東元至正二十一年浙江行省左丞相達實特穆爾建本輝和爾氏世族故稱輝和爾寺俗訛為義烏寺洪武二十四年改今額安國羅漢寺即相國寺俗稱西井寺在井亭橋西甘泉坊內宋淳熙十一年開山顯禪師請鳳凰山已廢安國羅漢寺額為額內有大井唐大厯五年鄴侯李相國所開六井之一寺屢燬以井故至今存上方寺在溜水橋西僧袾宏重建內鑿放生池袾宏有記曰武林自宋蹕南駐環湖山禪講律寺粲然綦布星列而郭以內稱焉逮今多半淪沒至不可考諸傳志有上方寺者背倚城垣左右掖湧金錢塘二門前通西井官道蓋肇建後梁貞明七年而國朝景泰四年僧以難事作散去寺隨廢漸蠶食為民居僅存者什一優婆塞沈善能者廬其中嘉靖二十三年尚寶卿六橋徐公得請于官佃為圃公無子以𢌿女遺命還寺女孝且賢持契歸王氏遵父囑以𢌿雲棲遂復為僧地如初無何王謝世居士化卿宋君聞其義而高之化卿以世祿之裔砥德礪行樂善不厭乃輸金贈二子更與之契豫亦罄衣資偕善信旁贖其故址若干向明正位別為回廊旋所向面城而門取幽寂也期世世承事三寶因諗于衆曰唯上方彈丸重興伶仃衰微何修何營而俾久遠或議闢草萊輪奐其殿堂羣之以僧僧多則常住豫以為不然時丁末法塔寺靡堅試屈指而計凡三門乎闤闠者楗椎之庭不為樽罍之所能幾僧雖多而行寡奚以多為顧茲地鄰城城鄰湖湖外高而城內卑隨鋤成流亢陽所不能涸因而池之良便以池放生以隙地之敝堂稍葺其莛楹守以二三誠信衲子蚤莫禪誦庶幾上祝皇圖下濟含識得之一舉矣或謂物如塵如沙池一勺耳容有限奈何而庸知夫鑿斯池也為之兆也美引也引而伸之而又伸之汪然遍域中矣昔子産之畜魚一勺也使鄭之人若大夫若士若民皆然鄭之與國若燕趙齊楚輩皆然則池無量所畜無量不然西湖古放生池也謂普容天壤間物寧有是乎哉化卿曰唯唯與其仲直卿諸賢士夫諸比丘淨人有呈財者裹糧者疏其壆而鍬者畚者梩者枯橫泉之撓而戽者槔者埭者固隄防之浸崩頽而埤者堹者𥗒者䃭者捍狸與獺而𦼼者間其外侮而版築者憂其寒暑而上為之𢊒下為之窟者皇皇乎晝胼宵胝勞不知息兼工再閲月而池成于時在筌而釋當釜而逸洋焉悠焉出而遊馬一勺之內足其從容也豫喜且懼稽首而告於十方如來主池神主伽藍神願以佛力法力賢聖力諸神誓願力慈護而威臨之從于今日盡未來際常為鱗介諸水族等棲止安宅又稽首而告於見住僧後住僧願以戒力悲智力念流水之苦躬而澤焦𣩅天台之抗章而斷簄梁智覺之負辜成仁蹈白刃而不悔尚永持無斁以風四方敢有叛先盟師陶朱媒利於網罟或倍衆而售之乎白衣是名違佛律犯波羅夷諸所稱釋子者鳴以羯磨遄擯絶之勿共住即朋比而阿神必陰縶其魂顯僇其形無能逃者既免焉其報盡也墮泥犂中嬰萬苦無竟所以者何好生惡死天道也人情也前人捐難捨之資役所愛之身創五濁世不恆見之勝舉以生必死之命置之安全後人忍不一深思之而惟便其私圖於天道逆於人情不祥從逆凶不祥者災逮鼓桴形影感應自然非危言怖之也化卿及諸大衆踊躍歡喜嘆未曾有作而曰善哉是緇與素之龜鏡也不可使無聞于末法也而碑上方頌曰始舉為興滅而兼得放生豈唯滅不滅生亦無生相生滅俱滅已寂滅何有方以明超於方無方中説上無方説西方其意亦如是作寺作池人願共了斯旨妙心寺在湧金門內舊在西湖行春橋南元至正間徙今所長生菴在溜水橋西城下為昭慶下院舊有沖靜真人遺址萬厯間寺僧智禮募金贖建正殿掩關六載裝塑千佛羅漢楊𤎉夫詩獨坐清都鶴夢長碧天如水月蒼蒼雲和有樂降王母霹靂無車喚阿香雪泛玉甌茶吐沫花零金剪鉢生光仙風不動庭前竹又送微鐘到下方趙孟俯詩流水橋西一徑斜青衣相接到仙家香分橄欖燒銀葉酒瀉松脂溢紫霞緑竹滿階初解籜碧桃幾樹正開花何時脫却塵凡纍來叩丹房九轉砂聶大年詩蕊宮琪樹罷棲鸞空有玄都太古壇野老不尋餐玉訣山人自製切雲冠杖龍化去秋池涸笙鶴歸來夜月寒前渡劉郎偏好事種桃留與後人看比勝廟司馬宋應昌建雲棲大師弟子真玉修淨土其中慈濟院舊在西湖蓮花橋北自牧牛孝公苦志精修事母至孝蓋欲廣慈利濟托迹禪那士大夫咸敬慕之名因稱馬實為開山第一代祖事聞于上賜號弘慈普濟大禪師即額慈濟院元未兵燬洪武壬子年僧行德重闢于南壁積善坊傍有寶覺寺正德十四年僧宗愷重建尚書洪鐘為之記真教寺在文錦坊南元延祐間回回大師阿喇卜丹所建先是宋室徙蹕西域夷人安插中原者多從駕而南元時內附者又往往編管江浙閩廣之間而杭州尤夥號色目種隆準深眸不啖豕肉婚姻喪葬不與中國相通誦經持齋歸于清淨推其酋長統之號曰滿剌經皆番書面壁膜拜不立佛像第以法號祝贊神祇而已寺基高五六尺扄鐍森固罕得闌入者俗稱禮拜寺慈光寺俗稱鐵佛寺在錢塘芝松坊佑聖橋西晉開運初晤恩禪師建宋寶慶二年清河郡王張魏公割地擴充名張府功德菴元至正燬正統間重建萬厯壬子撤圮殿新之方伯吳用先有記重建慈光寺碑記武林有佑聖橋旁為慈光寺寺有彌勒尊佛以鐵鑄之俗稱鐵佛寺因以名橋晉天福間晤恩禪師卓錫於此逮開運初寺成師時登座講貫彌年通達法華金光明經止觀論咸洞玄微尋施覆述門弟子相次角立宋雍熙三年八月朔日恩於中夜覩白光自井而出明滅不恆謂門人曰吾報齡極矣乃絶粒禁言一心念佛次夢擁衲沙門執金爐焚香三繞其室自言祖師灌頂來此相迎汝當長逝夢覺呼弟子至猶聞異香至草五日為弟子説止觀指歸及觀心義辰時端坐面西而化其夜寺僧皆聞絲竹嘹亮漸久漸遠依稀西去逮九月九日茶毗獲青白圓粒無算建塔於瑪瑙坡因以事聞上請額御書慈光普照四字顏其門法席之盛甲于通都後宋寶慶二年清河郡王張魏公復捨基草四間拓而充之共計四畝餘名張府功德菴元至正燬皇明正統立中成師重建而寶覺寺銅佛菴寺屬焉寺有合抱銀杏五株及放光古井皆宋物樹為風雷掣去井甚甘冽給數百家大早不涸咸稱為慈光甘露泉云苐闤闠鱗次湫隘囂塵門難旋馬殿亦漸圮寺僧慧皞年十九矢志鼎新閉關書蓮經積三年縉紳士庶鑒其誠共為檀施不脛而馳蓋發願在萬厯甲辰鳩工在丁未至壬子落成中建大雄寶殿高廣踰舊制廊廡門楹委折合度殿左有古徑逶迤紆曲深藏大士居供古佛三尊左右諸天羅漢猊座蓮臺金碧耀射仍重鑄彌勒以識其實約費二千餘金燦然一新其間助成者僧智能護法宰官則中丞金學曾太守凌登名孝廉吳之鯨等贊襄則王介朱佐沈坤戴綸張永年而與會有俞普才者助義田供常住為大殿四時香燈之費噫一念堅持衆緣俱到信非誣矣余觀武林梵宇之盛載在譜牒者什五沿滅大多因山水而存因人而廢如慈光在市㕓中無山水之勝而古剎聿隆則皞志可述也余因書殿額為摽而錫之以記慧安寺在十三灣巷晉天福間吳越王為明律師建于草橋門外羅木營地元季燬洪武初僧得實移于錢塘保安坊東永樂乙未又移今所少保兵部尚書于謙為之記寶梵寺在鎮海樓北晉天福初建于崇新門外名崇壽院宋淳熙二年徙建今所崇寧元年賜額寶梵洪武二十四年併入慈雲永樂元年重歸原所尚書夏原吉為之記海會寺吳越王建舊名石佛智果院宋大中祥符間改名積善海會寺嘉泰間燬至正間重建平章庫庫子山書大海會寺額御史大夫慶通書觀音寶殿額成化十年火踰年僧浩中重建百法寺在石龜巷宋建炎初僧寶寧建有大佛半身依山鑿石為之淳熙十四年賜額廣潤元時改額百法趙子昂書元末燬天順元年僧道沖重建寶奎寺在吳山之陽宋丞相喬行簡故第竒石峭拔東望海門如在咫尺紹定間理宗幸其第書見滄二字又書雙現樓孔山二軸五大字賜之勒之崖石遂捨宅為寺以寶奎請額詔從之元季燬弘治間重建有月江和尚欽取和番化導留彼不回成化改元其徒道澤日持金剛經為課遊天目重建昭明道場畢還山是時寺迹瓜分而寺所存者僅見滄石與殿基耳澤具奏復逮繫藩司理問所獄仍日持金剛經不徹半年餘嶽伯忽夢感老僧覺而遍物色之有以澤言者即出獄見之宛然夢中僧也蘧然驚異即師禮之成化二十三年重建尚書洪鐘為之記寶成寺晉天福中建名釋迦院宋大中祥符間改今額歲久廢為黎氏園萬厯壬子方伯吳公清復捐資建大觀樓開砌石徑煥然一新壁間有唐宋時石觀音羅漢像甚古有蘇子瞻寶成院賞牡丹詩春風小院却來時壁間惟見使君詩應問使君何處去憑君説與春風知年年歲歲何窮已花似去年人老矣去年崔護若重來前度劉郎在千里詩鐫石壁筆法甚遒其旁有歲寒松竹四字乃成化間吳東升題者浙江參政左贊詩吳山曲徑入西南方丈雲深僧兩三艾納吹風香細細葛藤𦊰日影毿毿泉分童子青衣洞塵斷維摩白石菴畫省若逢公事了海天送目再停雲居聖水寺舊名雲居禪菴在七寶山元元貞間中峯禪師建山皆本府財賦地師請而得之芟荊𣗥夷巖塹搆殿宇不置恆産惟資檀施或持鉢化緣立為常規俾後嗣永守至大己酉傳之中舟復增廣之因闢殿基得古井浚之得三石佛首遂名三佛泉鄧文肅公文原為之銘中峯常居之有雲居八景詩趙子昂墨迹萬歷間都閫某見井中有光掘得磁觀音像瑩然如玉建閣奉于寺舊有法華松數百株蒼虬翠峙為住持歷年損削殆盡又有中峯拂塵麻鞋復有小像一幅神氣如生相傳為中峯自寫上有贊云幻人無此相此相非幻人若喚作中峯鏡面添埃塵和甫雙眼碧能辨踈與親請挂向空壁日日生陽春夏原吉詩誰闢雲居境峩峩瞰古城西湖晴送碧上竺曉分青經鎮千函妙鐘鳴萬戶聲此中真可樂何必訪蓬瀛沈夢麟聖水寺詩白雲長繞梵王居湖上諸山總不如客至每煩塵榻下詩成那問酒尊虛摩挲修竹三年別抖擻塵襟一旦舒更待牡丹庭下發重期來此賦元輿上方菴為聖水下院與法華松接武峭石林立中有一滴泉極巖壑之勝昔東坡共佛印時過趺坐於此泉滴如注寺僧苦為遊觀纍鑿敗而石現存金波禪院即金波廟在金波橋宋淳熙元年建敕賜聖旨二字東坡書扁見存萬歷癸卯慈光僧圓美慧皞重建歸併慈光寺普照堂中丞金學曾有記寶嚴院在七寶山唐清泰二年錢氏建名瑞隆宋治平二年改今額寺有𡸁雲亭借竹軒淳祐間建佛閣理宗御書無量福海四字陳古靈𡸁雲亭詩小亭巉絶出雲間萬象升沈不得間莫怪詩翁頭白早時來向此寫湖山東坡詩三首江山雖有餘亭榭著難穩登臨不得要萬象各偃蹇惜哉𡸁雲軒此地得何晚天功爭向背詩眼巧增損路窮朱欄出山破石壁狠海門浸坤軸湖尾抱雲巘蔥蔥城郭麗淡淡煙村遠紛紛烏鵲去一一漁樵返雄觀快新獲微景收昔遁道人真古人嘯詠慕嵇阮空齋臥蒲褐芒鞋每自捆天憐詩人窮乞與供詩本我詩久不作荒澀旋鋤墾從君覔佳句咀嚼廢朝飲臥病彌月垂雲亭花開順闍黎以詩見招次韻答之曰道人心似水無礙照花妍燕坐春強半清陰月屢遷平生無起滅一念有陳鮮嫋嫋風枝舉離離日蕚蔫病吟終少味老醉不成顛何必遨頭出湖中有散仙僧怡然以𡸁雲新茶見餉報以大龍團仍戲云妙供來香積珍烹具大官揀芽分雀舌賜茗出龍團曉日雲菴暖春風玉殿寒聊將試道眼莫作兩般看廣嚴寺在七寶山清泰元年錢氏建舊名瑞隆宋治平二年改是額寺有雙竹甚竒南渡後分寺基為御廚營景定初重建王架閣應鳳撰記又有司馬文正公詠雙竹詩并序草木類同而種異者竹為多杭州廣嚴寺有雙竹其狀尤異于枯樹腹中自其頂出森然並竦樹如龍蛇相縈矯首呀然余遊見之為賦詩曰雙幹根枯腹青青凡幾霜龍騰雙角直鯨噴兩鬚長既欲尋支遁安能問辟疆屢來非別意未與此君忘蘇東坡遊七寶山并序去年秋遊七寶山上方入小院闃然無人有一僧隱几低頭讀書與之語漠然不對問其鄰之僧曰此雲闍黎也不出十五年矣今年六月自常潤還復至其室則死葬數月矣作詩題其壁云雲師來寶山一住十五秋讀書常閉戶客至不舉頭去年造其室清坐忘百憂我初無言説師亦無對酬今年復扣門空房但颼颼云已滅無餘薪盡火不留𨚫疑此室中常有斯人不所遇孰非夢事過吾何求開元寺在鳳山門內唐玄宗時建宋建炎間徙建于西湖元季兵燹復徙故址正統五年禮部尚書胡濙記劉士亨贈寧和尚詩清平山下古叢林主席如師道行深菩薩每分香積飯伽藍常護給孤金誦餘千偈燈生暈坐斷諸緣樹轉陰愧我未能修淨業塵勞空役利名心開寶仁王寺宋汴京開寶寺有仁王院高宗南渡僧慧照隨駕卓錫于此遂建寺如汴京紹熙二年賜額景定五年燬景泰間重建尚書孫原貞記薩天錫登橫山閣詩千尺青蓮座煙霞擁地靈山川幾兩屐日月兩浮萍鳥渡天𡸁海龍歸水在瓶深堂説法處應有石頭聽定水寺宋乾道八年建於萬松嶺嘉定八年移清波門外元至元十三年築城徙七寶山佛泉巴西鄧文原為之銘曰我觀大地積水所載孰疏鑿是太虛無外掘地及泉視之縈帶如履冥塗破諸障礙其源淵谷其瀉湍瀨不止不流以與井會瑞相見前示我三昧彼壞者石實相不壞是實相故遍恆沙界以一勺甘除世渴愛是相是水無在不在我作銘詩以警盲瞶戒壇院在祥符橋內有鐵塔基錢王井經略宋應昌贖建延僧廣泰住持總校官庶吉士臣朱鈴校對官中書臣吳甸華謄録監生臣李大任詳校官太僕寺少卿臣李欽編修臣程嘉謨覆勘
